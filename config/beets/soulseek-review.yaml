directory: /media/pibulus/passport/Soulseek/_Beets Review
library: /home/pibulus/.cache/beets-soulseek-review/library.db

import:
  copy: no
  move: no
  write: no
  timid: yes
  log: /home/pibulus/.cache/beets-soulseek-review/import.log
  quiet_fallback: skip
  resume: no
  incremental: yes

plugins: fetchart duplicates

fetchart:
  auto: no
  cautious: yes
  sources:
    - coverart
    - itunes
    - albumart
  minwidth: 300
  maxwidth: 1200

duplicates:
  keys: [albumartist, album]

paths:
  default: $albumartist/$album%aunique{}/$track - $title
  singleton: $artist/Loose Tracks/$title
  comp: Compilations/$album%aunique{}/$track - $title
