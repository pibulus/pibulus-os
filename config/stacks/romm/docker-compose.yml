services:
  romm:
    image: rommapp/romm:4.8.1
    container_name: romm
    restart: unless-stopped
    env_file:
      - ../.env
    environment:
      - DB_HOST=romm-db
      - DB_NAME=romm
      - DB_USER=romm
      - ROMM_AUTH_ENABLED=true
      - ROMM_AUTH_USERNAME=pibulus
      - ENABLE_SCHEDULED_RESCAN=true
      - SCHEDULED_RESCAN_CRON=0 3 * * *
      - ENABLE_SCHEDULED_UPDATE_MAME_XML=false
      - HASHEOUS_API_ENABLED=true
      - SCREENSCRAPER_API_ENABLED=true
      - LAUNCHBOX_API_ENABLED=false
    volumes:
      - /media/pibulus/passport/app-data/romm/assets:/romm/assets
      - /media/pibulus/passport/app-data/romm/config:/romm/config
      - /media/pibulus/passport/Roms/gb:/romm/library/roms/gb:ro
      - /media/pibulus/passport/Roms/gba:/romm/library/roms/gba:ro
      - /media/pibulus/passport/Roms/nes:/romm/library/roms/nes:ro
      - /media/pibulus/passport/Roms/n64:/romm/library/roms/n64:ro
      - /media/pibulus/passport/Roms/snes:/romm/library/roms/snes:ro
      - /media/pibulus/passport/Roms/tg16:/romm/library/roms/tg16:ro
      - /media/pibulus/passport/Roms/arcade_fbneo:/romm/library/roms/arcade:ro
      - /media/pibulus/MEMBOT/Roms/ScummVM:/romm/library/roms/scummvm:ro
      - /media/pibulus/passport/Roms/bios:/romm/library/bios:ro
      - /media/pibulus/passport/Roms/psx:/romm/library/roms/psx:ro
      - /media/pibulus/passport/Roms/megadrive/openemu:/romm/library/roms/megadrive:ro
      - /media/pibulus/passport/Roms/nds:/romm/library/roms/nds:ro
      - ./custom/theme.css:/romm/custom/theme.css:ro
      - ./custom/default.conf.template:/etc/nginx/templates/default.conf.template:ro
      - ./custom/emulator.css:/var/www/html/assets/emulatorjs/data/emulator.css:ro
      - ./custom/emulator-touch.js:/romm/custom/emulator-touch.js:ro
    ports:
      - "8095:8080"
    depends_on:
      romm-db:
        condition: service_healthy

  romm-db:
    image: mariadb:12.2.2  # pinned 2026-04-15
    container_name: romm-db
    restart: unless-stopped
    env_file:
      - ../.env
    environment:
      - MARIADB_DATABASE=romm
      - MARIADB_USER=romm
    volumes:
      - /home/pibulus/romm-db:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5
