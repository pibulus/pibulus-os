emulatorjs:
  cache_limit: null
  controls: {}
  debug: false
  disable_auto_unload: false
  disable_batch_bootup: true   # load cores on demand, not all at startup
  netplay:
    enabled: false
    ice_servers: []
  settings:
    default:
      fps: hide
      shader: crt-easymode.glslp
      vsync: disabled
      ejs_threads: enabled          # SharedArrayBuffer threading; COOP/COEP headers are set
      virtual-gamepad: enabled      # show touch controls on mobile/tablet
      menu-bar-button: visible      # keep a reliable escape hatch on touch devices
      save-state-location: browser  # keep states local unless RomM sync explicitly uploads
      save-save-interval: "60"      # periodic SRAM flush for games with battery saves
    # RomM merges settings by actual EmulatorJS core name, so keep both
    # broad labels and concrete core names for heavy systems.
    n64:
      ejs_threads: enabled
      shader: disabled          # CRT shader tanks N64 framerate, disable it
    mupen64plus_next:
      ejs_threads: enabled
      shader: disabled
    parallel_n64:
      ejs_threads: enabled
      shader: disabled
    psx:
      ejs_threads: enabled
      shader: disabled
    pcsx_rearmed:
      ejs_threads: enabled
      shader: disabled
    mednafen_psx_hw:
      ejs_threads: enabled
      shader: disabled
    nds:
      ejs_threads: enabled
      shader: disabled
    melonds:
      ejs_threads: enabled
      shader: disabled
    desmume:
      ejs_threads: enabled
      shader: disabled
    desmume2015:
      ejs_threads: enabled
      shader: disabled
exclude:
  platforms:
  - $RECYCLE.BIN
  - .DocumentRevisions-V100
  - .Spotlight-V100
  - .Trash-*
  - ._*
  - .fseventsd
  - .stfolder
  - '@eaDir'
  - System Volume Information
  - __MACOSX
  roms:
    multi_file:
      names:
      - $RECYCLE.BIN
      - .DocumentRevisions-V100
      - .Spotlight-V100
      - .Trash-*
      - ._*
      - .fseventsd
      - .stfolder
      - '@eaDir'
      - System Volume Information
      - __MACOSX
      parts:
        extensions:
        - bak
        - cache
        - crdownload
        - db
        - ini
        - lock
        - log
        - tmp
        names:
        - .DS_Store
        - .Trashes
        - ._*
        - .localized
        - .stfolder
        - '@SynoResource'
        - gamelist.xml
        - metadata.pegasus.xml
    single_file:
      extensions:
      - bak
      - cache
      - crdownload
      - db
      - ini
      - lock
      - log
      - tmp
      names:
      - .DS_Store
      - .Trashes
      - ._*
      - .localized
      - .stfolder
      - '@SynoResource'
      - gamelist.xml
      - metadata.pegasus.xml
      - Cat's Tale of Love & Friendship, A - Jingle Cats - On a Mission of Love (Japan)
        [T-En by Hilltop v1.0] [n].chd
filesystem:
  firmware_folder: bios
  roms_folder: roms
scan:
  export_gamelist: false
  media:
  - box2d
  - screenshot
  - manual
  priority:
    artwork:
    - igdb
    - moby
    - ss
    - ra
    - launchbox
    - gamelist
    - hasheous
    - tgdb
    - flashpoint
    - hltb
    language:
    - en
    - fr
    metadata:
    - igdb
    - moby
    - ss
    - ra
    - launchbox
    - gamelist
    - hasheous
    - tgdb
    - flashpoint
    - hltb
    region:
    - us
    - wor
    - ss
    - eu
    - jp
system:
  platforms:
    megadrive: genesis
  versions: {}
