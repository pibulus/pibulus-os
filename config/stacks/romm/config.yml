emulatorjs:
  cache_limit: null
  controls: {}
  debug: false
  disable_auto_unload: false
  disable_batch_bootup: true   # load cores on demand, not all at startup
  netplay:
    enabled: false
    ice_servers: []
  settings:
    default:
      fps: off
      shader: crt-easymode.glslp
      vsync: disabled
      threads: enabled          # SharedArrayBuffer threading; COOP/COEP headers are set
      virtual_gamepad: enabled  # show touch controls on mobile/tablet
      autosave: enabled         # auto save state on exit, auto load on launch
    # RomM merges settings by actual EmulatorJS core name, so keep both
    # broad labels and concrete core names for heavy systems.
    n64:
      threads: enabled
      shader: none              # CRT shader tanks N64 framerate, disable it
    mupen64plus_next:
      threads: enabled
      shader: none
    parallel_n64:
      threads: enabled
      shader: none
    psx:
      threads: enabled
      shader: none
    pcsx_rearmed:
      threads: enabled
      shader: none
    mednafen_psx_hw:
      threads: enabled
      shader: none
    nds:
      threads: enabled
      shader: none
    melonds:
      threads: enabled
      shader: none
    desmume:
      threads: enabled
      shader: none
    desmume2015:
      threads: enabled
      shader: none
exclude:
  platforms:
  - $RECYCLE.BIN
  - .DocumentRevisions-V100
  - .Spotlight-V100
  - .Trash-*
  - ._*
  - .fseventsd
  - .stfolder
  - '@eaDir'
  - System Volume Information
  - __MACOSX
  roms:
    multi_file:
      names:
      - $RECYCLE.BIN
      - .DocumentRevisions-V100
      - .Spotlight-V100
      - .Trash-*
      - ._*
      - .fseventsd
      - .stfolder
      - '@eaDir'
      - System Volume Information
      - __MACOSX
      parts:
        extensions:
        - bak
        - cache
        - crdownload
        - db
        - ini
        - lock
        - log
        - tmp
        names:
        - .DS_Store
        - .Trashes
        - ._*
        - .localized
        - .stfolder
        - '@SynoResource'
        - gamelist.xml
        - metadata.pegasus.xml
    single_file:
      extensions:
      - bak
      - cache
      - crdownload
      - db
      - ini
      - lock
      - log
      - tmp
      names:
      - .DS_Store
      - .Trashes
      - ._*
      - .localized
      - .stfolder
      - '@SynoResource'
      - gamelist.xml
      - metadata.pegasus.xml
      - Cat's Tale of Love & Friendship, A - Jingle Cats - On a Mission of Love (Japan)
        [T-En by Hilltop v1.0] [n].chd
filesystem:
  firmware_folder: bios
  roms_folder: roms
scan:
  export_gamelist: false
  media:
  - box2d
  - screenshot
  - manual
  priority:
    artwork:
    - igdb
    - moby
    - ss
    - ra
    - launchbox
    - gamelist
    - hasheous
    - tgdb
    - flashpoint
    - hltb
    language:
    - en
    - fr
    metadata:
    - igdb
    - moby
    - ss
    - ra
    - launchbox
    - gamelist
    - hasheous
    - tgdb
    - flashpoint
    - hltb
    region:
    - us
    - wor
    - ss
    - eu
    - jp
system:
  platforms:
    megadrive: genesis
  versions: {}
