name: social

services:
  irc:
    image: thelounge/thelounge:latest  # TODO: pin to version when deployed
    container_name: irc
    restart: always
    volumes:
      - /home/pibulus/.config/thelounge:/var/opt/thelounge
    ports:
      - "9000:9000"

  memos:
    image: ghcr.io/usememos/memos:0.24.0  # pinned 2026-04-15
    environment:
      - MEMOS_PUBLIC=true
      - MEMOS_BASE_URL=/memos/
    container_name: memos
    restart: unless-stopped
    volumes:
      - /home/pibulus/.config/memos:/var/opt/memos
    ports:
      - "5230:5230"
    deploy:
      resources:
        limits:
          memory: 128M
