name: admin

services:
  homepage-admin:
    image: ghcr.io/gethomepage/homepage:latest
    container_name: homepage_admin
    ports:
      - "8081:3000"
    volumes:
      - /home/pibulus/pibulus-os/config/homepage-admin:/app/config
      - /var/run/docker.sock:/var/run/docker.sock:ro
    restart: always

  # NOTE: ttyd terminal + cyberdeck now run as systemd services
  # ttyd-terminal.service → port 7682 (runs launcher.sh with full host access)
  # See: /etc/systemd/system/ttyd-terminal.service
