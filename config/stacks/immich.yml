name: immich

services:
  immich-server:
    container_name: immich_server
    image: ghcr.io/immich-app/immich-server:${IMMICH_VERSION:-release}
    volumes:
      - ${UPLOAD_LOCATION}:/usr/src/app/upload
      - /media/pibulus/passport/immich/upload/icloud:/usr/src/app/external/icloud:ro
      - /etc/localtime:/etc/localtime:ro
    env_file:
      - .env
    ports:
      - '2283:2283'
    environment:
      - IMMICH_MACHINE_LEARNING_ENABLED=false
    depends_on:
      - redis
      - database
    restart: unless-stopped


  redis:
    container_name: immich_redis
    image: docker.io/valkey/valkey:9@sha256:546304417feac0874c3dd576e0952c6bb8f06bb4093ea0c9ca303c73cf458f63
    restart: unless-stopped

  database:
    container_name: immich_postgres
    image: ghcr.io/immich-app/postgres:14-vectorchord0.4.3-pgvectors0.2.0@sha256:bcf63357191b76a916ae5eb93464d65c07511da41e3bf7a8416db519b40b1c23
    environment:
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_DB: ${DB_DATABASE_NAME}
      POSTGRES_INITDB_ARGS: '--data-checksums'
    volumes:
      - ${DB_DATA_LOCATION}:/var/lib/postgresql/data
    restart: unless-stopped

  # --- YOUR NEW BRIDGE ---
  icloudpd:
    image: boredazfcuk/icloudpd
    container_name: icloudpd
    environment:
      - user=pibulus
      - group=pibulus
      - apple_id=pibulus@gmail.com  # <--- CHANGE THIS!
      - authentication_type=2FA
      - notification_days=7
      - synchronization_delay=86400
      - timezone=Australia/Melbourne
    volumes:
      - /media/pibulus/passport/immich/upload/icloud:/data
      - ./icloudpd_config:/config
    restart: always

volumes:
  model-cache:
