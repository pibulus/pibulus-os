name: pirate

services:
  # --- THE PIRATE BROADCASTER ---
  jellyfin:
    image: jellyfin/jellyfin:10.11.5
    container_name: jellyfin
    network_mode: "host"
    volumes:
      - /home/pibulus/.config/jellyfin:/config
      - /home/pibulus/.cache/jellyfin:/cache
      - /media/pibulus/passport/Music:/media/music
      - /media/pibulus/passport/Soulseek:/media/soulseek:ro
      - /media/pibulus/passport/Movies:/media/movies
      - /media/pibulus/passport/Shows:/media/shows
      - /media/pibulus/passport/Audiobooks:/media/audiobooks
      - /media/pibulus/passport/Palestine:/media/palestine
      - /media/pibulus/MEMBOT/Movies:/media/membot-movies:ro
      - /media/pibulus/MEMBOT/Shows:/media/membot-shows:ro
    devices:
      - /dev/dri:/dev/dri
      - /dev/video19:/dev/video19
    group_add:
      - "44"
      - "992"
    restart: unless-stopped

  kavita:
    image: jvmilazz0/kavita:latest
    container_name: kavita
    ports:
      - "5000:5000"
    cpus: "1.0"
    mem_limit: 1024m
    mem_reservation: 512m
    cpu_shares: 1024
    volumes:
      - /home/pibulus/.config/kavita:/kavita/config
      - /media/pibulus/passport/Comics:/comics
    restart: unless-stopped
    healthcheck:
      test: ['CMD-SHELL', 'wget -q --spider http://127.0.0.1:5000/ || exit 1']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # --- THE BOOK LIBRARY ---

  audiobookshelf:
    image: ghcr.io/advplyr/audiobookshelf:latest
    container_name: audiobookshelf
    ports:
      - "13378:80"
    environment:
      - TZ=Australia/Melbourne
    volumes:
      - /home/pibulus/.config/audiobookshelf/config:/config
      - /home/pibulus/.config/audiobookshelf/metadata:/metadata
      - /media/pibulus/passport/Audiobooks:/audiobooks
      - /home/pibulus/pibulus-os/config/audiobookshelf/pibulus-polish.sh:/pibulus-polish.sh:ro
    command: sh -lc "/pibulus-polish.sh || true; exec node index.js"
    restart: unless-stopped
  calibre-web:
    image: lscr.io/linuxserver/calibre-web:latest
    container_name: calibre-web
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Australia/Melbourne
    ports:
      - "8083:8083"
    volumes:
      - /home/pibulus/.config/calibre-web:/config
      - /media/pibulus/passport/Ebooks/Calibre-Library:/books
    restart: unless-stopped

  # --- THE MUSIC NETWORK ---
  navidrome:
    image: deluan/navidrome:latest
    container_name: navidrome
    user: 1000:1000
    ports:
      - "4533:4533"
    environment:
      - ND_SCANSCHEDULE=1h
      - ND_LOGLEVEL=info
      - ND_MUSICFOLDER=/music
      - ND_PUID=1000
      - ND_PGID=1000
    volumes:
      - /home/pibulus/.config/navidrome:/data
      - "/media/pibulus/passport/Music/MusicBee/Music:/music/Library"
      - /media/pibulus/passport/Soulseek:/music/Soulseek
    restart: unless-stopped

  feishin:
    image: ghcr.io/jeffvli/feishin:latest
    container_name: feishin
    ports:
      - "9180:9180"
    volumes:
      - /home/pibulus/pibulus-os/config/feishin/pibulus-polish.sh:/docker-entrypoint.d/99-pibulus-polish.sh:ro
    environment:
      SERVER_NAME: Quick Cat Club Music
      SERVER_TYPE: navidrome
      SERVER_URL: http://pibulus.local:4533
      SERVER_LOCK: "true"
      ANALYTICS_DISABLED: "true"
      FS_GENERAL_THEME: glassyDark
      FS_GENERAL_EXTERNAL_LINKS: "false"
      FS_GENERAL_LAST_FM: "false"
      FS_GENERAL_LISTEN_BRAINZ: "false"
      FS_GENERAL_MUSIC_BRAINZ: "false"
      FS_GENERAL_QOBUZ: "false"
      FS_GENERAL_SHOW_RATINGS: "false"
      FS_GENERAL_SIDEBAR_PLAYLIST_LIST: "false"
      FS_AUTO_DJ_ENABLED: "false"
      FS_CSS_ENABLED: "true"
      FS_CSS_CONTENT: |
        .fs-full-screen-player-queue-module-grid-container:before {
            background: #0000000d;
            border-radius: 3rem;
            backdrop-filter: blur(60px);
        }

        .fs-full-screen-player-image-module-image {
            border-radius: 3rem;
            filter: none !important;
        }

        .fs-badge-module-root {
            background-color: #ffffff1c !important;
        }

        .fs-playerbar-module-controls-grid {
            display: grid;
            grid-template-columns: minmax(0, 1fr) minmax(0, 1fr) minmax(0, 1fr);
            gap: 1rem;
            height: 100%;
            backdrop-filter: blur(40px);
            background-color: #0000001c;
        }

        [data-mantine-color-scheme=dark] .fs-button-module-root[data-variant=subtle]:hover,
        [data-mantine-color-scheme=dark] .fs-button-module-root[data-variant=subtle]:active,
        [data-mantine-color-scheme=dark] .fs-button-module-root[data-variant=subtle]:focus-visible {
            background-color: #00000025;
        }

        .fs-button-module-root[data-variant=subtle] {
            border-radius: 1rem;
        }

        .fs-full-screen-player-queue-module-grid-container {
            padding: 1.5rem 3rem;
        }

        .fs-synchronized-lyrics-module-container {
            text-shadow: 0 0px 4px #fffffffa;
        }

        .fs-lyric-line-module-lyric-line.active {
            text-shadow: 0 0px 4px #fffffffa;
            filter: none !important;
        }

        .fs-lyric-line-module-lyric-line.synchronized {
            filter: blur(2px);
        }

        @media (pointer: coarse), (max-width: 700px) {
            .fs-playerbar-module-controls-grid { gap: 0.5rem; }
            .fs-playerbar-module-controls-grid .fs-button-module-root,
            .fs-full-screen-player-module-container .fs-button-module-root,
            .fs-item-card-controls-module-container .fs-button-module-root {
                min-width: 44px;
                min-height: 44px;
            }
        }
    restart: unless-stopped

  slskd:
    image: slskd/slskd
    container_name: slskd
    ports:
      - "5030:5030"
      - "50300:50300"
    cpus: "0.50"
    mem_limit: 512m
    mem_reservation: 128m
    cpu_shares: 256
    environment:
      - SLSKD_REMOTE_CONFIGURATION=true
      - SLSKD_SLSK_USERNAME=pibulus
      - SLSKD_SLSK_PASSWORD=meringue
      - SLSKD_SLSK_LISTEN_PORT=50300
    volumes:
      - /opt/slskd:/app/config
      - /media/pibulus/passport/Soulseek:/app/downloads
    restart: unless-stopped

  # --- THE UTILITIES ---
  filebrowser:
    image: filebrowser/filebrowser:s6
    container_name: filebrowser
    ports:
      - "8080:80"
    volumes:
      - /media/pibulus/passport:/srv
      - /opt/filebrowser/database.db:/database.db
      - /opt/filebrowser/filebrowser.json:/.filebrowser.json
    restart: always

  web_host:
    image: nginx:alpine
    container_name: web_host
    ports:
      - "80:80"
    volumes:
      - /home/pibulus/pibulus-os/config/nginx/hardening.conf:/etc/nginx/conf.d/default.conf:ro
      - /home/pibulus/pibulus-os/www/html:/usr/share/nginx/html
      # Binary blobs & runtime state stay on passport (overlaid on top of repo)
      - /media/pibulus/passport/www/html/arcade/games:/usr/share/nginx/html/arcade/games:ro
      - /media/pibulus/passport/www/html/status.json:/usr/share/nginx/html/status.json:ro
      - /media/pibulus/passport/www/html/counts.json:/usr/share/nginx/html/counts.json:ro
      - /home/pibulus/pibulus-os/www/html/msg:/usr/share/nginx/html/msg:ro
      - /media/pibulus/passport/www/html/wall/state.json:/usr/share/nginx/html/wall/state.json:ro
      - /home/pibulus/pibulus-os/www/html/kpab/catalog.json:/usr/share/nginx/html/kpab/catalog.json:ro
      - /media/pibulus/passport/www/html/fiction/games:/usr/share/nginx/html/fiction/games:ro
      # Other passport content
      - /media/pibulus/passport/Roms:/usr/share/nginx/roms:ro
      - /media/pibulus/passport/Roms/pico-8/pico8:/usr/share/nginx/html/pico/carts:ro
      - /media/pibulus/MEMBOT/Roms:/usr/share/nginx/membot-roms:ro
      - /media/pibulus/passport/Palestine:/usr/share/nginx/palestine:ro
      - /media/pibulus/passport/Conspiracy:/usr/share/nginx/conspiracy:ro
      - /media/pibulus/passport/Games/@Uninstalled:/usr/share/nginx/conspiracy/Uninstalled Games:ro
      - /media/pibulus/passport/Resources/Guitar:/usr/share/nginx/crates/Guitar:ro
      - /media/pibulus/passport/Resources/Piano:/usr/share/nginx/crates/Piano:ro
      - /media/pibulus/passport/Ebooks/Music Theory - eBook Collection:/usr/share/nginx/crates/Music Theory:ro
      - /media/pibulus/passport/Resources/Loops:/usr/share/nginx/loops:ro
      - /home/pibulus/pibulus-os/config/nginx/.htpasswd:/etc/nginx/.htpasswd:ro
    restart: always

  # --- THE TORRENT ENGINE ---
  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent:latest
    container_name: qbittorrent
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Australia/Melbourne
      - WEBUI_PORT=8888
    ports:
      - "8888:8888"
      - "6881:6881"
      - "6881:6881/udp"
    volumes:
      - /home/pibulus/.config/qbittorrent:/config
      - /media/pibulus/passport/The_Bucket:/downloads
      - /media/pibulus/passport/Shows:/shows
      - /media/pibulus/passport/Movies:/movies
    restart: unless-stopped

  # --- THE VPN SHIELD (PUREVPN) ---
  gluetun:
    image: qmcgaw/gluetun
    container_name: gluetun
    cap_add:
      - NET_ADMIN
    environment:
      - VPN_SERVICE_PROVIDER=purevpn
      - VPN_TYPE=openvpn
      - OPENVPN_USER=${PUREVPN_USER}
      - OPENVPN_PASSWORD=${PUREVPN_PASSWORD}
      - SERVER_REGIONS=Victoria
    restart: "no"
