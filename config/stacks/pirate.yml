services:
  # --- THE PIRATE BROADCASTER ---
  jellyfin:
    image: jellyfin/jellyfin
    container_name: jellyfin
    network_mode: "host"
    volumes:
      - /home/pibulus/.config/jellyfin:/config
      - /home/pibulus/.cache/jellyfin:/cache
      - /media/pibulus/passport/media:/media
      - /media/pibulus/passport/Music:/media/music
      - /media/pibulus/passport/Books:/media/books
      - /media/pibulus/passport/Movies:/media/movies
      - /media/pibulus/passport/Shows:/media/shows
    restart: unless-stopped

  ersatztv:
    image: jasongdove/ersatztv:latest
    container_name: ersatztv
    user: 1000:1000
    ports:
      - "8000:8000"
    volumes:
      - /home/pibulus/.config/ersatztv:/config
      - /media/pibulus/passport/Movies:/media/movies:ro
      - /media/pibulus/passport/Shows:/media/shows:ro
    restart: unless-stopped

  overseerr:
    image: sctx/overseerr:latest
    container_name: overseerr
    ports:
      - "5055:5055"
    environment:
      - LOG_LEVEL=info
      - TZ=Australia/Melbourne
    volumes:
      - /home/pibulus/.config/overseerr:/app/config
    restart: unless-stopped

  # --- THE UTILITIES ---
  navidrome:
    image: deluan/navidrome:latest
    container_name: navidrome
    user: 1000:1000
    ports:
      - "4533:4533"
    environment:
      ND_SCANSCHEDULE: 1h
      ND_LOGLEVEL: info
      ND_MUSICFOLDER: /music
    volumes:
      - /home/pibulus/.config/navidrome:/data
      - /media/pibulus/passport/music:/music
    restart: unless-stopped

  kavita:
    image: jvmilazz0/kavita:latest
    container_name: kavita
    ports:
      - "5000:5000"
    volumes:
      - /media/pibulus/passport/Books:/manga
      - /home/pibulus/.config/kavita:/kavita/config
    restart: unless-stopped

  slskd:
    image: slskd/slskd
    container_name: slskd
    user: 1000:1000
    ports:
      - "5030:5030"
      - "5031:5031"
    volumes:
      - /media/pibulus/passport/Soulseek:/app/downloads
      - /opt/slskd:/app/config
    restart: always

  filebrowser:
    image: filebrowser/filebrowser:s6
    container_name: filebrowser
    user: 1000:1000
    ports:
      - "8080:8080"
    volumes:
      - /media/pibulus/passport:/srv
      - /opt/filebrowser/database.db:/database.db
      - /opt/filebrowser/filebrowser.json:/.filebrowser.json
    restart: always

  web_host:
    image: nginx:alpine
    container_name: web_host
    ports:
      - "8090:80"
    volumes:
      - /media/pibulus/passport/www/html:/usr/share/nginx/html:ro
    restart: always
