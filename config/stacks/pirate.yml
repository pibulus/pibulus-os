name: pirate

services:
  # --- THE PIRATE BROADCASTER ---
  jellyfin:
    image: jellyfin/jellyfin
    container_name: jellyfin
    network_mode: "host"
    volumes:
      - /home/pibulus/.config/jellyfin:/config
      - /home/pibulus/.cache/jellyfin:/cache
      - /media/pibulus/passport/Music:/media/music
      - /media/pibulus/passport/Movies:/media/movies
      - /media/pibulus/passport/Shows:/media/shows
      - /media/pibulus/passport/Audiobooks:/media/audiobooks
      - /media/pibulus/passport/Palestine:/media/palestine
    restart: unless-stopped

  ersatztv:
    image: jasongdove/ersatztv:latest
    container_name: ersatztv
    user: 1000:1000
    ports:
      - "8001:8000"
    volumes:
      - /home/pibulus/.config/ersatztv:/config
      - /media/pibulus/passport/Movies:/media/movies:ro
      - /media/pibulus/passport/Shows:/media/shows:ro
      - /media/pibulus/passport/Palestine:/media/palestine:ro
      - /media/pibulus/passport/Shows/Vintage_Commercials_Advertisements_80s:/media/ads:ro
    restart: "no"

  overseerr:
    image: sctx/overseerr:latest
    container_name: overseerr
    ports:
      - "5055:5055"
    environment:
      - LOG_LEVEL=info
      - TZ=Australia/Melbourne
    volumes:
      - /home/pibulus/.config/overseerr:/app/config
    restart: unless-stopped

  # --- THE RETRO ARCADE (TEXT) ---
  arcade:
    image: tsl0922/ttyd:latest
    container_name: cyber_arcade
    ports:
      - "7681:7681"
    volumes:
      - /home/pibulus/Projects/active/experiments/terminal-travels:/arcade
    command: ttyd -W /arcade/terminal-travels
    restart: unless-stopped

  # --- THE CONSOLE EMULATOR (ROMM) ---
  romm:
    image: rommapp/romm:latest
    container_name: romm
    restart: "no"
    environment:
      - DB_HOST=romm_db
      - DB_NAME=romm
      - DB_USER=romm
      - DB_PASS=romm_pass
      - ROMM_AUTH_SECRET_KEY=pibulus_secret_key
    ports:
      - "8086:8080"
    volumes:
      - /media/pibulus/passport/Roms:/roms
      - /home/pibulus/.config/romm/resources:/romm/resources
      - /home/pibulus/.config/romm/assets:/romm/assets
    depends_on:
      - romm_db

  romm_db:
    image: mariadb:latest
    container_name: romm_db
    restart: "no"
    environment:
      - MYSQL_ROOT_PASSWORD=romm_pass
      - MYSQL_DATABASE=romm
      - MYSQL_USER=romm
      - MYSQL_PASSWORD=romm_pass
    volumes:
      - /home/pibulus/.config/romm/mysql:/var/lib/mysql

  # --- THE LIBRARY (COMICS/MANGA ONLY) ---
  kavita:
    image: jvmilazz0/kavita:latest
    container_name: kavita
    ports:
      - "5000:5000"
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1024M
    volumes:
      - /home/pibulus/.config/kavita:/kavita/config
      - /media/pibulus/passport/Comics:/comics
    restart: unless-stopped

  # --- THE BOOK LIBRARY ---
  calibre-web:
    image: lscr.io/linuxserver/calibre-web:latest
    container_name: calibre-web
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Australia/Melbourne
      - DOCKER_MODS=linuxserver/mods:universal-calibre  # enables ebook conversion
    ports:
      - "8083:8083"
    volumes:
      - /home/pibulus/.config/calibre-web:/config
      - /media/pibulus/passport/Ebooks/Calibre-Library:/books
    restart: unless-stopped

  # --- THE MUSIC NETWORK ---
  navidrome:
    image: deluan/navidrome:latest
    container_name: navidrome
    user: 1000:1000
    ports:
      - "4533:4533"
    environment:
      - ND_SCANSCHEDULE=1h
      - ND_LOGLEVEL=info
      - ND_MUSICFOLDER=/music
    volumes:
      - /home/pibulus/.config/navidrome:/data
      - "/media/pibulus/passport/Music/MusicBee/Music:/music/Library"
      - /media/pibulus/passport/Soulseek:/music/Soulseek
    restart: unless-stopped

  slskd:
    image: slskd/slskd
    container_name: slskd
    ports:
      - "5030:5030"
      - "50300:50300"
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 1024M
    environment:
      - SLSKD_REMOTE_CONFIGURATION=true
      - SLSKD_SLSK_USERNAME=pibulus
      - SLSKD_SLSK_PASSWORD=meringue
      - SLSKD_SLSK_LISTEN_PORT=50300
    volumes:
      - /opt/slskd:/app/config
      - /media/pibulus/passport/Soulseek:/app/downloads
    restart: unless-stopped

  # --- THE UTILITIES ---
  filebrowser:
    image: filebrowser/filebrowser:s6
    container_name: filebrowser
    ports:
      - "8080:80"
    volumes:
      - /media/pibulus/passport:/srv
      - /opt/filebrowser/database.db:/database.db
      - /opt/filebrowser/filebrowser.json:/.filebrowser.json
    restart: always

  web_host:
    image: nginx:alpine
    container_name: web_host
    ports:
      - "80:80"
    volumes:
      - /home/pibulus/pibulus-os/config/nginx/hardening.conf:/etc/nginx/conf.d/default.conf:ro
      - /media/pibulus/passport/www/html:/usr/share/nginx/html:ro
      - /media/pibulus/passport/Roms:/usr/share/nginx/roms:ro
      - /home/pibulus/pibulus-os/config/nginx/.htpasswd:/etc/nginx/.htpasswd:ro
    restart: always

  # --- THE VPN SHIELD (PUREVPN) ---
  gluetun:
    image: qmcgaw/gluetun
    container_name: gluetun
    cap_add:
      - NET_ADMIN
    environment:
      - VPN_SERVICE_PROVIDER=purevpn
      - VPN_TYPE=openvpn
      - OPENVPN_USER=${PUREVPN_USER}
      - OPENVPN_PASSWORD=${PUREVPN_PASSWORD}
      - SERVER_REGIONS=Victoria
    restart: "no"

  emulatorjs:
    image: lscr.io/linuxserver/emulatorjs:latest
    container_name: emulatorjs
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Australia/Melbourne
    volumes:
      - /home/pibulus/.config/emulatorjs:/config
      - /media/pibulus/passport/Roms:/data
    ports:
      - "8085:80"
      - "3002:3000"
    restart: "no"
