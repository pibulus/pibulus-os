limit_req_zone $binary_remote_addr zone=one:10m rate=1r/s;
limit_conn_zone $binary_remote_addr zone=addr:10m;

server {
    listen 80;
    server_name quickcat.club pibulus.local;
    
    limit_req zone=one burst=5;
    limit_conn addr 10;

    location / {
        root /usr/share/nginx/html;
        index index.html;
    }
}

server {
    listen 80;
    server_name kpab.fm www.kpab.fm;

    location / {
        root /usr/share/nginx/html/kpab;
        index index.html;
    }
}
