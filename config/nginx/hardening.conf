# KPAB.FM
server {
    listen 80;
    server_name kpab.fm www.kpab.fm;
    location = /catalog.json { alias /usr/share/nginx/html/kpab/catalog.json; }

    root /usr/share/nginx/html/kpab;
    index index.html;

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header X-Robots-Tag "noindex, nofollow, noarchive, nosnippet, noimageindex" always;

    location / {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header X-Robots-Tag "noindex, nofollow, noarchive, nosnippet, noimageindex" always;
        try_files $uri $uri/ =404;
    }

    location /static/ {
        proxy_pass http://172.17.0.1:8500;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }


    location /api/ {
        proxy_pass http://172.17.0.1:8500;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS";
        add_header Access-Control-Allow-Headers "Range";
        add_header Access-Control-Expose-Headers "Content-Range, Content-Length";
    }

    location /public/ {
        proxy_pass http://172.17.0.1:8500;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /radio.mp3 {
        proxy_pass http://172.17.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header CF-Connecting-IP $http_cf_connecting_ip;
        proxy_buffering off;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    location /listen/ {
        proxy_pass http://172.17.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header CF-Connecting-IP $http_cf_connecting_ip;
        proxy_buffering off;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    location /mutiny/ {
        proxy_pass http://172.17.0.1:8090/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /hearts/ {
        proxy_pass http://172.17.0.1:8092/hearts/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /msg/shout {
        proxy_pass http://172.17.0.1:8087/msg/shout;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /msg/shouts.json {
        proxy_pass http://172.17.0.1:8087/msg/shouts.json;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /msg/drop {
        client_max_body_size 1k;
        proxy_pass http://172.17.0.1:8087;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        add_header Access-Control-Allow-Origin *;
        add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS";
        add_header Access-Control-Allow-Headers "Range";
        add_header Access-Control-Expose-Headers "Content-Range, Content-Length";
        add_header Access-Control-Allow-Methods "POST, OPTIONS";
        add_header Access-Control-Allow-Headers "Content-Type";
    }
}

# ── KIWIX KNOWLEDGE LIBRARY ──────────────────────────────────
server {
    listen 80;
    server_name wiki.quickcat.club;

    location /kiwix-theme.css {
        root /usr/share/nginx/html;
        add_header Cache-Control "public, max-age=3600";
    }

    location / {
        proxy_pass http://172.17.0.1:8084;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Accept-Encoding "";

        sub_filter "</head>" "<link rel=\"icon\" href=\"data:image/svg+xml,<svg xmlns=%27http://www.w3.org/2000/svg%27 viewBox=%270 0 100 100%27><text y=%27.9em%27 font-size=%2790%27>📚</text></svg>\"><meta property=\"og:title\" content=\"Quick Cat Library\"><meta property=\"og:description\" content=\"Offline-first knowledge vault. Wikipedia, dev docs, repair guides, recipes, and weird corners of the internet — all served from a Raspberry Pi.\"><meta property=\"og:type\" content=\"website\"><meta property=\"og:url\" content=\"https://wiki.quickcat.club\"><meta property=\"og:site_name\" content=\"Quick Cat Club\"><meta name=\"description\" content=\"Offline-first knowledge vault — 29 libraries served from a Raspberry Pi\"><meta name=\"theme-color\" content=\"#050505\"><link rel=\"stylesheet\" href=\"/kiwix-theme.css?v=qc260411a\"></head>";
        sub_filter "<title>Welcome to Kiwix Server</title>" "<title>Quick Cat Library</title>";
        sub_filter_once off;
        sub_filter_types text/html;
    }
}
