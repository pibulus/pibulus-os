# ── SECURITY HARDENING ──
server_tokens off;

# ── RATE LIMITING ──
limit_req_zone $binary_remote_addr zone=one:10m rate=1r/s;
limit_conn_zone $binary_remote_addr zone=addr:10m;

# ── CLOUDFLARE REAL IP ──
# Trust Cloudflare tunnel to pass real client IPs
set_real_ip_from 172.17.0.0/16;
set_real_ip_from 127.0.0.1;
real_ip_header X-Forwarded-For;
real_ip_recursive on;


# PUBLIC - quickcat.club
server {
    listen 80;
    server_name quickcat.club;

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header X-Robots-Tag "noindex, nofollow, noarchive, nosnippet, noimageindex" always;

    root /usr/share/nginx/html;
    index index.html;

    location / {
        limit_req zone=one burst=5;
        limit_conn addr 10;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header X-Robots-Tag "noindex, nofollow, noarchive, nosnippet, noimageindex" always;
        try_files $uri $uri/ =404;
    }

    # Cyberdeck Terminal (Deck)

    # Public Terminal (ttyd)

    location /deck/ {
        proxy_pass http://172.17.0.1:7683/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 86400;
    }

    location /terminal/ {
        proxy_pass http://172.17.0.1:7682;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 86400;
    }

    # KPAB radio stream proxy (AzuraCast HTTP → HTTPS bridge)
    location /radio/stream {
        proxy_pass http://172.17.0.1:8000/radio.mp3;
        proxy_set_header Host kpab.fm;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_buffering off;
        proxy_cache off;
        add_header Cache-Control "no-store";
    }

    # Read-only archive peek API for public library pages.
    location /archive/ {
        proxy_pass http://172.17.0.1:8093/archive/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 130s;
        proxy_buffering off;
    }

    # Audiobookshelf public app
    location = /audiobookshelf { return 301 /audiobookshelf/; }
    location /audiobookshelf/ {
        proxy_pass http://172.17.0.1:13378/audiobookshelf/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # PICO-8 cart images — no rate limit (thumbnails load in bulk)
    location /pico/carts/ {
        add_header Cache-Control "public, max-age=86400";
        try_files $uri =404;
    }

    # Wikipedia offline (Kiwix)
    location /wiki/ {
        proxy_pass http://172.17.0.1:8084;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # The Wall - pixel graffiti backend
    location /wall/state.json {
        proxy_pass http://172.17.0.1:8086;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        add_header Access-Control-Allow-Origin *;
        add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS";
        add_header Access-Control-Allow-Headers "Range";
        add_header Access-Control-Expose-Headers "Content-Range, Content-Length";
    }

    location = /wall/place {
        client_max_body_size 1k;
        proxy_pass http://172.17.0.1:8086;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Shoutbox backend
    location /msg/shout {
        proxy_pass http://172.17.0.1:8087/msg/shout;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /msg/shouts.json {
        proxy_pass http://172.17.0.1:8087/msg/shouts.json;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Message Drop backend
    location /msg/drop {
        client_max_body_size 1k;
        proxy_pass http://172.17.0.1:8087;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /msg/inbox {
        proxy_pass http://172.17.0.1:8087;
        proxy_set_header Host $host;
        add_header Access-Control-Allow-Origin *;
        add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS";
        add_header Access-Control-Allow-Headers "Range";
        add_header Access-Control-Expose-Headers "Content-Range, Content-Length";
    }

    location /msg/count {
        proxy_pass http://172.17.0.1:8087;
        proxy_set_header Host $host;
        add_header Access-Control-Allow-Origin *;
        add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS";
        add_header Access-Control-Allow-Headers "Range";
        add_header Access-Control-Expose-Headers "Content-Range, Content-Length";
    }

    location /msg/dismiss {
        client_max_body_size 1k;
        proxy_pass http://172.17.0.1:8087;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Forbidden Library
    location /conspiracy/files/ {
        alias /usr/share/nginx/conspiracy/;
        autoindex on;
        autoindex_format json;
        add_header Access-Control-Allow-Origin *;
        add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS";
        add_header Access-Control-Allow-Headers "Range";
        add_header Access-Control-Expose-Headers "Content-Range, Content-Length";
    }

    # Palestine library
    location /palestine/files/ {
        alias /usr/share/nginx/palestine/;
        autoindex on;
        autoindex_format json;
        add_header Access-Control-Allow-Origin *;
        add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS";
        add_header Access-Control-Allow-Headers "Range";
        add_header Access-Control-Expose-Headers "Content-Range, Content-Length";
    }


    # Music-adjacent public file libraries
    location /crates/files/ {
        alias /usr/share/nginx/crates/;
        autoindex on;
        autoindex_format json;
        add_header Access-Control-Allow-Origin *;
        add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS";
        add_header Access-Control-Allow-Headers "Range";
        add_header Access-Control-Expose-Headers "Content-Range, Content-Length";
    }

    location /loops/files/ {
        alias /usr/share/nginx/loops/;
        autoindex on;
        autoindex_format json;
        add_header Access-Control-Allow-Origin *;
        add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS";
        add_header Access-Control-Allow-Headers "Range";
        add_header Access-Control-Expose-Headers "Content-Range, Content-Length";
    }

    # SharedArrayBuffer threading for custom arcade player
    location = /arcade/player.html {
        add_header Cross-Origin-Opener-Policy same-origin;
        add_header Cross-Origin-Embedder-Policy credentialless;
    }

    # CORS for arcade games
    location /arcade/games/ {
        add_header Access-Control-Allow-Origin *;
        add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS";
        add_header Access-Control-Allow-Headers "Range";
        add_header Access-Control-Expose-Headers "Content-Range, Content-Length";
        add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS";
        add_header Access-Control-Allow-Headers "Range";
        add_header Access-Control-Expose-Headers "Content-Range, Content-Length";
    }

    # Serve ROMs — all now sourced from Passport (/usr/share/nginx/roms = passport/Roms)
    location /arcade/roms/gb/ {
        alias /usr/share/nginx/roms/gb/;
        add_header Access-Control-Allow-Origin *;
        add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS";
        add_header Access-Control-Allow-Headers "Range";
        add_header Access-Control-Expose-Headers "Content-Range, Content-Length";
    }

    location /arcade/roms/gba/ {
        alias /usr/share/nginx/roms/gba/;
        add_header Access-Control-Allow-Origin *;
        add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS";
        add_header Access-Control-Allow-Headers "Range";
        add_header Access-Control-Expose-Headers "Content-Range, Content-Length";
    }

    location /arcade/roms/nes/ {
        alias /usr/share/nginx/roms/nes/;
        add_header Access-Control-Allow-Origin *;
        add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS";
        add_header Access-Control-Allow-Headers "Range";
        add_header Access-Control-Expose-Headers "Content-Range, Content-Length";
    }

    location /arcade/roms/n64/ {
        alias /usr/share/nginx/roms/n64/;
        add_header Access-Control-Allow-Origin *;
        add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS";
        add_header Access-Control-Allow-Headers "Range";
        add_header Access-Control-Expose-Headers "Content-Range, Content-Length";
    }

    location /arcade/roms/psx/ {
        alias /usr/share/nginx/roms/psx/;
        add_header Access-Control-Allow-Origin *;
        add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS";
        add_header Access-Control-Allow-Headers "Range";
        add_header Access-Control-Expose-Headers "Content-Range, Content-Length";
    }

    location /arcade/roms/snes/ {
        alias /usr/share/nginx/roms/snes/;
        add_header Access-Control-Allow-Origin *;
        add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS";
        add_header Access-Control-Allow-Headers "Range";
        add_header Access-Control-Expose-Headers "Content-Range, Content-Length";
    }

    location /arcade/roms/tg16/ {
        alias /usr/share/nginx/roms/tg16/;
        add_header Access-Control-Allow-Origin *;
        add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS";
        add_header Access-Control-Allow-Headers "Range";
        add_header Access-Control-Expose-Headers "Content-Range, Content-Length";
    }

    location /arcade/roms/megadrive/ {
        alias /usr/share/nginx/roms/megadrive/openemu/;
        add_header Access-Control-Allow-Origin *;
        add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS";
        add_header Access-Control-Allow-Headers "Range";
        add_header Access-Control-Expose-Headers "Content-Range, Content-Length";
    }

    location /arcade/roms/scummvm/ {
        alias /media/pibulus/passport/Roms/scummvm/;
        add_header Access-Control-Allow-Origin *;
        add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS";
        add_header Access-Control-Allow-Headers "Range";
        add_header Access-Control-Expose-Headers "Content-Range, Content-Length";
    }

    location /arcade/roms/ {
        alias /usr/share/nginx/roms/;
        add_header Access-Control-Allow-Origin *;
        add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS";
        add_header Access-Control-Allow-Headers "Range";
        add_header Access-Control-Expose-Headers "Content-Range, Content-Length";
    }

    # ROM Vault
    location /roms/ {
        proxy_pass http://172.17.0.1:8080/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
    location /static/ {
        proxy_pass http://172.17.0.1:8080/static/;
        proxy_set_header Host $host;
    }

    # Drop Zone upload
    location = /drop/upload {
        client_max_body_size 500m;
        proxy_pass http://172.17.0.1:8085;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_request_buffering off;
    }
}

