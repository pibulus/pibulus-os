# ── SECURITY HARDENING ──
server_tokens off;

# ── RATE LIMITING ──
limit_req_zone $binary_remote_addr zone=one:10m rate=1r/s;
limit_conn_zone $binary_remote_addr zone=addr:10m;

# ── CLOUDFLARE REAL IP ──
# Trust Cloudflare tunnel to pass real client IPs
set_real_ip_from 172.17.0.0/16;
set_real_ip_from 127.0.0.1;
real_ip_header X-Forwarded-For;
real_ip_recursive on;


# PUBLIC - quickcat.club
server {
    listen 80;
    server_name quickcat.club;

    limit_req zone=one burst=5;
    limit_conn addr 10;

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ =404;
    }

    # Wikipedia offline (Kiwix)
    location /wiki/ {
        proxy_pass http://172.17.0.1:8084/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }


    # The Wall - pixel graffiti backend
    location /wall/state.json {
        proxy_pass http://172.17.0.1:8086;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        add_header Access-Control-Allow-Origin *;
    }

    location = /wall/place {
        client_max_body_size 1k;
        proxy_pass http://172.17.0.1:8086;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }



    # Message Drop backend
    location /msg/drop {
        client_max_body_size 1k;
        proxy_pass http://172.17.0.1:8087;
        proxy_set_header Host \$host;
        proxy_set_header X-Real-IP \$remote_addr;
    }

    location /msg/inbox {
        proxy_pass http://172.17.0.1:8087;
        proxy_set_header Host \$host;
        add_header Access-Control-Allow-Origin *;
    }

    location /msg/count {
        proxy_pass http://172.17.0.1:8087;
        proxy_set_header Host \$host;
        add_header Access-Control-Allow-Origin *;
    }

    location /msg/dismiss {
        client_max_body_size 1k;
        proxy_pass http://172.17.0.1:8087;
        proxy_set_header Host \$host;
        proxy_set_header X-Real-IP \$remote_addr;
    }

    # Forbidden Library (conspiracy/occult collection)
    location /conspiracy/files/ {
        alias /usr/share/nginx/conspiracy/;
        autoindex on;
        autoindex_format json;
        add_header Access-Control-Allow-Origin *;
    }

    # Palestine library (browse + download)
    location /palestine/files/ {
        alias /usr/share/nginx/palestine/;
        autoindex on;
        autoindex_format json;
        add_header Access-Control-Allow-Origin *;
    }

    # CORS for arcade games (Parchment needs Range requests)
    location /arcade/games/ {
        add_header Access-Control-Allow-Origin *;
        add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS";
        add_header Access-Control-Allow-Headers "Range";
        add_header Access-Control-Expose-Headers "Content-Range, Content-Length";
    }

    # Serve ROMs from mounted directory
    location /arcade/retro/roms/ {
        alias /usr/share/nginx/roms/;
        add_header Access-Control-Allow-Origin *;
    }

    # Drop Zone upload proxy
    location = /drop/upload {
        client_max_body_size 500m;
        proxy_pass http://172.17.0.1:8085;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_request_buffering off;
    }
}

# ADMIN DECK - password protected (via tunnel as deck.quickcat.club)
server {
    listen 80;
    server_name deck.quickcat.club;

    limit_req zone=one burst=5;
    limit_conn addr 10;

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    auth_basic "PIBULUS DECK";
    auth_basic_user_file /etc/nginx/.htpasswd;

    root /usr/share/nginx/html/deck;
    index index.html;

    location / {
        try_files $uri $uri/ =404;
    }

    # Serve arcade from parent html dir
    location /arcade/ {
        alias /usr/share/nginx/html/arcade/;
        index index.html;
    }

    location /arcade/games/ {
        alias /usr/share/nginx/html/arcade/games/;
        add_header Access-Control-Allow-Origin *;
        add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS";
        add_header Access-Control-Allow-Headers "Range";
        add_header Access-Control-Expose-Headers "Content-Range, Content-Length";
    }
    # Serve ROMs from mounted directory
    location /arcade/retro/roms/ {
        alias /usr/share/nginx/roms/;
        add_header Access-Control-Allow-Origin *;
    }

}

