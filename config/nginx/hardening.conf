# Rate Limiting Zones
limit_req_zone $binary_remote_addr zone=one:10m rate=1r/s;
limit_conn_zone $binary_remote_addr zone=addr:10m;

server {
    listen 80;
    server_name localhost;

    # Apply limits
    limit_req zone=one burst=5;
    limit_conn addr 10;

    location / {
        root /usr/share/nginx/html;
        index index.html;
    }
}
