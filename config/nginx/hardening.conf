# ── SECURITY HARDENING ──
server_tokens off;

# ── RATE LIMITING ──
limit_req_zone $binary_remote_addr zone=one:10m rate=1r/s;
limit_conn_zone $binary_remote_addr zone=addr:10m;

# ── CLOUDFLARE REAL IP ──
# Trust Cloudflare tunnel to pass real client IPs
set_real_ip_from 172.17.0.0/16;
set_real_ip_from 127.0.0.1;
real_ip_header X-Forwarded-For;
real_ip_recursive on;


# PUBLIC - quickcat.club
server {
    listen 80;
    server_name quickcat.club;

    limit_req zone=one burst=5;
    limit_conn addr 10;

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header X-Robots-Tag "noindex, nofollow, noarchive, nosnippet, noimageindex" always;

    root /usr/share/nginx/html;
    index index.html;

    location / {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header X-Robots-Tag "noindex, nofollow, noarchive, nosnippet, noimageindex" always;
        try_files $uri $uri/ =404;
    }

    # Cyberdeck Terminal (Deck)

    # Public Terminal (ttyd)

    location /deck/ {
        auth_basic "Cyberdeck";
        auth_basic_user_file /etc/nginx/.htpasswd;
        proxy_pass http://172.17.0.1:7683/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 86400;
    }

    location /terminal/ {
        proxy_pass http://172.17.0.1:7682;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 86400;
    }

    # Wikipedia offline (Kiwix)
    location /wiki/ {
        proxy_pass http://172.17.0.1:8084;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # The Wall - pixel graffiti backend
    location /wall/state.json {
        proxy_pass http://172.17.0.1:8086;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        add_header Access-Control-Allow-Origin *;
        add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS";
        add_header Access-Control-Allow-Headers "Range";
        add_header Access-Control-Expose-Headers "Content-Range, Content-Length";
    }

    location = /wall/place {
        client_max_body_size 1k;
        proxy_pass http://172.17.0.1:8086;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Shoutbox backend
    location /msg/shout {
        proxy_pass http://172.23.0.1:8087/msg/shout;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /msg/shouts.json {
        proxy_pass http://172.23.0.1:8087/msg/shouts.json;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Message Drop backend
    location /msg/drop {
        client_max_body_size 1k;
        proxy_pass http://172.23.0.1:8087;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /msg/inbox {
        proxy_pass http://172.23.0.1:8087;
        proxy_set_header Host $host;
        add_header Access-Control-Allow-Origin *;
        add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS";
        add_header Access-Control-Allow-Headers "Range";
        add_header Access-Control-Expose-Headers "Content-Range, Content-Length";
    }

    location /msg/count {
        proxy_pass http://172.23.0.1:8087;
        proxy_set_header Host $host;
        add_header Access-Control-Allow-Origin *;
        add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS";
        add_header Access-Control-Allow-Headers "Range";
        add_header Access-Control-Expose-Headers "Content-Range, Content-Length";
    }

    location /msg/dismiss {
        client_max_body_size 1k;
        proxy_pass http://172.23.0.1:8087;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Forbidden Library
    location /conspiracy/files/ {
        alias /usr/share/nginx/conspiracy/;
        autoindex on;
        autoindex_format json;
        add_header Access-Control-Allow-Origin *;
        add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS";
        add_header Access-Control-Allow-Headers "Range";
        add_header Access-Control-Expose-Headers "Content-Range, Content-Length";
    }

    # Palestine library
    location /palestine/files/ {
        alias /usr/share/nginx/palestine/;
        autoindex on;
        autoindex_format json;
        add_header Access-Control-Allow-Origin *;
        add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS";
        add_header Access-Control-Allow-Headers "Range";
        add_header Access-Control-Expose-Headers "Content-Range, Content-Length";
    }

    # CORS for arcade games
    location /arcade/games/ {
        add_header Access-Control-Allow-Origin *;
        add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS";
        add_header Access-Control-Allow-Headers "Range";
        add_header Access-Control-Expose-Headers "Content-Range, Content-Length";
        add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS";
        add_header Access-Control-Allow-Headers "Range";
        add_header Access-Control-Expose-Headers "Content-Range, Content-Length";
    }

    # Serve ROMs
    location /arcade/roms/gb/ {
        alias /usr/share/nginx/membot-roms/Game\ Boy/;
        add_header Access-Control-Allow-Origin *;
        add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS";
        add_header Access-Control-Allow-Headers "Range";
        add_header Access-Control-Expose-Headers "Content-Range, Content-Length";
    }

    location /arcade/roms/gba/ {
        alias /usr/share/nginx/membot-roms/Game\ Boy\ Advance/;
        add_header Access-Control-Allow-Origin *;
        add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS";
        add_header Access-Control-Allow-Headers "Range";
        add_header Access-Control-Expose-Headers "Content-Range, Content-Length";
    }

    location /arcade/roms/nes/ {
        alias /usr/share/nginx/membot-roms/Nintendo\ \(NES\)/;
        add_header Access-Control-Allow-Origin *;
        add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS";
        add_header Access-Control-Allow-Headers "Range";
        add_header Access-Control-Expose-Headers "Content-Range, Content-Length";
    }

    location /arcade/roms/n64/ {
        alias /usr/share/nginx/membot-roms/Nintendo\ 64/;
        add_header Access-Control-Allow-Origin *;
        add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS";
        add_header Access-Control-Allow-Headers "Range";
        add_header Access-Control-Expose-Headers "Content-Range, Content-Length";
    }

    location /arcade/roms/psx/ {
        alias /usr/share/nginx/membot-roms/Sony\ PlayStation/;
        add_header Access-Control-Allow-Origin *;
        add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS";
        add_header Access-Control-Allow-Headers "Range";
        add_header Access-Control-Expose-Headers "Content-Range, Content-Length";
    }

    location /arcade/roms/snes/ {
        alias /usr/share/nginx/membot-roms/Super\ Nintendo\ \(SNES\)/;
        add_header Access-Control-Allow-Origin *;
        add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS";
        add_header Access-Control-Allow-Headers "Range";
        add_header Access-Control-Expose-Headers "Content-Range, Content-Length";
    }

    location /arcade/roms/tg16/ {
        alias /usr/share/nginx/membot-roms/TurboGrafx-16/;
        add_header Access-Control-Allow-Origin *;
        add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS";
        add_header Access-Control-Allow-Headers "Range";
        add_header Access-Control-Expose-Headers "Content-Range, Content-Length";
    }

    location /arcade/roms/megadrive/ {
        alias /usr/share/nginx/roms/megadrive/openemu/;
        add_header Access-Control-Allow-Origin *;
        add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS";
        add_header Access-Control-Allow-Headers "Range";
        add_header Access-Control-Expose-Headers "Content-Range, Content-Length";
    }

    location /arcade/roms/scummvm/ {
        alias /media/pibulus/passport/roms/scummvm/;
        add_header Access-Control-Allow-Origin *;
        add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS";
        add_header Access-Control-Allow-Headers "Range";
        add_header Access-Control-Expose-Headers "Content-Range, Content-Length";
    }

    location /arcade/roms/ {
        alias /usr/share/nginx/roms/;
        add_header Access-Control-Allow-Origin *;
        add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS";
        add_header Access-Control-Allow-Headers "Range";
        add_header Access-Control-Expose-Headers "Content-Range, Content-Length";
    }

    # ROM Vault
    location /roms/ {
        proxy_pass http://172.17.0.1:8080/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
    location /static/ {
        proxy_pass http://172.17.0.1:8080/static/;
        proxy_set_header Host $host;
    }

    # Drop Zone upload
    location = /drop/upload {
        client_max_body_size 500m;
        proxy_pass http://172.17.0.1:8085;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_request_buffering off;
    }
}

