limit_req_zone $binary_remote_addr zone=one:10m rate=1r/s;
limit_conn_zone $binary_remote_addr zone=addr:10m;

# PUBLIC - quickcat.club
server {
    listen 80;
    server_name quickcat.club;

    limit_req zone=one burst=5;
    limit_conn addr 10;

    location / {
        root /usr/share/nginx/html;
        index index.html;
    }
}

# ADMIN DECK - password protected (via tunnel as deck.quickcat.club)
server {
    listen 80;
    server_name deck.quickcat.club;

    limit_req zone=one burst=5;
    limit_conn addr 10;

    auth_basic "PIBULUS DECK";
    auth_basic_user_file /etc/nginx/.htpasswd;

    location / {
        root /usr/share/nginx/html/deck;
        index index.html;
    }
}

# LOCAL - pibulus.local (no auth needed, you're on LAN)
server {
    listen 80;
    server_name pibulus.local;

    location / {
        root /usr/share/nginx/html/deck;
        index index.html;
    }
}

# KPAB.FM static fallback
server {
    listen 80;
    server_name kpab.fm www.kpab.fm;

    location / {
        root /usr/share/nginx/html/kpab;
        index index.html;
    }
}
