</style>
<script>
(function(){try{var a=localStorage.getItem("RaStore.album.list.params");if(!a||a.indexOf("random")===-1){var p=a?JSON.parse(a):{};p.sort="random";p.order="ASC";localStorage.setItem("RaStore.album.list.params",JSON.stringify(p));}var s=localStorage.getItem("RaStore.song.list.params");if(!s||s.indexOf("random")===-1){var sp=s?JSON.parse(s):{};sp.sort="random";sp.order="ASC";localStorage.setItem("RaStore.song.list.params",JSON.stringify(sp));}}catch(e){}})();
</script>
</head>';
    }
}
