server {
    listen 80;
    server_name stream.quickcat.club;

    location / {
        proxy_pass http://172.17.0.1:8100;
        proxy_set_header Host localhost:8100;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_read_timeout 300s;

        sub_filter_types application/vnd.apple.mpegurl application/x-mpegURL text/plain;
        sub_filter_once off;
        sub_filter "http://localhost:8100/" "/";
    }
}

# ── SECURITY HARDENING ──
server_tokens off;

# ── RATE LIMITING ──
limit_req_zone $binary_remote_addr zone=one:10m rate=1r/s;
limit_req_zone $binary_remote_addr zone=static:10m rate=50r/s;
limit_conn_zone $binary_remote_addr zone=addr:10m;

# ── CLOUDFLARE REAL IP ──
# Trust Cloudflare tunnel to pass real client IPs
set_real_ip_from 172.17.0.0/16;
set_real_ip_from 127.0.0.1;
real_ip_header X-Forwarded-For;
real_ip_recursive on;

# ── BOT / SCANNER BLOCKING ──
map $http_user_agent $is_bot {
    default 0;
    "~*zgrab"           1;
    "~*Nuclei"          1;
    "~*sqlmap"          1;
    "~*nikto"           1;
    "~*masscan"         1;
    "~*l9scan"          1;
    "~*LeakIX"          1;
    "~*censys"          1;
    "~*NetcraftSurveyAgent" 1;
    "~*SemrushBot"      1;
    "~*AhrefsBot"       1;
    "~*MJ12bot"         1;
    "~*DotBot"          1;
    "~*Go-http-client"  1;
    "~*python-requests" 1;
    "~*python-urllib"    1;
    "~*PetalBot"        1;
    "~*BLEXBot"         1;
    "~*DataForSeoBot"   1;
    "~*GPTBot"          1;
    "~*CCBot"           1;
    "~*ClaudeBot"       1;
    "~*anthropic-ai"    1;
    "~*bytespider"      1;
    "~*Amazonbot"       1;
}

# ── TARPIT ZONE (1 request per 10 seconds — makes bots wait) ──
limit_req_zone $binary_remote_addr zone=tarpit:1m rate=6r/m;

# PUBLIC - quickcat.club
server {
    listen 80;
    server_name quickcat.club;

    limit_req zone=one burst=20;
    limit_conn addr 10;

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    root /usr/share/nginx/html;
    index index.html;

    location / {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        try_files $uri $uri/ =404;
    }


    # ── ROBOTS.TXT: go away politely ──
    location = /robots.txt {
        default_type text/plain;
        return 200 "User-agent: *\nDisallow: /\n\n# This is a personal server for friends.\n# There is nothing to index here.\n# Please respect our space.\n";
    }
    # ── SCANNER HONEYPOT & TARPIT ──
    # Probe paths that only bots request — tarpit them
    location ~* ^/(\.env|\.git|\.vscode|\.aws|\.docker|wp-admin|wp-login|wp-includes|xmlrpc\.php|phpmyadmin|admin/config|setup-config|login\.action|info\.php|swagger\.json|actuator|\.DS_Store|cgi-bin|\.well-known/security\.txt) {
        limit_req zone=tarpit burst=1 nodelay;
        default_type text/plain;
        return 410 "Gone. There is nothing here. There was never anything here.\nThis is a Raspberry Pi running static HTML.\nYou are wasting your time and mine.\nPlease reconsider your life choices.\n";
    }

    # Block known scanner user-agents
    if ($is_bot) {
        return 403;
    }

    # ── METADATA: security.txt ──
    location = /.well-known/security.txt {
        default_type text/plain;
        return 200 "Contact: https://github.com/pibulus/pibulus-os/issues\nPreferred-Languages: en\nCanonical: https://quickcat.club/.well-known/security.txt\nPolicy: https://quickcat.club/.well-known/security.txt\n\nThis is a personal Raspberry Pi hosting media for friends.\nThere is no bug bounty. There is no sensitive data.\nPlease leave us alone.\n";
    }

    # Cyberdeck Terminal (Deck)
    location /deck/ {
        proxy_pass http://172.17.0.1:7683;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # Public Terminal (ttyd)
    location /ttyd/ {
        proxy_pass http://172.17.0.1:7682;
        proxy_set_header Authorization $http_authorization;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }


    # Admin shell (plain bash, auth required)
    location /shell/ {
        proxy_pass http://172.17.0.1:7684;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
    # Wikipedia offline (Kiwix)
    location /wiki/ {
        proxy_pass http://172.17.0.1:8084;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # The Wall - pixel graffiti backend
    location /wall/state.json {
        proxy_pass http://172.17.0.1:8086;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        add_header Access-Control-Allow-Origin *;
    }

    location = /wall/place {
        client_max_body_size 1k;
        proxy_pass http://172.17.0.1:8086;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Shoutbox backend
    location /msg/shout {
        proxy_pass http://172.17.0.1:8086/msg/shout;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /msg/shouts.json {
        proxy_pass http://172.17.0.1:8086/msg/shouts.json;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Message Drop backend
    location /msg/drop {
        client_max_body_size 1k;
        proxy_pass http://172.17.0.1:8087;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /msg/inbox {
        proxy_pass http://172.17.0.1:8087;
        proxy_set_header Host $host;
        add_header Access-Control-Allow-Origin *;
    }

    location /msg/count {
        proxy_pass http://172.17.0.1:8087;
        proxy_set_header Host $host;
        add_header Access-Control-Allow-Origin *;
    }

    location /msg/dismiss {
        client_max_body_size 1k;
        proxy_pass http://172.17.0.1:8087;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Forbidden Library
    location /conspiracy/files/ {
        alias /usr/share/nginx/conspiracy/;
        autoindex on;
        autoindex_format json;
        add_header Access-Control-Allow-Origin *;
    }

    # Palestine library
    location /palestine/files/ {
        alias /usr/share/nginx/palestine/;
        autoindex on;
        autoindex_format json;
        add_header Access-Control-Allow-Origin *;
    }

    # Enable SharedArrayBuffer for emulator threading
    location = /arcade/player.html {
        add_header Cross-Origin-Opener-Policy same-origin;
        add_header Cross-Origin-Embedder-Policy credentialless;
    }

    # CORS for arcade games
    location /arcade/games/ {
        add_header Access-Control-Allow-Origin *;
        add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS";
        add_header Access-Control-Allow-Headers "Range";
        add_header Access-Control-Expose-Headers "Content-Range, Content-Length";
    }

    # Serve ROMs
    location /arcade/roms/gb/ {
        alias "/usr/share/nginx/membot-roms/Game Boy/";
        add_header Access-Control-Allow-Origin *;
    }

    location /arcade/roms/gba/ {
        alias "/usr/share/nginx/membot-roms/Game Boy Advance/";
        add_header Access-Control-Allow-Origin *;
    }

    location /arcade/roms/nes/ {
        alias "/usr/share/nginx/membot-roms/Nintendo (NES)/";
        add_header Access-Control-Allow-Origin *;
    }

    location /arcade/roms/n64/ {
        alias "/usr/share/nginx/membot-roms/Nintendo 64/";
        add_header Access-Control-Allow-Origin *;
    }

    location /arcade/roms/snes/ {
        alias "/usr/share/nginx/membot-roms/Super Nintendo (SNES)/";
        add_header Access-Control-Allow-Origin *;
    }

    location /arcade/roms/tg16/ {
        alias /usr/share/nginx/membot-roms/TurboGrafx-16/;
        add_header Access-Control-Allow-Origin *;
    }

    location /arcade/roms/megadrive/ {
        alias /usr/share/nginx/roms/megadrive/openemu/;
        add_header Access-Control-Allow-Origin *;
    }


    location /arcade/roms/psx-membot/ {
        alias "/usr/share/nginx/membot-roms/Sony PlayStation/";
        add_header Access-Control-Allow-Origin *;
    }

    location /arcade/roms/scummvm/ {
        alias /usr/share/nginx/membot-roms/ScummVM/;
        add_header Access-Control-Allow-Origin *;
    }

    location /arcade/roms/ {
        alias /usr/share/nginx/roms/;
        add_header Access-Control-Allow-Origin *;
    }

    # PICO-8 cart images (the .p8.png files are valid PNGs)
    location /pico/carts/ {
        limit_req zone=static burst=100 nodelay;
        alias /usr/share/nginx/pico8-carts/;
        add_header Access-Control-Allow-Origin *;
        add_header Cache-Control "public, max-age=86400";
    }

    # ROM Vault
    location /roms/ {
        proxy_pass http://172.17.0.1:8080/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
    location /static/ {
        proxy_pass http://172.17.0.1:8080/static/;
        proxy_set_header Host $host;
    }

    # Drop Zone upload
    location = /drop/upload {
        client_max_body_size 500m;
        proxy_pass http://172.17.0.1:8085;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_request_buffering off;
    }
}

