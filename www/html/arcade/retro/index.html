<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>retro arcade - quickcat.club</title>
  <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
    :root {
      --bg: #050505;
      --cyan: #00ffea;
      --magenta: #ff00ff;
      --text: #e0e0e0;
      --dim: #666;
      --card-bg: rgba(0,0,0,0.6);
      --card-border: rgba(0,255,234,0.2);
    }
    body {
      font-family: 'VT323', monospace;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      font-size: 18px;
    }
    body::after {
      content: '';
      position: fixed; inset: 0;
      background: repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.08) 2px,rgba(0,0,0,0.08) 4px);
      pointer-events: none; z-index: 9999;
    }
    .container { max-width:960px; margin:0 auto; padding:0 24px; }
    .header { padding:48px 0 32px; text-align:center; }
    .header .back { display:inline-block; color:var(--dim); text-decoration:none; font-size:1rem; margin-bottom:16px; }
    .header .back:hover { color:var(--cyan); }
    .header h1 { font-size:clamp(2rem,6vw,3.5rem); color:var(--magenta); text-shadow:0 0 20px rgba(255,0,255,0.4); }
    .header .sub { color:var(--dim); margin-top:8px; }

    .controls { position:sticky; top:0; z-index:50; padding:16px 0; background:rgba(5,5,5,0.9); backdrop-filter:blur(8px); }
    .search-bar input { width:100%; background:var(--card-bg); border:1px solid var(--card-border); border-radius:6px; padding:12px 16px; color:var(--text); font-family:'VT323',monospace; font-size:1.2rem; outline:none; }
    .search-bar input::placeholder { color:var(--dim); }
    .search-bar input:focus { border-color:var(--cyan); }

    .filters { display:flex; gap:8px; margin-top:10px; flex-wrap:wrap; }
    .filter-btn {
      background:var(--card-bg); border:1px solid var(--card-border); border-radius:4px;
      padding:4px 12px; color:var(--dim); font-family:'VT323',monospace; font-size:1rem;
      cursor:pointer; transition:all 0.2s;
    }
    .filter-btn:hover { color:var(--text); border-color:var(--text); }
    .filter-btn.active { color:var(--cyan); border-color:var(--cyan); }

    .games { display:grid; grid-template-columns:repeat(auto-fill,minmax(260px,1fr)); gap:12px; padding-bottom:48px; }
    .game-card { background:var(--card-bg); border:1px solid var(--card-border); border-radius:8px; padding:16px; cursor:pointer; transition:transform 0.2s,border-color 0.2s; }
    .game-card:hover { transform:translateY(-3px); border-color:var(--cyan); }
    .game-card .title { font-size:1.1rem; color:var(--cyan); margin-bottom:4px; }
    .game-card .meta { font-size:0.85rem; color:var(--dim); }
    .game-card .system-tag {
      display:inline-block; font-size:0.75rem; padding:1px 6px; border-radius:3px;
      background:rgba(255,0,255,0.15); color:var(--magenta); margin-right:6px;
      text-transform:uppercase;
    }
    .no-results { text-align:center; padding:48px 0; color:var(--dim); font-size:1.2rem; display:none; }

    /* Emulator modal */
    .modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.98); z-index:1000; flex-direction:column; }
    .modal-overlay.open { display:flex; }
    .modal-header {
      display:flex; justify-content:space-between; align-items:center;
      padding:8px 16px; background:rgba(0,0,0,0.9); flex-shrink:0;
    }
    .modal-header .now-playing { color:var(--dim); font-size:0.9rem; }
    .modal-header .now-playing span { color:var(--cyan); font-size:1.1rem; }
    .modal-header .close-btn {
      background:none; border:1px solid var(--card-border); border-radius:4px;
      color:var(--dim); font-family:'VT323',monospace; padding:4px 12px; cursor:pointer;
    }
    .modal-header .close-btn:hover { color:var(--text); border-color:var(--text); }
    .modal-header .controls-hint { color:var(--dim); font-size:0.8rem; }
    #game-frame { flex:1; border:none; width:100%; }

    .footer { text-align:center; padding:24px 0 48px; color:var(--dim); font-size:0.95rem; }
    .footer a { color:var(--cyan); text-decoration:none; }

    @media (max-width:600px) {
      .modal-header .controls-hint { display:none; }
      .modal-header { padding:6px 10px; }
    }
  </style>
</head>
<body>

<div class="container">
  <div class="header">
    <a href="/arcade/" class="back">&larr; the arcade</a>
    <h1>retro arcade</h1>
    <p class="sub" id="game-count"></p>
  </div>

  <div class="controls">
    <div class="search-bar">
      <input type="text" id="search" placeholder="search games..." autocomplete="off" spellcheck="false">
    </div>
    <div class="filters" id="filters"></div>
  </div>

  <div class="games" id="games"></div>
  <div class="no-results" id="no-results">no games match that search</div>
</div>

<div class="modal-overlay" id="modal">
  <div class="modal-header">
    <div class="now-playing">now playing: <span id="modal-title"></span></div>
    <div class="controls-hint">gamepad supported &middot; save states persist</div>
    <button class="close-btn" onclick="closeGame()">close [esc]</button>
  </div>
  <iframe id="game-frame" allow="gamepad; autoplay"></iframe>
</div>

<div class="container">
  <div class="footer">
    <p>powered by <a href="https://emulatorjs.org" target="_blank" rel="noopener">EmulatorJS</a></p>
    <p style="margin-top:8px">controller support &middot; save states &middot; fullscreen</p>
  </div>
</div>

<script>
let games = [];
let activeFilter = 'all';

async function init() {
  try {
    const r = await fetch('/arcade/retro/games.json');
    games = await r.json();
  } catch(e) {
    games = [];
  }
  document.getElementById('game-count').textContent = games.length + ' games loaded';
  buildFilters();
  renderGames(games);
}

function buildFilters() {
  const systems = [...new Set(games.map(g => g.system))].sort();
  const container = document.getElementById('filters');
  let html = '<button class="filter-btn active" onclick="setFilter(\'all\', this)">all</button>';
  systems.forEach(s => {
    const count = games.filter(g => g.system === s).length;
    html += `<button class="filter-btn" onclick="setFilter('${s}', this)">${s} (${count})</button>`;
  });
  container.innerHTML = html;
}

function setFilter(system, btn) {
  activeFilter = system;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  filterGames();
}

function getFilteredGames() {
  const q = document.getElementById('search').value.toLowerCase().trim();
  let list = games;
  if (activeFilter !== 'all') list = list.filter(g => g.system === activeFilter);
  if (q) list = list.filter(g => g.title.toLowerCase().includes(q));
  return list;
}

function renderGames(list) {
  const container = document.getElementById('games');
  const noResults = document.getElementById('no-results');
  if (!list.length) { container.innerHTML=''; noResults.style.display='block'; return; }
  noResults.style.display = 'none';
  container.innerHTML = list.map(g => {
    const safeTitle = g.title.replace(/'/g, '&#39;').replace(/"/g, '&quot;');
    const safeFile = encodeURIComponent(g.file);
    return `
    <div class="game-card" onclick="playGame('${safeFile}', '${safeTitle}', '${g.system}')">
      <div class="title">${g.title}</div>
      <div class="meta"><span class="system-tag">${g.system}</span>${g.region || ''}</div>
    </div>`;
  }).join('');
}

function filterGames() {
  renderGames(getFilteredGames());
}

function playGame(file, title, system) {
  const decoded = decodeURIComponent(file);
  const frame = document.getElementById('game-frame');
  const params = new URLSearchParams({ rom: decoded, system: system, name: title });
  frame.src = '/arcade/retro/player.html?' + params.toString();
  document.getElementById('modal-title').textContent = title;
  document.getElementById('modal').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeGame() {
  const frame = document.getElementById('game-frame');
  frame.src = 'about:blank';
  document.getElementById('modal').classList.remove('open');
  document.body.style.overflow = '';
}

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeGame();
});
document.getElementById('search').addEventListener('input', filterGames);
init();
</script>
</body>
</html>
