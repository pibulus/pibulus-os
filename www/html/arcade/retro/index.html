<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>retro arcade - quickcat.club</title>
  <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
    :root {
      --bg: #050505;
      --cyan: #00ffea;
      --magenta: #ff00ff;
      --text: #e0e0e0;
      --dim: #666;
      --card-bg: rgba(0,0,0,0.6);
      --card-border: rgba(0,255,234,0.2);
    }
    body {
      font-family: 'VT323', monospace;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      font-size: 18px;
    }
    body::after {
      content: '';
      position: fixed; inset: 0;
      background: repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.08) 2px,rgba(0,0,0,0.08) 4px);
      pointer-events: none; z-index: 9999;
    }
    .container { max-width:960px; margin:0 auto; padding:0 24px; }
    .header { padding:48px 0 32px; text-align:center; }
    .header .back { display:inline-block; color:var(--dim); text-decoration:none; font-size:1rem; margin-bottom:16px; }
    .header .back:hover { color:var(--cyan); }
    .header h1 { font-size:clamp(2rem,6vw,3.5rem); color:var(--magenta); text-shadow:0 0 20px rgba(255,0,255,0.4); }
    .header .sub { color:var(--dim); margin-top:8px; }

    .search-bar { position:sticky; top:0; z-index:50; padding:16px 0; background:rgba(5,5,5,0.9); backdrop-filter:blur(8px); }
    .search-bar input { width:100%; background:var(--card-bg); border:1px solid var(--card-border); border-radius:6px; padding:12px 16px; color:var(--text); font-family:'VT323',monospace; font-size:1.2rem; outline:none; }
    .search-bar input::placeholder { color:var(--dim); }
    .search-bar input:focus { border-color:var(--cyan); }

    .games { display:grid; grid-template-columns:repeat(auto-fill,minmax(260px,1fr)); gap:12px; padding-bottom:48px; }
    .game-card { background:var(--card-bg); border:1px solid var(--card-border); border-radius:8px; padding:16px; cursor:pointer; transition:transform 0.2s,border-color 0.2s; }
    .game-card:hover { transform:translateY(-3px); border-color:var(--cyan); }
    .game-card .title { font-size:1.1rem; color:var(--cyan); margin-bottom:4px; }
    .game-card .region { font-size:0.85rem; color:var(--dim); }
    .no-results { text-align:center; padding:48px 0; color:var(--dim); font-size:1.2rem; display:none; }

    /* Emulator modal */
    .modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.95); z-index:1000; justify-content:center; align-items:center; }
    .modal-overlay.open { display:flex; }
    .modal { width:95vw; height:90vh; max-width:1200px; display:flex; flex-direction:column; }
    .modal-header { display:flex; justify-content:space-between; align-items:center; padding:8px 16px; }
    .modal-header .modal-title { color:var(--cyan); font-size:1.2rem; }
    .modal-header .close-btn { background:none; border:1px solid var(--card-border); border-radius:4px; color:var(--dim); font-family:'VT323',monospace; padding:4px 12px; cursor:pointer; }
    .modal-header .close-btn:hover { color:var(--text); border-color:var(--text); }
    #game-container { flex:1; }

    .footer { text-align:center; padding:24px 0 48px; color:var(--dim); font-size:0.95rem; }
    .footer a { color:var(--cyan); text-decoration:none; }
  </style>
</head>
<body>

<div class="container">
  <div class="header">
    <a href="/arcade/" class="back">&larr; text adventures</a>
    <h1>retro arcade</h1>
    <p class="sub" id="game-count"></p>
  </div>

  <div class="search-bar">
    <input type="text" id="search" placeholder="search games..." autocomplete="off" spellcheck="false">
  </div>

  <div class="games" id="games"></div>
  <div class="no-results" id="no-results">no games match that search</div>
</div>

<div class="modal-overlay" id="modal">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title" id="modal-title"></span>
      <button class="close-btn" onclick="closeGame()">close [esc]</button>
    </div>
    <div id="game-container"></div>
  </div>
</div>

<div class="container">
  <div class="footer">
    <p>powered by <a href="https://emulatorjs.org" target="_blank" rel="noopener">EmulatorJS</a></p>
    <p style="margin-top:8px">controller support &middot; save states &middot; fullscreen</p>
  </div>
</div>

<script>
let games = [];

async function init() {
  try {
    const r = await fetch('/arcade/retro/games.json');
    games = await r.json();
  } catch(e) {
    // Fallback: scan for .7z files would need server-side. Use static list.
    games = [];
  }
  document.getElementById('game-count').textContent = games.length + ' games loaded';
  renderGames(games);
}

function renderGames(list) {
  const container = document.getElementById('games');
  const noResults = document.getElementById('no-results');
  if (!list.length) { container.innerHTML=''; noResults.style.display='block'; return; }
  noResults.style.display = 'none';
  container.innerHTML = list.map(g => `
    <div class="game-card" onclick="playGame('${g.file}', '${g.title.replace(/'/g,"\\\'")}', '${g.system}')">
      <div class="title">${g.title}</div>
      <div class="region">${g.system} &middot; ${g.region || ''}</div>
    </div>
  `).join('');
}

function filterGames() {
  const q = document.getElementById('search').value.toLowerCase().trim();
  renderGames(q ? games.filter(g => g.title.toLowerCase().includes(q) || (g.system||'').toLowerCase().includes(q)) : games);
}

function playGame(file, title, system) {
  const container = document.getElementById('game-container');
  container.innerHTML = '<div id="game"></div>';
  document.getElementById('modal-title').textContent = title;
  document.getElementById('modal').classList.add('open');
  document.body.style.overflow = 'hidden';

  // Map system to EmulatorJS core
  const coreMap = {
    'megadrive': 'genesis_plus_gx', 'genesis': 'genesis_plus_gx',
    'snes': 'snes9x', 'nes': 'fceumm',
    'gba': 'mgba', 'gb': 'gambatte', 'gbc': 'gambatte',
    'n64': 'mupen64plus_next', 'psx': 'pcsx_rearmed',
    'mastersystem': 'genesis_plus_gx', 'gamegear': 'genesis_plus_gx',
    'atari2600': 'stella2014',
  };

  window.EJS_player = '#game';
  window.EJS_core = coreMap[system] || 'genesis_plus_gx';
  window.EJS_gameUrl = '/arcade/retro/roms/' + file;
  window.EJS_pathtodata = 'https://cdn.emulatorjs.org/stable/data/';

  const script = document.createElement('script');
  script.src = 'https://cdn.emulatorjs.org/stable/data/loader.js';
  document.body.appendChild(script);
}

function closeGame() {
  document.getElementById('modal').classList.remove('open');
  document.getElementById('game-container').innerHTML = '';
  document.body.style.overflow = '';
  // Remove emulatorjs scripts
  document.querySelectorAll('script[src*="emulatorjs"]').forEach(s => s.remove());
}

document.addEventListener('keydown', e => { if(e.key==='Escape') closeGame(); });
document.getElementById('search').addEventListener('input', filterGames);
init();
</script>
</body>
</html>
