<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PICO-8 Player</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #000; overflow: hidden; }
        #canvas {
            display: block;
            image-rendering: optimizeSpeed;
            image-rendering: -moz-crisp-edges;
            image-rendering: -webkit-optimize-contrast;
            image-rendering: pixelated;
            -ms-interpolation-mode: nearest-neighbor;
        }
        #loading {
            position: fixed; inset: 0;
            display: flex; align-items: center; justify-content: center;
            font-family: monospace; color: #ffe066; font-size: 16px;
            background: #000; z-index: 10;
        }
        #loading.hidden { display: none; }
    </style>
</head>
<body>
    <div id="loading">loading cart...</div>
    <canvas id="canvas" width="128" height="128"></canvas>
    <script>
        // Module config (must be global var, not inside IIFE)
        var Module = {
            canvas: (function() { return document.getElementById('canvas'); })(),
            preRun: [],
            postRun: [],
            print: (function() { return function(text) { console.log(text); }; })(),
            printErr: function(text) { console.error(text); },
            totalDependencies: 0,
            monitorRunDependencies: function(left) {
                this.totalDependencies = Math.max(this.totalDependencies, left);
            }
        };

        // Prevent default touch behavior
        document.addEventListener('touchstart', function(e) { e.preventDefault(); }, { passive: false });
        document.addEventListener('touchmove', function(e) { e.preventDefault(); }, { passive: false });

        // Resize canvas
        function resizeCanvas() {
            var canvas = document.getElementById('canvas');
            var scale = Math.min(window.innerWidth / 128, window.innerHeight / 128);
            canvas.style.width = (128 * scale) + 'px';
            canvas.style.height = (128 * scale) + 'px';
            canvas.style.position = 'absolute';
            canvas.style.left = ((window.innerWidth - 128 * scale) / 2) + 'px';
            canvas.style.top = ((window.innerHeight - 128 * scale) / 2) + 'px';
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

    </script>
    <script>
        // Cart globals expected by pico8 runtime
        var _cartname = [];
        var _cdpos = 0;
        var iii = 0;
        var ciii = 0;
        var _cartdat = [];

        (function() {
            var params = new URLSearchParams(window.location.search);
            var cartUrl = params.get('cart');
            if (!cartUrl || !cartUrl.startsWith('/pico/carts/')) {
                document.getElementById('loading').textContent = 'invalid cart path';
                return;
            }

            // Decode .p8.png: extract cart data from pixel low bits
            var img = new Image();
            img.crossOrigin = 'anonymous';
            img.onload = function() {
                var c = document.createElement('canvas');
                c.width = img.width;
                c.height = img.height;
                var ctx = c.getContext('2d');
                ctx.drawImage(img, 0, 0);
                var data = ctx.getImageData(0, 0, img.width, img.height).data;
                var totalPixels = img.width * img.height;
                var cartSize = Math.min(32768, totalPixels);
                _cartdat = new Array(cartSize);
                for (var i = 0; i < cartSize; i++) {
                    var pi = i * 4;
                    var r = data[pi], g = data[pi+1], b = data[pi+2], a = data[pi+3];
                    _cartdat[i] = (a & 3) << 6 | (b & 3) << 4 | (g & 3) << 2 | (r & 3);
                }

                // Extract cart name from URL
                var parts = cartUrl.split('/');
                var name = decodeURIComponent(parts[parts.length - 1]);
                name = name.replace('.p8.png', '.p8');
                _cartname = [name];
                _cdpos = 0;

                // Hide loading
                document.getElementById('loading').classList.add('hidden');

                // Load the runtime
                var script = document.createElement('script');
                script.src = 'pico8-runtime.js';
                script.async = true;
                document.body.appendChild(script);
            };
            img.onerror = function() {
                document.getElementById('loading').textContent = 'failed to load cart';
            };
            img.src = cartUrl;
        })();
    </script>
</body>
</html>
