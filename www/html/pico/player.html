<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>PICO-8 Player</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            width: 100%;
            height: 100%;
            background: #000;
            overflow: hidden;
            overscroll-behavior: none;
            touch-action: none;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
        }
        body {
            background:
                radial-gradient(circle at top left, rgba(0,255,234,0.12), transparent 24%),
                radial-gradient(circle at top right, rgba(255,0,214,0.1), transparent 22%),
                #000;
        }
        #canvas {
            display: block;
            image-rendering: optimizeSpeed;
            image-rendering: -moz-crisp-edges;
            image-rendering: -webkit-optimize-contrast;
            image-rendering: pixelated;
            -ms-interpolation-mode: nearest-neighbor;
            touch-action: none;
        }
        .no-touch #canvas {
            width: 100% !important;
            height: 100% !important;
            object-fit: contain;
        }
        .has-touch {
            display: flex;
            flex-direction: column;
            height: 100%;
            padding: env(safe-area-inset-top, 0) env(safe-area-inset-right, 0) env(safe-area-inset-bottom, 0) env(safe-area-inset-left, 0);
        }
        .has-touch #canvas {
            width: 100% !important;
            flex: 1 1 auto;
            min-height: 0;
            object-fit: contain;
        }
        #loading {
            position: fixed;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: monospace;
            color: #ffe066;
            font-size: 16px;
            background: #000;
            z-index: 10;
            letter-spacing: 0;
            text-transform: uppercase;
        }
        #loading.hidden { display: none; }
        #touch-controls {
            display: none;
            flex: 0 0 auto;
            min-height: 154px;
            padding: 10px max(16px, env(safe-area-inset-right, 0)) max(10px, env(safe-area-inset-bottom, 0)) max(16px, env(safe-area-inset-left, 0));
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            touch-action: none;
        }
        .has-touch #touch-controls { display: flex; }
        .dpad {
            position: relative;
            width: 132px;
            height: 132px;
            flex: 0 0 auto;
        }
        .dpad-btn {
            position: absolute;
            width: 44px;
            height: 44px;
            background: rgba(255,230,0,0.14);
            border: 2px solid rgba(255,230,0,0.34);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: rgba(255,230,0,0.78);
            font-size: 18px;
            font-family: monospace;
            touch-action: none;
            box-shadow: 0 0 18px rgba(255,230,0,0.1);
        }
        .dpad-btn.active {
            background: rgba(255,230,0,0.34);
            border-color: rgba(255,230,0,0.9);
        }
        .dpad-up { top: 0; left: 44px; }
        .dpad-down { bottom: 0; left: 44px; }
        .dpad-left { top: 44px; left: 0; }
        .dpad-right { top: 44px; right: 0; }
        .utility-btns {
            display: flex;
            flex-direction: column;
            gap: 10px;
            align-items: center;
            justify-content: center;
            flex: 0 0 auto;
        }
        .utility-btn,
        .action-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: monospace;
            font-weight: 700;
            touch-action: none;
        }
        .utility-btn {
            min-width: 54px;
            height: 36px;
            padding: 0 10px;
            border-radius: 999px;
            border: 2px solid rgba(255,0,214,0.34);
            background: rgba(255,0,214,0.12);
            color: rgba(255,240,255,0.92);
            font-size: 11px;
            letter-spacing: 0;
        }
        .utility-btn.active {
            background: rgba(255,0,214,0.3);
            border-color: rgba(255,0,214,0.9);
        }
        .utility-btn.hidden { display: none; }
        .action-btns {
            display: flex;
            gap: 14px;
            align-items: center;
            flex: 0 0 auto;
        }
        .action-btn {
            width: 62px;
            height: 62px;
            border-radius: 50%;
            border: 2px solid rgba(0,255,234,0.45);
            background: rgba(0,255,234,0.12);
            color: rgba(0,255,234,0.84);
            font-size: 22px;
            box-shadow: 0 0 22px rgba(0,255,234,0.12);
        }
        .action-btn.active {
            background: rgba(0,255,234,0.36);
            border-color: rgba(0,255,234,0.88);
        }
        @media (orientation: landscape) and (max-height: 500px) {
            #touch-controls {
                min-height: 108px;
                padding-top: 6px;
                gap: 10px;
            }
            .dpad { width: 120px; height: 120px; }
            .dpad-btn { width: 40px; height: 40px; font-size: 14px; }
            .dpad-up { left: 40px; }
            .dpad-down { left: 40px; }
            .dpad-left { top: 40px; }
            .dpad-right { top: 40px; }
            .utility-btn { min-width: 52px; height: 44px; font-size: 10px; }
            .action-btn { width: 48px; height: 48px; font-size: 17px; }
        }
    </style>
</head>
<body>
    <div id="loading">loading cart...</div>
    <canvas id="canvas" width="128" height="128"></canvas>

    <div id="touch-controls">
        <div class="dpad" id="dpad">
            <div class="dpad-btn dpad-up" data-btn="up">&#9650;</div>
            <div class="dpad-btn dpad-down" data-btn="down">&#9660;</div>
            <div class="dpad-btn dpad-left" data-btn="left">&#9664;</div>
            <div class="dpad-btn dpad-right" data-btn="right">&#9654;</div>
        </div>
        <div class="utility-btns">
            <div class="utility-btn pause-btn" data-btn="pause">PAUSE</div>
            <button class="utility-btn fullscreen-btn hidden" id="fullscreen-btn" type="button">FULL</button>
        </div>
        <div class="action-btns">
            <div class="action-btn" data-btn="o">O</div>
            <div class="action-btn" data-btn="x">X</div>
        </div>
    </div>

    <script src="pako.min.js?v=10d2924"></script>
    <script src="UPNG.js?v=10d2924"></script>

    <script>
        var isTouchDevice = ('ontouchstart' in window) || (navigator.maxTouchPoints > 0);
        document.body.classList.add(isTouchDevice ? 'has-touch' : 'no-touch');

        if (!isTouchDevice) {
            var _canvas = document.getElementById('canvas');
            Object.defineProperty(_canvas.style, 'width', {
                set: function() {},
                get: function() { return '100%'; }
            });
            Object.defineProperty(_canvas.style, 'height', {
                set: function() {},
                get: function() { return '100%'; }
            });
        }

        var pico8_buttons = [0, 0, 0, 0, 0, 0, 0, 0];

        var btnBits = {
            left:  1,
            right: 2,
            up:    4,
            down:  8,
            o:     16,
            x:     32,
            pause: 64
        };

        function updateButton(name, pressed) {
            var bit = btnBits[name];
            if (!bit) return;
            if (pressed) {
                pico8_buttons[0] |= bit;
            } else {
                pico8_buttons[0] &= ~bit;
            }
            var el = document.querySelector('[data-btn="' + name + '"]');
            if (el) el.classList.toggle('active', pressed);
        }

        function handleTouch(e) {
            e.preventDefault();
            var currentlyPressed = {};

            for (var i = 0; i < e.touches.length; i++) {
                var touch = e.touches[i];
                var el = document.elementFromPoint(touch.clientX, touch.clientY);
                if (el && el.dataset && el.dataset.btn) {
                    currentlyPressed[el.dataset.btn] = true;
                }
            }

            Object.keys(btnBits).forEach(function(name) {
                updateButton(name, !!currentlyPressed[name]);
            });
        }

        function enterFullscreen() {
            var target = document.documentElement;
            var request = target.requestFullscreen || target.webkitRequestFullscreen || target.msRequestFullscreen;
            if (request) request.call(target);
        }

        if (isTouchDevice) {
            var controls = document.getElementById('touch-controls');
            controls.addEventListener('touchstart', handleTouch, { passive: false });
            controls.addEventListener('touchmove', handleTouch, { passive: false });
            controls.addEventListener('touchend', handleTouch, { passive: false });
            controls.addEventListener('touchcancel', handleTouch, { passive: false });

            var fullscreenBtn = document.getElementById('fullscreen-btn');
            var canFullscreen = !!(document.documentElement.requestFullscreen || document.documentElement.webkitRequestFullscreen || document.documentElement.msRequestFullscreen);
            if (canFullscreen) {
                fullscreenBtn.classList.remove('hidden');
                fullscreenBtn.addEventListener('click', function(e) {
                    e.preventDefault();
                    enterFullscreen();
                }, { passive: false });
            }
        }

        var Module = {
            canvas: (function() { return document.getElementById('canvas'); })(),
            preRun: [],
            postRun: [],
            print: (function() { return function(text) { console.log(text); }; })(),
            printErr: function(text) { console.error(text); },
            totalDependencies: 0,
            monitorRunDependencies: function(left) {
                this.totalDependencies = Math.max(this.totalDependencies, left);
            }
        };

        document.getElementById('canvas').addEventListener('touchstart', function(e) { e.preventDefault(); }, { passive: false });
        document.getElementById('canvas').addEventListener('touchmove', function(e) { e.preventDefault(); }, { passive: false });
    </script>
    <script>
        var _cartname = [];
        var _cdpos = 0;
        var iii = 0;
        var ciii = 0;
        var _cartdat = [];

        (function() {
            var params = new URLSearchParams(window.location.search);
            var cartUrl = params.get('cart');
            if (!cartUrl || !cartUrl.startsWith('/pico/carts/')) {
                document.getElementById('loading').textContent = 'invalid cart path';
                return;
            }

            fetch(cartUrl)
                .then(function(r) { return r.arrayBuffer(); })
                .then(function(buffer) {
                    var img = UPNG.decode(buffer);
                    var rgba = new Uint8Array(UPNG.toRGBA8(img)[0]);

                    var totalPixels = img.width * img.height;
                    var cartSize = Math.min(32768, totalPixels);
                    _cartdat = new Array(cartSize);

                    for (var i = 0; i < cartSize; i++) {
                        var pi = i * 4;
                        var r = rgba[pi], g = rgba[pi+1], b = rgba[pi+2], a = rgba[pi+3];
                        _cartdat[i] = (b & 3) | ((g & 3) << 2) | ((r & 3) << 4) | ((a & 3) << 6);
                    }

                    var parts = cartUrl.split('/');
                    var name = decodeURIComponent(parts[parts.length - 1]);
                    name = name.replace('.p8.png', '.p8');
                    _cartname = [name];
                    _cdpos = 0;

                    document.getElementById('loading').classList.add('hidden');

                    var script = document.createElement('script');
                    script.src = 'pico8-runtime.js?v=10d2924';
                    script.async = true;
                    document.body.appendChild(script);
                })
                .catch(function(e) {
                    console.error('Cart load error:', e);
                    document.getElementById('loading').textContent = 'failed to load cart';
                });
        })();
    </script>
</body>
</html>
