<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="robots" content="noindex,nofollow,noarchive,nosnippet,noimageindex">
  <title>Claude Deck</title>
  <link rel="icon" href="/deck/favicon.svg" type="image/svg+xml">
  <style>
    :root {
      color-scheme: dark;
      --bg: #0b1011;
      --bg-2: #101717;
      --panel: #151c1d;
      --panel-2: #1c2627;
      --line: rgba(247,236,216,.13);
      --line-strong: rgba(247,236,216,.22);
      --text: #f7ecd8;
      --muted: rgba(247,236,216,.68);
      --soft: rgba(247,236,216,.44);
      --ink-rgb: 11,16,17;
      --panel-rgb: 21,28,29;
      --panel-2-rgb: 28,38,39;
      --cream-rgb: 247,236,216;
      --gold: #f0b85a;
      --gold-rgb: 240,184,90;
      --green: #6be2af;
      --green-rgb: 107,226,175;
      --blue: #8aa6d8;
      --blue-rgb: 138,166,216;
      --coral: #ff7a5c;
      --coral-rgb: 255,122,92;
      --danger: #ff5470;
      --danger-rgb: 255,84,112;
      --teal: var(--green);
      --amber: var(--gold);
      --shadow: 0 18px 50px rgba(0,0,0,.34);
      --radius: 8px;
      --mono: ui-monospace, "SF Mono", SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      font-family: var(--mono);
      font-variant-ligatures: none;
      font-feature-settings: "zero" 1;
    }

    * { box-sizing: border-box; letter-spacing: 0; }
    html, body { width: 100%; min-height: 100%; margin: 0; }
    body {
      background:
        linear-gradient(90deg, rgba(var(--cream-rgb),.028) 1px, transparent 1px),
        linear-gradient(180deg, var(--bg) 0%, var(--bg-2) 48%, #0d1312 100%);
      background-size: 42px 42px, 100% 100%;
      color: var(--text);
      overflow: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background: linear-gradient(rgba(var(--cream-rgb),.024) 50%, transparent 50%);
      background-size: 100% 4px;
      opacity: .2;
      mix-blend-mode: screen;
    }

    button, textarea, select { font: inherit; }
    button {
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      transition: transform .16s ease, border-color .16s ease, background-color .16s ease, color .16s ease, opacity .16s ease;
    }

    button:active { transform: translateY(1px); }
    button:focus-visible,
    textarea:focus-visible,
    select:focus-visible {
      outline: 2px solid rgba(var(--green-rgb),.72);
      outline-offset: 2px;
    }

    .app {
      height: 100dvh;
      display: grid;
      grid-template-rows: auto 1fr auto;
      overflow: hidden;
    }

    .topbar {
      padding: calc(12px + env(safe-area-inset-top)) 14px 10px;
      border-bottom: 1px solid var(--line);
      background: rgba(var(--ink-rgb),.9);
      backdrop-filter: blur(18px);
      box-shadow: 0 12px 30px rgba(0,0,0,.24);
      z-index: 3;
    }

    .topline {
      min-height: 44px;
      display: grid;
      grid-template-columns: 44px 1fr auto;
      align-items: center;
      gap: 10px;
    }

    .top-actions {
      display: flex;
      gap: 6px;
    }

    .icon-btn,
    .send,
    .mode,
    .hold,
    .select {
      min-height: 44px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      color: var(--text);
      background: rgba(var(--cream-rgb),.045);
    }

    .icon-btn {
      width: 44px;
      display: inline-grid;
      place-items: center;
      text-decoration: none;
      font-size: 22px;
    }

    h1 {
      margin: 0;
      font-size: 20px;
      line-height: 1.1;
      color: var(--amber);
    }

    .title {
      min-width: 0;
      display: grid;
      gap: 4px;
    }

    .status {
      min-height: 22px;
      display: inline-flex;
      align-items: center;
      gap: 7px;
      border: 1px solid rgba(var(--green-rgb),.3);
      border-radius: 999px;
      padding: 3px 8px;
      color: var(--muted);
      font-size: 12px;
      white-space: nowrap;
      background: rgba(var(--green-rgb),.075);
      width: max-content;
      max-width: 100%;
    }

    .dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--teal);
      box-shadow: 0 0 12px rgba(var(--green-rgb),.72);
    }

    .status.bad {
      border-color: rgba(var(--danger-rgb),.38);
      background: rgba(var(--danger-rgb),.09);
    }

    .status.bad .dot {
      background: var(--danger);
      box-shadow: 0 0 12px rgba(var(--danger-rgb),.75);
    }


    .transcript {
      overflow-y: auto;
      padding: 16px 12px 120px;
      scroll-behavior: smooth;
    }

    .empty {
      max-width: 620px;
      margin: 10vh auto 0;
      border: 1px solid rgba(var(--gold-rgb),.24);
      background: linear-gradient(180deg, rgba(var(--panel-2-rgb),.92), rgba(var(--ink-rgb),.88));
      border-radius: var(--radius);
      padding: 16px;
      box-shadow: var(--shadow);
    }

    .empty-kicker {
      color: var(--green);
      font-size: 12px;
      font-weight: 800;
      text-transform: uppercase;
    }

    .empty-title {
      font-size: 24px;
      line-height: 1.05;
      font-weight: 800;
      color: var(--amber);
      margin-bottom: 10px;
    }

    .empty-art {
      margin: 0 0 12px;
      color: rgba(var(--blue-rgb),.78);
      font-family: var(--mono);
      font-size: 12px;
      line-height: 1.1;
      white-space: pre;
    }

    .empty-actions {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
    }

    .prompt-chip {
      min-height: 44px;
      border: 1px solid rgba(var(--cream-rgb),.13);
      border-radius: var(--radius);
      padding: 9px 10px;
      color: var(--text);
      background: rgba(var(--cream-rgb),.052);
      text-align: left;
      font-weight: 750;
      display: grid;
      gap: 2px;
    }

    .chip-main {
      color: var(--text);
      font-size: 13px;
      line-height: 1.1;
    }

    .chip-sub {
      color: var(--soft);
      font-size: 11px;
      line-height: 1.15;
      font-weight: 650;
    }

    .prompt-chip:active {
      transform: translateY(1px);
      border-color: rgba(var(--blue-rgb),.56);
      background: rgba(var(--blue-rgb),.11);
    }

    .prompt-chip:disabled {
      cursor: not-allowed;
      opacity: .42;
    }

    .msg {
      width: min(100%, 760px);
      margin: 0 auto 12px;
      display: grid;
      gap: 5px;
    }

    .msg.user { justify-items: end; }
    .msg.assistant { justify-items: start; }

    .label {
      color: var(--soft);
      font-size: 12px;
      padding: 0 4px;
    }

    .bubble {
      max-width: min(88vw, 680px);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 12px 13px;
      white-space: pre-wrap;
      overflow-wrap: anywhere;
      line-height: 1.55;
      font-size: 16px;
      box-shadow: 0 10px 24px rgba(0,0,0,.18);
    }

    .user .bubble {
      max-width: min(82vw, 560px);
      background: rgba(var(--blue-rgb),.13);
      border-color: rgba(var(--blue-rgb),.34);
    }

    .assistant .bubble {
      background: rgba(var(--panel-rgb),.9);
      border-color: rgba(var(--gold-rgb),.22);
    }

    .assistant.streaming .bubble {
      border-color: rgba(var(--green-rgb),.38);
      box-shadow: 0 10px 28px rgba(var(--green-rgb),.08);
    }

    .assistant.thinking .bubble {
      color: var(--soft);
      font-style: italic;
      animation: breathe 1.8s ease-in-out infinite;
      border-color: rgba(var(--green-rgb),.42);
      box-shadow: 0 0 12px rgba(var(--green-rgb),.16);
    }

    @keyframes breathe {
      0%, 100% { opacity: 0.6; }
      50% { opacity: 1; }
    }

    .spending-bar {
      margin-top: 10px;
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 6px 8px;
      border: 1px solid rgba(var(--green-rgb),.24);
      border-radius: var(--radius);
      background: rgba(var(--green-rgb),.06);
      font-size: 13px;
    }

    .spending-label {
      color: var(--soft);
      font-weight: 600;
    }

    .spending-amount {
      color: var(--green);
      font-weight: 800;
    }

    .msg.system {
      justify-items: center;
    }

    .bubble-wrapper {
      position: relative;
      display: grid;
      gap: 6px;
      align-items: start;
    }

    .copy-btn {
      opacity: 0;
      transition: opacity .2s ease;
      width: 32px;
      height: 32px;
      min-height: 0;
      padding: 6px;
      font-size: 14px;
      border-color: rgba(var(--green-rgb),.3);
      background: rgba(var(--green-rgb),.08);
      color: var(--green);
      align-self: start;
      margin-top: 2px;
    }

    .copy-btn:hover {
      border-color: rgba(var(--green-rgb),.54);
      background: rgba(var(--green-rgb),.15);
    }

    .copy-btn.copied {
      color: var(--text);
      border-color: rgba(var(--green-rgb),.7);
      background: rgba(var(--green-rgb),.18);
    }

    .assistant .bubble-wrapper:hover .copy-btn {
      opacity: 1;
    }

    @media (max-width: 520px) {
      .copy-btn {
        opacity: 1;
      }
    }

    .system .bubble {
      max-width: min(92vw, 620px);
      padding: 8px 11px;
      background: rgba(var(--coral-rgb),.08);
      border-color: rgba(var(--coral-rgb),.26);
      color: var(--muted);
      font-size: 13px;
    }

    .composer {
      padding: 10px 12px calc(10px + env(safe-area-inset-bottom));
      border-top: 1px solid var(--line);
      background: rgba(var(--ink-rgb),.93);
      backdrop-filter: blur(18px);
      z-index: 4;
    }

    .full-arm {
      display: none;
      margin: 0 auto 8px;
      width: min(100%, 760px);
      grid-template-columns: 1fr 96px;
      gap: 8px;
      align-items: center;
    }

    .full-arm.show { display: grid; }

    .arm-copy {
      color: var(--soft);
      font-size: 12px;
      line-height: 1.25;
    }

    .hold {
      position: relative;
      overflow: hidden;
      color: var(--danger);
      border-color: rgba(var(--danger-rgb),.5);
      background:
        linear-gradient(90deg, rgba(var(--danger-rgb),.32), rgba(var(--danger-rgb),.32)) 0 0 / 0% 100% no-repeat,
        rgba(var(--danger-rgb),.09);
      font-size: 12px;
      font-weight: 800;
      transition: background-size .9s linear;
    }

    .hold.charging { background-size: 100% 100%, auto; }

    .hold.armed {
      color: #180b0e;
      background: var(--danger);
      border-color: var(--danger);
    }

    .hold.pending {
      color: var(--amber);
      border-color: rgba(var(--gold-rgb),.5);
      background:
        linear-gradient(90deg, rgba(var(--gold-rgb),.24), rgba(var(--gold-rgb),.24)) 0 0 / 100% 100% no-repeat,
        rgba(var(--gold-rgb),.08);
    }

    .compose-row {
      width: min(100%, 760px);
      margin: 0 auto;
      display: grid;
      grid-template-columns: 1fr 50px 58px;
      gap: 8px;
      align-items: end;
    }

    textarea {
      min-height: 50px;
      max-height: 180px;
      resize: none;
      border: 1px solid rgba(var(--cream-rgb),.16);
      border-radius: var(--radius);
      padding: 13px 12px;
      color: var(--text);
      background: rgba(var(--panel-rgb),.96);
      outline: none;
      line-height: 1.35;
      font-size: 16px;
    }

    textarea:focus {
      border-color: rgba(var(--blue-rgb),.6);
      box-shadow: 0 0 0 3px rgba(var(--blue-rgb),.12);
    }

    .send {
      width: 58px;
      height: 50px;
      border-color: rgba(var(--green-rgb),.48);
      background: rgba(var(--green-rgb),.16);
      color: var(--text);
      font-size: 20px;
      font-weight: 900;
    }

    .mic {
      width: 50px;
      height: 50px;
      border-color: rgba(var(--blue-rgb),.42);
      color: var(--blue);
      background: rgba(var(--blue-rgb),.1);
      font-size: 18px;
    }

    .mic.recording {
      border-color: rgba(var(--coral-rgb),.7);
      color: var(--coral);
      background: rgba(var(--coral-rgb),.14);
      box-shadow: 0 0 0 3px rgba(var(--coral-rgb),.1);
    }

    .send.running {
      border-color: rgba(var(--gold-rgb),.5);
      background: rgba(var(--gold-rgb),.14);
      color: var(--amber);
    }

    .send:disabled,
    .mic:disabled,
    .icon-btn:disabled,
    .icon-btn.disabled {
      opacity: .45;
      pointer-events: none;
    }

    .stop {
      border-color: rgba(var(--danger-rgb),.46);
      color: var(--danger);
    }

    .voice.on {
      border-color: rgba(var(--green-rgb),.54);
      color: var(--teal);
      background: rgba(var(--green-rgb),.12);
    }

    @media (min-width: 720px) {
      .topbar { padding-left: 20px; padding-right: 20px; }
      .transcript { padding-left: 20px; padding-right: 20px; }
      .composer { padding-left: 20px; padding-right: 20px; }
      h1 { font-size: 23px; }
    }

    @media (hover: hover) and (pointer: fine) {
      .icon-btn:hover,
      .mode:hover,
      .prompt-chip:hover,
      .hold:hover {
        border-color: var(--line-strong);
        background: rgba(var(--cream-rgb),.07);
      }

      .send:hover {
        border-color: rgba(var(--green-rgb),.62);
        background: rgba(var(--green-rgb),.22);
      }

      .mic:hover {
        border-color: rgba(var(--blue-rgb),.62);
        background: rgba(var(--blue-rgb),.16);
      }

      .mode.active:hover {
        border-color: rgba(var(--gold-rgb),.68);
        background: rgba(var(--gold-rgb),.16);
      }

      .mode[data-mode="full"].active:hover,
      .hold.armed:hover {
        border-color: rgba(var(--danger-rgb),.76);
        background: rgba(var(--danger-rgb),.18);
      }

      .stop:hover,
      .hold:hover {
        border-color: rgba(var(--danger-rgb),.58);
        background: rgba(var(--danger-rgb),.12);
      }

      .voice.on:hover {
        border-color: rgba(var(--green-rgb),.66);
        background: rgba(var(--green-rgb),.16);
      }
    }

    @media (max-width: 390px) {
      .topbar { padding-left: 10px; padding-right: 10px; }
      .empty-actions { grid-template-columns: 1fr; }
    }

    @media (prefers-reduced-motion: reduce) {
      * { scroll-behavior: auto !important; transition: none !important; }
    }
  </style>
</head>
<body>
  <main class="app">
    <header class="topbar">
      <div class="topline">
        <a class="icon-btn" href="/deck/" aria-label="Back">‹</a>
        <div class="title">
          <h1>Claude Deck</h1>
          <div class="status" id="statusPill"><span class="dot"></span><span id="statusText">checking</span></div>
        </div>
        <div class="top-actions">
          <button class="icon-btn voice" id="speakerBtn" type="button" aria-label="Speak replies" aria-pressed="false">♪</button>
          <button class="icon-btn" id="newBtn" type="button" aria-label="New chat">＋</button>
          <button class="icon-btn stop" id="stopBtn" type="button" aria-label="Stop">■</button>
        </div>
      </div>
    </header>

    <section class="transcript" id="transcript" aria-live="polite">
      <div class="empty" id="empty">
        <div class="empty-kicker" id="emptyKicker">pibulus-os · plan</div>
        <pre class="empty-art" aria-hidden="true">┌─ deck link ─┐
│  ◉     ◉    │
│    ▔▔▔      │
└─────────────┘</pre>
        <div class="empty-title">Ready</div>
        <div class="empty-actions">
          <button class="prompt-chip" type="button" data-prompt="Check Pi health, storage, recent warnings, and the public Quick Cat routes. Summarize what needs attention first."><span class="chip-main">Health sweep</span><span class="chip-sub">Pi + public routes</span></button>
          <button class="prompt-chip" type="button" data-prompt="Inspect recent changes in /home/pibulus/pibulus-os and tell me what is dirty, risky, or ready to commit."><span class="chip-main">Repo pulse</span><span class="chip-sub">dirty files + next move</span></button>
          <button class="prompt-chip" type="button" data-prompt="Look at the running services and containers. Flag anything noisy, stuck, or safe to leave alone."><span class="chip-main">Service scan</span><span class="chip-sub">containers + timers</span></button>
          <button class="prompt-chip" type="button" data-prompt="Plan the next smallest safe improvement for the Pi. Do not change files yet."><span class="chip-main">Plan move</span><span class="chip-sub">no edits yet</span></button>
        </div>
      </div>
    </section>

    <footer class="composer">
      <div class="full-arm" id="fullArm">
        <div class="arm-copy" id="armCopy">Full mode can edit in pibulus-os.</div>
        <button class="hold" id="holdBtn" type="button">HOLD</button>
      </div>
      <div class="spending-bar">
        <span class="spending-label">chat cost:</span>
        <span class="spending-amount" id="spendingAmount">$0.00</span>
      </div>
      <form class="compose-row" id="form">
        <textarea id="input" rows="1" maxlength="12000" placeholder="Message Claude" enterkeyhint="send" autocomplete="off" autocapitalize="sentences" spellcheck="true"></textarea>
        <button class="mic" id="micBtn" type="button" aria-label="Dictate">◉</button>
        <button class="send" id="sendBtn" type="submit" aria-label="Send">›</button>
      </form>
    </footer>
  </main>

  <script>
    const api = '/claude/api';
    const transcript = document.getElementById('transcript');
    const empty = document.getElementById('empty');
    const emptyKicker = document.getElementById('emptyKicker');
    const form = document.getElementById('form');
    const input = document.getElementById('input');
    const sendBtn = document.getElementById('sendBtn');
    const micBtn = document.getElementById('micBtn');
    const speakerBtn = document.getElementById('speakerBtn');
    const newBtn = document.getElementById('newBtn');
    const stopBtn = document.getElementById('stopBtn');
    const fullArm = document.getElementById('fullArm');
    const armCopy = document.getElementById('armCopy');
    const holdBtn = document.getElementById('holdBtn');
    const statusPill = document.getElementById('statusPill');
    const statusText = document.getElementById('statusText');
    const spendingAmount = document.getElementById('spendingAmount');
    const promptChips = [...document.querySelectorAll('.prompt-chip')];

    let csrf = '';
    let chatId = localStorage.getItem('pibulus.claude.chatId') || '';
    const mode = 'auto';
    const workspace = 'pibulus-os';
    let running = false;
    let authReady = false;
    let fullArmed = false;
    let armToken = '';
    let armExpiresAt = 0;
    let armPending = false;
    let holdTimer = null;
    let currentBubble = null;
    let currentReplyText = '';
    let chatCost = 0;
    let speakEnabled = localStorage.getItem('pibulus.claude.speak') === '1';
    let speaking = false;
    let preferredVoice = null;
    let recognition = null;
    let dictating = false;
    let dictateBaseText = '';
    let dictateFinalText = '';
    let dictationHadResult = false;
    const canSpeak = 'speechSynthesis' in window && 'SpeechSynthesisUtterance' in window;
    const Recognition = window.SpeechRecognition || window.webkitSpeechRecognition || null;
    const canDictate = Boolean(Recognition);

    const audioContext = new (window.AudioContext || window.webkitAudioContext)();
    function playSound(f, d) {
      try {
        const osc = audioContext.createOscillator();
        const gain = audioContext.createGain();
        osc.connect(gain); gain.connect(audioContext.destination);
        osc.frequency.setValueAtTime(f, audioContext.currentTime);
        gain.gain.setValueAtTime(0.08, audioContext.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + d);
        osc.start(audioContext.currentTime);
        osc.stop(audioContext.currentTime + d);
      } catch (_) {}
    }
    function beepSend() { playSound(800, 0.1); }
    function beepThinking() { playSound(400, 0.08); setTimeout(() => playSound(520, 0.08), 80); }
    function beepDone() { playSound(600, 0.08); setTimeout(() => playSound(420, 0.08), 80); }

    function setRunning(value) {
      running = value;
      sendBtn.disabled = value || !authReady;
      sendBtn.classList.toggle('running', value);
      sendBtn.textContent = value ? '…' : '›';
      stopBtn.disabled = !value;
      stopBtn.classList.toggle('disabled', !value);
      stopBtn.setAttribute('aria-disabled', String(!value));
      form.setAttribute('aria-busy', String(value));
      syncMicButton();
    }

    function syncSpeakerButton() {
      speakerBtn.disabled = !canSpeak;
      speakerBtn.classList.toggle('on', speakEnabled && canSpeak);
      speakerBtn.textContent = speakEnabled && canSpeak ? '♫' : '♪';
      speakerBtn.setAttribute('aria-pressed', String(speakEnabled && canSpeak));
      speakerBtn.setAttribute('aria-label', speakEnabled && canSpeak ? 'Mute replies' : 'Speak replies');
    }

    function fitInput() {
      input.style.height = 'auto';
      input.style.height = Math.min(input.scrollHeight, 180) + 'px';
      setTimeout(() => { input.scrollTop = input.scrollHeight; }, 0);
    }

    function setComposerText(text, focus = false) {
      const max = Number(input.maxLength) > 0 ? Number(input.maxLength) : 12000;
      input.value = String(text || '').slice(0, max);
      fitInput();
      if (focus) input.focus();
    }

    function syncMicButton() {
      micBtn.disabled = !authReady || running || !canDictate;
      micBtn.classList.toggle('recording', dictating);
      micBtn.textContent = dictating ? '■' : '◉';
      micBtn.setAttribute('aria-pressed', String(dictating));
      micBtn.setAttribute('aria-label', dictating ? 'Stop dictation' : 'Dictate');
    }

    function composeDictation(interim = '') {
      const pieces = [dictateBaseText, dictateFinalText, interim]
        .map(value => String(value || '').trim())
        .filter(Boolean);
      setComposerText(pieces.join(' '), true);
    }

    function endDictation() {
      dictating = false;
      dictateBaseText = '';
      dictateFinalText = '';
      dictationHadResult = false;
      input.placeholder = authReady ? 'Ask / steer / ship' : 'Needs Claude key';
      syncMicButton();
    }

    function stopDictation({ abort = false } = {}) {
      if (!recognition || !dictating) return;
      try {
        abort ? recognition.abort() : recognition.stop();
      } catch (_) {}
      if (abort) endDictation();
    }

    function ensureRecognition() {
      if (!canDictate) return null;
      if (recognition) return recognition;
      recognition = new Recognition();
      recognition.continuous = true;
      recognition.interimResults = true;
      recognition.maxAlternatives = 1;
      recognition.lang = navigator.language || 'en-AU';

      recognition.onstart = () => {
        dictating = true;
        dictationHadResult = false;
        input.placeholder = 'listening';
        syncMicButton();
      };

      recognition.onresult = event => {
        let interim = '';
        dictationHadResult = true;
        for (let index = event.resultIndex; index < event.results.length; index += 1) {
          const result = event.results[index];
          const text = result[0]?.transcript || '';
          if (result.isFinal) {
            dictateFinalText = `${dictateFinalText} ${text}`.trim();
          } else {
            interim = `${interim} ${text}`.trim();
          }
        }
        composeDictation(interim);
      };

      recognition.onerror = event => {
        const error = event.error || 'speech error';
        if (!['aborted', 'no-speech'].includes(error)) {
          const message = error === 'not-allowed' || error === 'service-not-allowed'
            ? 'mic permission was blocked'
            : `voice input ${error}`;
          addSystem(message);
        } else if (error === 'no-speech' && !dictationHadResult) {
          addSystem('no speech caught');
        }
        endDictation();
      };

      recognition.onend = endDictation;
      return recognition;
    }

    function startDictation() {
      if (!canDictate) {
        addSystem('voice input is not available in this browser');
        return;
      }
      if (!authReady || running) return;
      cancelSpeech();
      dictateBaseText = input.value.trim();
      dictateFinalText = '';
      dictationHadResult = false;
      const recognizer = ensureRecognition();
      dictating = true;
      input.placeholder = 'listening';
      syncMicButton();
      try {
        recognizer.start();
      } catch (_) {
        stopDictation({ abort: true });
        setTimeout(() => {
          if (!authReady || running) return;
          dictating = true;
          input.placeholder = 'listening';
          syncMicButton();
          try {
            recognizer.start();
          } catch (err) {
            endDictation();
            addSystem(err.message || 'voice input could not start');
          }
        }, 120);
      }
    }

    function pickVoice() {
      if (!canSpeak) return null;
      const voices = window.speechSynthesis.getVoices();
      preferredVoice =
        voices.find(voice => /Samantha|Karen|Daniel|Serena/i.test(voice.name)) ||
        voices.find(voice => /^en-AU\b/i.test(voice.lang)) ||
        voices.find(voice => /^en-GB\b/i.test(voice.lang)) ||
        voices.find(voice => /^en\b/i.test(voice.lang)) ||
        null;
      return preferredVoice;
    }

    function speechChunks(text) {
      const cleaned = String(text || '')
        .replace(/```[\s\S]*?```/g, ' code block in chat. ')
        .replace(/`([^`]+)`/g, '$1')
        .replace(/https?:\/\/\S+/g, ' link ')
        .replace(/[#>*_~|[\]{}]/g, ' ')
        .replace(/\s+/g, ' ')
        .trim();
      if (!cleaned) return [];
      const sentences = cleaned.match(/[^.!?]+[.!?]+|\S.+$/g) || [cleaned];
      const chunks = [];
      let current = '';
      sentences.forEach(sentence => {
        const next = current ? `${current} ${sentence.trim()}` : sentence.trim();
        if (next.length <= 230) {
          current = next;
          return;
        }
        if (current) chunks.push(current);
        current = '';
        const words = sentence.trim().split(/\s+/);
        let part = '';
        words.forEach(word => {
          const candidate = part ? `${part} ${word}` : word;
          if (candidate.length > 230) {
            if (part) chunks.push(part);
            part = word;
          } else {
            part = candidate;
          }
        });
        if (part) current = part;
      });
      if (current) chunks.push(current);
      return chunks.slice(0, 48);
    }

    function cancelSpeech() {
      if (!canSpeak) return;
      speaking = false;
      window.speechSynthesis.cancel();
      syncSpeakerButton();
    }

    function speakText(text, options = {}) {
      if (!canSpeak || (!speakEnabled && !options.force)) return;
      const chunks = speechChunks(text);
      if (!chunks.length) return;
      window.speechSynthesis.cancel();
      speaking = true;
      syncSpeakerButton();
      let index = 0;
      const voice = preferredVoice || pickVoice();
      const next = () => {
        if (!speaking || (!speakEnabled && !options.force) || index >= chunks.length) {
          speaking = false;
          syncSpeakerButton();
          return;
        }
        const utterance = new SpeechSynthesisUtterance(chunks[index]);
        index += 1;
        utterance.rate = 0.96;
        utterance.pitch = 1;
        utterance.volume = 1;
        if (voice) {
          utterance.voice = voice;
          utterance.lang = voice.lang || 'en-AU';
        } else {
          utterance.lang = 'en-AU';
        }
        utterance.onend = next;
        utterance.onerror = () => {
          speaking = false;
          syncSpeakerButton();
        };
        window.speechSynthesis.speak(utterance);
      };
      next();
    }

    function syncControls() {
      input.disabled = !authReady;
      sendBtn.disabled = running || !authReady;
      syncMicButton();
      promptChips.forEach(btn => { btn.disabled = !authReady; });
    }

    function clearFullArm() {
      fullArmed = false;
      armToken = '';
      armExpiresAt = 0;
      armPending = false;
      if (holdTimer) clearTimeout(holdTimer);
      holdTimer = null;
      holdBtn.classList.remove('armed', 'charging', 'pending');
      holdBtn.textContent = 'HOLD';
    }

    function scrollDown() {
      transcript.scrollTop = transcript.scrollHeight;
    }

    function clearEmpty() {
      if (empty) empty.remove();
    }

    function addMessage(role, text, label) {
      clearEmpty();
      const wrap = document.createElement('div');
      wrap.className = `msg ${role}`;
      const small = document.createElement('div');
      small.className = 'label';
      small.textContent = label || (role === 'user' ? 'you' : role);
      const bubble = document.createElement('div');
      bubble.className = 'bubble';
      bubble.textContent = text || '';

      if (role === 'assistant') {
        const bubbleWrapper = document.createElement('div');
        bubbleWrapper.className = 'bubble-wrapper';
        const copyBtn = document.createElement('button');
        copyBtn.type = 'button';
        copyBtn.className = 'copy-btn';
        copyBtn.innerHTML = '📋';
        copyBtn.setAttribute('aria-label', 'Copy');
        copyBtn.addEventListener('click', async () => {
          try {
            await navigator.clipboard.writeText(bubble.textContent);
            copyBtn.classList.add('copied');
            copyBtn.innerHTML = '✓';
            setTimeout(() => {
              copyBtn.classList.remove('copied');
              copyBtn.innerHTML = '📋';
            }, 1800);
          } catch (e) {
            console.log('Copy failed:', e);
          }
        });
        bubbleWrapper.append(bubble, copyBtn);
        wrap.append(small, bubbleWrapper);
      } else {
        wrap.append(small, bubble);
      }

      transcript.appendChild(wrap);
      scrollDown();
      return bubble;
    }

    function appendAssistant(text) {
      if (!currentBubble) currentBubble = addMessage('assistant', '', 'claude');
      if (currentBubble.dataset.placeholder === 'true') {
        currentBubble.textContent = '';
        delete currentBubble.dataset.placeholder;
        currentBubble.closest('.msg')?.classList.remove('thinking');
      }
      currentBubble.textContent += text;
      currentReplyText += text;
      currentBubble.closest('.msg')?.classList.add('streaming');
      scrollDown();
    }

    function startAssistantPlaceholder() {
      beepThinking();
      currentBubble = addMessage('assistant', 'thinking', 'claude');
      currentReplyText = '';
      currentBubble.dataset.placeholder = 'true';
      currentBubble.closest('.msg')?.classList.add('streaming', 'thinking');
    }

    function addSystem(text) {
      currentBubble = null;
      addMessage('system', text, 'system');
    }

    function saveChatId(id) {
      chatId = id || chatId;
      if (chatId) localStorage.setItem('pibulus.claude.chatId', chatId);
    }

    async function bootstrap() {
      const res = await fetch(`${api}/bootstrap`, { credentials: 'same-origin', cache: 'no-store' });
      if (!res.ok) throw new Error(`bootstrap ${res.status}`);
      const data = await res.json();
      csrf = data.csrf;
      authReady = Boolean(data.claude_auth && data.claude_auth.ok);
      setRunning(Boolean(data.active));
      input.maxLength = data.max_prompt_chars || 12000;
      statusPill.classList.toggle('bad', !authReady);
      statusText.textContent = authReady ? 'online' : 'needs key';
      input.placeholder = authReady ? 'Ask / steer / ship' : 'Needs Claude key';
      syncControls();
      syncSpeakerButton();
      if (!authReady) addSystem('Claude needs its key before this deck can talk.');
    }

    promptChips.forEach(btn => {
      btn.addEventListener('click', () => {
        if (!authReady) return;
        stopDictation({ abort: true });
        setComposerText(btn.dataset.prompt || '', true);
      });
    });

    input.addEventListener('input', fitInput);

    async function armFullMode() {
      if (armPending || running) return;
      armPending = true;
      holdBtn.classList.remove('charging');
      holdBtn.classList.add('pending');
      holdBtn.textContent = '...';
      try {
        const res = await fetch(`${api}/arm`, {
          method: 'POST',
          credentials: 'same-origin',
          headers: { 'Content-Type': 'application/json', 'X-PIBULUS-CSRF': csrf },
          body: JSON.stringify({ workspace })
        });
        if (!res.ok) throw new Error(`arm ${res.status}`);
        const data = await res.json();
        armToken = data.arm_token || '';
        armExpiresAt = Date.now() + ((data.expires_in || 60) * 1000);
        fullArmed = Boolean(armToken);
        holdBtn.classList.toggle('armed', fullArmed);
        holdBtn.textContent = fullArmed ? 'NEXT' : 'HOLD';
      } catch (err) {
        clearFullArm();
        addSystem('Full could not arm.');
      } finally {
        armPending = false;
        holdBtn.classList.remove('pending');
      }
    }

    holdBtn.addEventListener('pointerdown', () => {
      clearFullArm();
      holdBtn.textContent = 'HOLD';
      holdBtn.classList.add('charging');
      holdTimer = setTimeout(armFullMode, 900);
    });

    ['pointerup', 'pointercancel', 'pointerleave'].forEach(name => {
      holdBtn.addEventListener(name, () => {
        if (holdTimer) clearTimeout(holdTimer);
        holdTimer = null;
        holdBtn.classList.remove('charging');
        if (!fullArmed) holdBtn.textContent = 'HOLD';
      });
    });

    async function stopRun() {
      if (!running) return;
      await fetch(`${api}/stop`, {
        method: 'POST',
        credentials: 'same-origin',
        headers: { 'Content-Type': 'application/json', 'X-PIBULUS-CSRF': csrf },
        body: JSON.stringify({ chat_id: chatId })
      }).catch(() => {});
      addSystem('stop requested');
    }

    stopBtn.addEventListener('click', stopRun);

    micBtn.addEventListener('click', () => {
      if (dictating) {
        stopDictation();
      } else {
        startDictation();
      }
    });

    speakerBtn.addEventListener('click', () => {
      if (!canSpeak) {
        addSystem('speech is not available in this browser');
        return;
      }
      speakEnabled = !speakEnabled;
      localStorage.setItem('pibulus.claude.speak', speakEnabled ? '1' : '0');
      if (!speakEnabled) {
        cancelSpeech();
        return;
      }
      syncSpeakerButton();
      pickVoice();
      speakText('voice on', { force: true });
    });

    newBtn.addEventListener('click', () => {
      chatId = '';
      currentBubble = null;
      currentReplyText = '';
      stopDictation({ abort: true });
      cancelSpeech();
      clearFullArm();
      localStorage.removeItem('pibulus.claude.chatId');
      addSystem('new thread');
    });

    async function sendMessage(text) {
      if (running) return;
      stopDictation({ abort: true });
      const fullReady = fullArmed && armToken && Date.now() < armExpiresAt;
      if (fullReady) beepSend();

      addMessage('user', text, 'you');
      currentBubble = null;
      currentReplyText = '';
      setRunning(true);
      const sendMode = fullReady ? 'full' : mode;
      const payload = {
        message: text,
        chat_id: chatId,
        mode: sendMode,
        workspace,
        arm_token: fullReady ? armToken : ''
      };
      clearFullArm();

      const res = await fetch(`${api}/chat`, {
        method: 'POST',
        credentials: 'same-origin',
        headers: { 'Content-Type': 'application/json', 'X-PIBULUS-CSRF': csrf },
        body: JSON.stringify(payload)
      });

      if (!res.ok) {
        let msg = `request failed ${res.status}`;
        try {
          const err = await res.json();
          msg = err.error || msg;
        } catch (_) {}
        addSystem(msg);
        setRunning(false);
        return;
      }

      const reader = res.body.getReader();
      const decoder = new TextDecoder();
      let buffer = '';

      while (true) {
        const { value, done } = await reader.read();
        if (done) break;
        buffer += decoder.decode(value, { stream: true });
        let idx;
        while ((idx = buffer.indexOf('\n')) >= 0) {
          const line = buffer.slice(0, idx).trim();
          buffer = buffer.slice(idx + 1);
          if (!line) continue;
          let event;
          try { event = JSON.parse(line); } catch (_) { continue; }
          if (event.type === 'started') {
            saveChatId(event.chat_id);
            startAssistantPlaceholder();
          } else if (event.type === 'claude' && event.text) {
            appendAssistant(event.text);
          } else if (event.type === 'line' && event.text) {
            appendAssistant(event.text + '\n');
          } else if (event.type === 'stderr' && event.text) {
            addSystem(event.text);
          } else if (event.type === 'error' && event.text) {
            addSystem(event.text);
          } else if (event.type === 'done') {
            beepDone();
            if (event.result && event.result.cost_usd) {
              chatCost += parseFloat(event.result.cost_usd) || 0;
              spendingAmount.textContent = '$' + chatCost.toFixed(2);
            }
            currentBubble?.closest('.msg')?.classList.remove('streaming');
            currentBubble?.closest('.msg')?.classList.remove('thinking');
            if (currentBubble?.dataset.placeholder === 'true') currentBubble.closest('.msg')?.remove();
            if (currentReplyText.trim()) speakText(currentReplyText);
            currentBubble = null;
            currentReplyText = '';
            setRunning(false);
            if (event.timed_out) addSystem('run timed out');
            if (event.code && event.code !== 0) addSystem(`exit ${event.code}`);
          }
        }
      }
      setRunning(false);
    }

    form.addEventListener('submit', async (event) => {
      event.preventDefault();
      stopDictation({ abort: true });
      const text = input.value.trim();
      if (!text) return;
      setComposerText('');
      try {
        await sendMessage(text);
      } catch (err) {
        addSystem(err.message || String(err));
        setRunning(false);
      }
    });

    if (canSpeak) {
      window.speechSynthesis.onvoiceschanged = pickVoice;
      pickVoice();
    }
    syncSpeakerButton();
    syncMicButton();

    bootstrap().catch(err => {
      addSystem(err.message || String(err));
      setRunning(false);
    });
  </script>
</body>
</html>
