<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no, maximum-scale=1">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="QuickCat Deck">
  <meta name="theme-color" content="#11121a">
  <meta name="robots" content="noindex,nofollow,noarchive,nosnippet,noimageindex">
  <title>QuickCat Deck</title>
  <link rel="icon" href="/deck/favicon.svg" type="image/svg+xml">
  <style>
    :root {
      color-scheme: dark;
      --bg: #11121a;
      --bg-2: #171824;
      --panel: #1c2029;
      --panel-2: #242636;
      --line: rgba(255,236,226,.14);
      --line-strong: rgba(255,236,226,.25);
      --text: #fff0e6;
      --muted: rgba(255,240,230,.7);
      --soft: rgba(255,240,230,.46);
      --ink-rgb: 17,18,26;
      --panel-rgb: 28,32,41;
      --panel-2-rgb: 36,38,54;
      --cream-rgb: 255,240,230;
      --gold: #ffd18a;
      --gold-rgb: 255,209,138;
      --green: #96e8c6;
      --green-rgb: 150,232,198;
      --blue: #b8b6ff;
      --blue-rgb: 184,182,255;
      --coral: #ff9a85;
      --coral-rgb: 255,154,133;
      --danger: #ff6f9e;
      --danger-rgb: 255,111,158;
      --rose: #f2a6cf;
      --rose-rgb: 242,166,207;
      --sage: #a6d2c5;
      --sage-rgb: 166,210,197;
      --indigo: #6f6aa8;
      --indigo-rgb: 111,106,168;
      --teal: var(--green);
      --amber: var(--gold);
      --moon-phase: 0.5;
      --moon-angle: 180deg;
      --weather-tint: 0deg;
      --sigil-spin: 28s;
      --sigil-counterspin: 48s;
      --sigil-scale: 1;
      --sigil-alpha: .62;
      --sigil-halo: .32;
      --sigil-orbit-alpha: .5;
      --sigil-core: .82;
      --sigil-tilt: 0deg;
      --field-sigil-alpha: .42;
      --field-blur: 1.2px;
      --gooey-alpha: .22;
      --gooey-secondary-alpha: .13;
      --spark-hue: 0deg;
      --pulse-load: .12;
      --pulse-load-pct: 12%;
      --pulse-mem: .45;
      --pulse-mem-pct: 45%;
      --pulse-swap: .2;
      --pulse-swap-pct: 20%;
      --pulse-root: .5;
      --pulse-root-pct: 50%;
      --pulse-passport: .9;
      --pulse-passport-pct: 90%;
      --pulse-temp: .18;
      --pulse-temp-pct: 18%;
      --pulse-uptime: .3;
      --load-bg-alpha: .023;
      --scan-opacity: .19;
      --cross-opacity: .07;
      --root-shift: 0px;
      --passport-shift: 0px;
      --uptime-shift: 0px;
      --moon-shift: 0%;
      --dot-speed: 1.4s;
      --empty-border-alpha: .26;
      --empty-glow-px: 20px;
      --empty-glow-alpha: .07;
      --empty-sheen-opacity: .18;
      --stream-border-alpha: .44;
      --stream-glow-px: 32px;
      --stream-glow-alpha: .12;
      --reply-speed: 1.4s;
      --spending-alpha: .04;
      --hold-hue: 0deg;
      --bubble-hue: 0deg;
      --rail-opacity: .4;
      --bar-load: .12;
      --bar-mem: .45;
      --bar-swap: .2;
      --bar-root: .5;
      --bar-passport: .9;
      --chaos-hue: 0deg;
      --chaos-tilt: 0deg;
      --scan-speed: 16s;
      --familiar-x: 6vw;
      --familiar-y: 18vh;
      --familiar-tilt: -2deg;
      --shadow: 0 18px 50px rgba(0,0,0,.34);
      --radius: 8px;
      --mono: ui-monospace, "SF Mono", SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      font-family: var(--mono);
      font-variant-ligatures: none;
      font-feature-settings: "zero" 1;
    }

        * {
          box-sizing: border-box;
          letter-spacing: 0;
          -webkit-tap-highlight-color: transparent;
          scrollbar-width: none;
        }
        *::-webkit-scrollbar {
          width: 0;
          height: 0;
          display: none;
        }
        html, body {
          width: 100%;
          height: 100%;
          min-height: 100%;
          margin: 0;
          scroll-behavior: auto;
          overflow: hidden;
          -webkit-font-smoothing: antialiased;
          -webkit-text-size-adjust: 100%;
        }
    body {
      background:
        linear-gradient(180deg, rgba(5, 6, 12, .05), rgba(5, 6, 12, .3)),
        conic-gradient(from calc(var(--moon-angle) + var(--chaos-hue)) at 50% 54%, rgba(var(--blue-rgb),.08), rgba(var(--rose-rgb),.13), rgba(var(--gold-rgb),.055), rgba(var(--green-rgb),.11), rgba(var(--blue-rgb),.08)),
        linear-gradient(128deg, rgba(var(--rose-rgb), var(--load-bg-alpha)) 0 var(--pulse-load-pct), transparent var(--pulse-load-pct) 100%),
        linear-gradient(72deg, rgba(var(--green-rgb),.052), transparent 34%, rgba(var(--blue-rgb),.052) 66%, transparent),
        linear-gradient(115deg, rgba(var(--rose-rgb), var(--load-bg-alpha)) 0 var(--pulse-load-pct), transparent var(--pulse-load-pct) 100%),
        linear-gradient(90deg, rgba(var(--cream-rgb),.028) 1px, transparent 1px),
        linear-gradient(180deg, var(--bg) 0%, var(--bg-2) 48%, #12131c 100%);
      background-blend-mode: normal, screen, screen, screen, normal, normal, normal;
          background-size: 100% 100%, 100% 100%, 100% 100%, 100% 100%, 100% 100%, 42px 42px, 100% 100%;
          color: var(--text);
          overflow: hidden;
          isolation: isolate;
          touch-action: manipulation;
        }

    body.is-listening {
      --scan-opacity: .32;
      --cross-opacity: .13;
      --load-bg-alpha: .075;
      --sigil-scale: 1.055;
      --field-sigil-alpha: .64;
      --field-blur: 2.4px;
      --gooey-alpha: .38;
      --gooey-secondary-alpha: .22;
      --empty-sheen-opacity: .32;
    }

    body.heard-voice {
      --spark-hue: 64deg;
      --sigil-core: 1;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
          background: linear-gradient(rgba(var(--cream-rgb),.024) 50%, transparent 50%);
          background-size: 100% 4px;
          opacity: var(--scan-opacity);
          mix-blend-mode: screen;
          transform: translateZ(0);
        }

    body::after {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background:
        linear-gradient(90deg, transparent calc(50% - 1px), rgba(var(--blue-rgb),.075) 50%, transparent calc(50% + 1px)),
        linear-gradient(180deg, transparent calc(50% - 1px), rgba(var(--rose-rgb),.055) 50%, transparent calc(50% + 1px));
      opacity: var(--cross-opacity);
      transform: translate3d(var(--root-shift), var(--passport-shift), 0);
      filter: hue-rotate(var(--chaos-hue));
      mix-blend-mode: screen;
    }

    @keyframes scanDrift {
      from { background-position: 0 0; }
      to { background-position: 0 40px; }
    }

    button, textarea, select { font: inherit; }
    button {
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      transition: transform .12s cubic-bezier(.2, 1, .2, 1), border-color .14s ease, background-color .14s ease, color .14s ease, opacity .14s ease, box-shadow .14s ease;
    }

    button:active { transform: translateY(1px) scale(.985); }
    button:focus-visible,
    textarea:focus-visible,
    select:focus-visible {
      outline: 2px solid rgba(var(--green-rgb),.72);
      outline-offset: 2px;
    }

        .app {
          height: 100dvh;
          width: 100%;
          max-width: 100vw;
          display: grid;
          grid-template-rows: auto 1fr auto;
          overflow: hidden;
        }

    .topbar {
      position: relative;
      padding: calc(12px + env(safe-area-inset-top)) 14px 10px;
      border-bottom: 1px solid var(--line);
      background: rgba(var(--ink-rgb),.9);
      backdrop-filter: blur(18px);
      box-shadow: 0 12px 30px rgba(0,0,0,.24);
      z-index: 3;
    }

    .topbar::after {
      content: "";
      position: absolute;
      left: 0;
      right: 0;
      bottom: -1px;
      height: 1px;
      background:
        linear-gradient(90deg,
          rgba(var(--blue-rgb),.38) 0 18%,
          rgba(var(--rose-rgb),.3) 34%,
          rgba(var(--gold-rgb),.32) 58%,
          rgba(var(--green-rgb),.24) 82%,
          rgba(var(--coral-rgb),.24) 100%);
      opacity: var(--rail-opacity);
      filter: hue-rotate(var(--chaos-hue));
    }

    .topline {
      min-height: 44px;
      display: grid;
      grid-template-columns: 44px 1fr auto;
      align-items: center;
      gap: 10px;
    }

    .top-actions {
      display: flex;
      gap: 6px;
    }

    .icon-btn,
    .send,
    .mode,
    .hold,
    .select {
      min-height: 44px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      color: var(--text);
      background: rgba(var(--cream-rgb),.045);
    }

    .icon-btn {
      width: 44px;
      display: inline-grid;
      place-items: center;
      text-decoration: none;
      font-size: 22px;
    }

    h1 {
      margin: 0;
      font-size: 20px;
      line-height: 1.1;
      color: var(--amber);
      text-shadow: 0 0 16px rgba(var(--rose-rgb),.2);
    }

    .title {
      min-width: 0;
      display: flex;
      align-items: center;
      gap: 9px;
    }

    .status {
      width: 14px;
      height: 14px;
      min-height: 14px;
      display: inline-grid;
      place-items: center;
      flex: 0 0 auto;
      border-radius: 50%;
      background: rgba(var(--green-rgb),.08);
    }

    .status span:not(.dot) {
      position: absolute;
      width: 1px;
      height: 1px;
      overflow: hidden;
      clip: rect(0 0 0 0);
      clip-path: inset(50%);
      white-space: nowrap;
    }

    .dot {
      width: 9px;
      height: 9px;
      border-radius: 50%;
      background: var(--teal);
      box-shadow: 0 0 12px rgba(var(--green-rgb),.72);
      animation: liveDot var(--dot-speed) ease-in-out infinite;
    }

    @keyframes liveDot {
      0%, 100% { transform: scale(.82); opacity: .65; }
      50% { transform: scale(1.15); opacity: 1; }
    }

    .status.bad .dot {
      background: var(--danger);
      box-shadow: 0 0 12px rgba(var(--danger-rgb),.75);
    }


    .transcript {
      position: relative;
      overflow-y: auto;
      overflow-x: clip;
      overscroll-behavior: contain;
          padding: 16px 12px 104px;
          scroll-behavior: auto;
          -webkit-overflow-scrolling: touch;
        }

    .empty {
      position: fixed;
      inset: calc(74px + env(safe-area-inset-top)) 0 calc(84px + env(safe-area-inset-bottom));
      z-index: 0;
      overflow: hidden;
      width: 100vw;
      min-height: 0;
      margin: 0;
      display: grid;
      place-items: center;
      border: 0;
      background: transparent;
      padding: 0;
      box-shadow: none;
      transform: translateZ(0);
      contain: paint;
      pointer-events: none;
    }

    .empty::before {
      content: "";
      position: absolute;
          inset: -10% -7% auto;
          height: min(88vmin, 860px);
      pointer-events: none;
      background:
        conic-gradient(from calc(var(--moon-angle) - 32deg), rgba(var(--blue-rgb),.3), rgba(var(--rose-rgb),.38), rgba(var(--gold-rgb),.16), rgba(var(--green-rgb),.28), rgba(var(--indigo-rgb),.3), rgba(var(--blue-rgb),.3)),
        radial-gradient(ellipse at 52% 48%, rgba(var(--cream-rgb),.05), transparent 58%);
      border-radius: 46% 54% 50% 48%;
          opacity: calc(var(--gooey-alpha) * .9);
          transform: translateX(calc(var(--moon-shift) * .45)) scale(1.03);
          filter: blur(28px) saturate(1.38) brightness(.92) hue-rotate(var(--chaos-hue));
          mix-blend-mode: screen;
          animation: gooeyFloat 18s ease-in-out infinite;
        }

    .empty::after {
      content: "";
      position: absolute;
          inset: 15% 8% auto;
          height: min(62vmin, 680px);
      pointer-events: none;
      background:
        conic-gradient(from calc(var(--moon-angle) + 88deg), transparent, rgba(var(--rose-rgb),.16), transparent 42%, rgba(var(--green-rgb),.12), transparent 72%, rgba(var(--blue-rgb),.12), transparent);
      opacity: var(--gooey-secondary-alpha);
          filter: blur(22px) saturate(1.08);
          mix-blend-mode: screen;
          transform: rotate(calc(var(--sigil-tilt) * -1)) scale(.96);
        }

    .empty > * {
      position: relative;
      z-index: 1;
    }

        .empty-kicker {
          display: none;
          color: var(--blue);
      align-self: start;
      justify-self: center;
      margin-top: clamp(64px, 12vh, 122px);
      padding: 5px 8px;
      border-radius: 999px;
      background: rgba(var(--ink-rgb),.42);
      font-size: 11px;
      font-weight: 800;
      text-transform: uppercase;
      line-height: 1.25;
      overflow-wrap: anywhere;
      text-align: center;
      z-index: 2;
    }

    .deck-familiar {
      position: fixed;
      left: var(--familiar-x);
      top: var(--familiar-y);
      z-index: 1;
      pointer-events: none;
      color: rgba(var(--green-rgb),.58);
      font-size: clamp(12px, 2.4vw, 18px);
      line-height: 1;
      text-shadow:
        0 0 12px rgba(var(--green-rgb),.2),
        0 0 24px rgba(var(--blue-rgb),.14);
      transform: rotate(var(--familiar-tilt));
      opacity: .32;
      mix-blend-mode: screen;
      transition: color .3s ease, opacity .3s ease, transform .45s ease;
    }

    body.is-listening .deck-familiar {
      color: rgba(var(--gold-rgb),.82);
      opacity: .58;
      transform: rotate(var(--familiar-tilt)) scale(1.08);
    }

        .sigil-stage {
          position: absolute;
          left: 50%;
          top: 52%;
          z-index: 0;
          width: clamp(360px, 82vmin, 900px);
          height: clamp(360px, 82vmin, 900px);
      margin: 0;
      display: grid;
      place-items: center;
      transform:
        translate3d(calc(-50% + var(--uptime-shift)), -50%, 0)
        rotate(var(--sigil-tilt))
        scale(var(--sigil-scale));
      opacity: var(--field-sigil-alpha);
          filter:
      blur(var(--field-blur))
            saturate(1.16)
            hue-rotate(var(--chaos-hue))
            drop-shadow(0 0 36px rgba(var(--rose-rgb),.13))
            drop-shadow(0 0 52px rgba(var(--blue-rgb),.1));
          mix-blend-mode: screen;
          transition: transform .28s cubic-bezier(.2, 1, .2, 1), filter .28s ease, opacity .28s ease;
        }

    body.is-listening .sigil-stage {
      filter:
        hue-rotate(var(--chaos-hue))
        drop-shadow(0 0 32px rgba(var(--gold-rgb),.2))
        drop-shadow(0 0 58px rgba(var(--rose-rgb),.18));
    }

    .sigil-stage::before,
    .sigil-stage::after {
      content: "";
      position: absolute;
      inset: clamp(22px, 7vmin, 70px);
      border-radius: 50%;
      pointer-events: none;
    }

    .sigil-stage::before {
      background:
        radial-gradient(circle, rgba(var(--gold-rgb),.14) 0 12%, transparent 36%),
        conic-gradient(from var(--moon-angle), rgba(var(--rose-rgb),.26), rgba(var(--blue-rgb),.22), rgba(var(--green-rgb),.16), rgba(var(--gold-rgb),.2), rgba(var(--rose-rgb),.26));
          opacity: calc(var(--sigil-halo) * .82);
          filter: blur(13px);
          animation: portalBreathe 8.5s ease-in-out infinite;
        }

    .sigil-stage::after {
      inset: clamp(58px, 15vmin, 158px);
      border: 1px solid rgba(var(--cream-rgb),.09);
      box-shadow:
        0 0 24px rgba(var(--blue-rgb),.14),
        inset 0 0 22px rgba(var(--rose-rgb),.12);
      opacity: .34;
    }

    .empty-sigil {
      position: relative;
      z-index: 1;
      width: 100%;
      height: 100%;
      overflow: visible;
          animation: sigilDrift var(--sigil-spin) linear infinite;
          opacity: .76;
        }

    .sigil-ring,
    .sigil-orbit,
    .sigil-rose,
    .sigil-constellation {
      vector-effect: non-scaling-stroke;
      fill: none;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .sigil-ring {
      stroke: rgba(var(--gold-rgb),.34);
      stroke-width: .8;
      stroke-dasharray: 1.5 7;
      opacity: .46;
      transform-origin: center;
          animation: none;
    }

    .sigil-orbit {
      stroke: rgba(var(--blue-rgb),.4);
      stroke-width: .72;
      opacity: var(--sigil-orbit-alpha);
    }

    .sigil-rose {
      stroke: rgba(var(--rose-rgb),.72);
      stroke-width: 1.12;
      opacity: var(--sigil-alpha);
      filter: drop-shadow(0 0 14px rgba(var(--rose-rgb),.28));
    }

    .sigil-constellation {
      stroke: rgba(var(--cream-rgb),.24);
      stroke-width: .58;
      opacity: .48;
    }

    .sigil-star {
      fill: rgba(var(--cream-rgb),.76);
      opacity: .54;
      filter: drop-shadow(0 0 5px rgba(var(--gold-rgb),.28));
    }

    .sigil-core {
      fill: rgba(var(--gold-rgb),.9);
      opacity: var(--sigil-core);
      filter:
        drop-shadow(0 0 7px rgba(var(--gold-rgb),.5))
        drop-shadow(0 0 14px rgba(var(--rose-rgb),.24));
          animation: corePulse 4.8s ease-in-out infinite;
    }

    body.is-running .sigil-stage::before {
      opacity: .66;
      animation-duration: 1.7s;
    }

    body.is-running .sigil-rose {
      stroke-width: 1.32;
      filter: drop-shadow(0 0 12px rgba(var(--rose-rgb),.38));
    }

    @keyframes portalBreathe {
      0%, 100% { transform: scale(.92); opacity: .22; }
      45% { transform: scale(1.04); opacity: .42; }
      70% { transform: scale(.99); opacity: .3; }
    }

    @keyframes gooeyFloat {
          0%, 100% { border-radius: 46% 54% 50% 48%; transform: translateX(calc(var(--moon-shift) * .35)) scale(1.01) rotate(-.4deg); }
          45% { border-radius: 56% 44% 49% 53%; transform: translateX(calc(var(--moon-shift) * -.28)) scale(1.055) rotate(.6deg); }
          72% { border-radius: 50% 48% 55% 45%; transform: translateX(calc(var(--moon-shift) * .2)) scale(1.025) rotate(.1deg); }
        }

    @keyframes sigilDrift {
      from { transform: rotate(0turn); }
      to { transform: rotate(1turn); }
    }

    @keyframes sigilCounterspin {
      from { transform: rotate(0turn); }
      to { transform: rotate(-1turn); }
    }

    @keyframes corePulse {
      0%, 100% { transform: scale(.88); }
      50% { transform: scale(1.2); }
    }

    .agent-lights {
      display: none;
      align-items: center;
      gap: 7px;
      min-height: 14px;
      margin: 0 0 14px;
    }

    .agent-lights i {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      border: 1px solid rgba(var(--cream-rgb),.18);
      background: rgba(var(--cream-rgb),.08);
      box-shadow: none;
      opacity: .48;
      transition: transform .18s ease, opacity .18s ease, background-color .18s ease, box-shadow .18s ease;
    }

    .agent-lights i.ready {
      background: rgba(var(--green-rgb),.92);
      box-shadow: 0 0 12px rgba(var(--green-rgb),.34);
      opacity: .86;
    }

    .agent-lights i.off {
      background: rgba(var(--danger-rgb),.34);
      box-shadow: 0 0 8px rgba(var(--danger-rgb),.2);
      opacity: .58;
    }

    .agent-lights i.current {
      transform: scale(1.28);
      background: var(--rose);
      box-shadow: 0 0 16px rgba(var(--rose-rgb),.5);
      opacity: 1;
    }

    .agent-lights i.running {
      animation: liveDot .72s ease-in-out infinite;
    }

    .empty-actions {
      display: none;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
    }

    .prompt-chip {
      width: 100%;
      min-height: 44px;
      border: 1px solid rgba(var(--cream-rgb),.13);
      border-radius: var(--radius);
      padding: 9px 10px;
      color: var(--text);
      background: rgba(var(--cream-rgb),.052);
      text-align: left;
      font-weight: 750;
      display: grid;
      gap: 2px;
    }

    .chip-main {
      color: var(--text);
      font-size: 13px;
      line-height: 1.1;
    }

    .chip-sub {
      color: var(--soft);
      font-size: 11px;
      line-height: 1.15;
      font-weight: 650;
    }

    .prompt-chip:active {
      transform: translateY(1px);
      border-color: rgba(var(--blue-rgb),.56);
      background: rgba(var(--blue-rgb),.11);
    }

    .prompt-chip:disabled {
      cursor: not-allowed;
      opacity: .42;
    }

    .msg {
      position: relative;
      z-index: 1;
      width: min(100%, 760px);
      margin: 0 auto 12px;
      display: grid;
      gap: 5px;
      animation: messageBloom 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    .msg.user { justify-items: end; }
    .msg.assistant { justify-items: start; }

    .label {
      display: none;
      color: var(--soft);
      font-size: 12px;
      padding: 0 4px;
    }

    .bubble {
      position: relative;
      overflow: hidden;
      max-width: min(88vw, 680px);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 12px 13px;
      white-space: pre-wrap;
      overflow-wrap: anywhere;
      line-height: 1.55;
      font-size: 16px;
      box-shadow: 0 10px 24px rgba(0,0,0,.18);
      --load-glow: var(--pulse-load);
    }

    .user .bubble {
      max-width: min(82vw, 560px);
      background: rgba(var(--blue-rgb),.13);

<body>
  <main class="app">
    <header class="topbar">

            <path class="sigil-orbit" id="sigilOrbit" d="M 0 -12 C 20 -36 45 -16 36 10 C 26 40 -16 44 -34 12 C -46 -12 -25 -38 0 -12"></path>
            <path class="sigil-rose" id="sigilRose" d="M 34 0 C 14 10 14 24 0 34 C -14 24 -14 10 -34 0 C -14 -10 -14 -24 0 -34 C 14 -24 14 -10 34 0"></path>

      ></radio-widget>
    </div>
        <button class="icon-btn radio-orb" id="radioBtn" type="button" aria-label="Open Raya radio" aria-controls="rayaDock" aria-expanded="false" aria-pressed="false">≋</button>
        <div class="deck-familiar" id="deckFamiliar" aria-hidden="true">=^..^=</div>
      </main>

      <div class="setup-modal" id="setupModal" role="dialog" aria-modal="true" aria-labelledby="setupTitle">
        <section class="setup-panel">

      <script src="/deck/claude/radio-widget.min.js"></script>
  <script>
    const api = '/claude/api';
    const transcript = document.getElementById('transcript');
    const empty = document.getElementById('empty');
    const emptyKicker = document.getElementById('emptyKicker');
    const sigilStage = document.getElementById('sigilStage');
    const sigilRing = document.getElementById('sigilRing');
    const sigilOrbit = document.getElementById('sigilOrbit');
    const sigilRose = document.getElementById('sigilRose');
    const sigilStars = document.getElementById('sigilStars');
    const sigilCore = document.getElementById('sigilCore');
    const agentLights = document.getElementById('agentLights');
    const form = document.getElementById('form');
    const input = document.getElementById('input');
    const sendBtn = document.getElementById('sendBtn');
    const micBtn = document.getElementById('micBtn');
    const speakerBtn = document.getElementById('speakerBtn');
    const newBtn = document.getElementById('newBtn');
    const stopBtn = document.getElementById('stopBtn');
    const fullArm = document.getElementById('fullArm');
    const armCopy = document.getElementById('armCopy');
    const holdBtn = document.getElementById('holdBtn');
        const statusPill = document.getElementById('statusPill');
        const statusText = document.getElementById('statusText');
        const spendingBar = document.getElementById('spendingBar');
        const spendingAmount = document.getElementById('spendingAmount');
        const modelSelect = document.getElementById('modelSelect');
        const modeSelect = document.getElementById('modeSelect');
        const workspaceSelect = document.getElementById('workspaceSelect');
        const setupModal = document.getElementById('setupModal');
        const setupStartBtn = document.getElementById('setupStartBtn');
        const modeOptionButtons = [...document.querySelectorAll('[data-mode-option]')];
        const rayaDock = document.getElementById('rayaDock');
    const rayaRadio = document.getElementById('rayaRadio');
    const radioBtn = document.getElementById('radioBtn');
    const deckFamiliar = document.getElementById('deckFamiliar');
    const promptChips = [...document.querySelectorAll('.prompt-chip')];

    let csrf = '';
    let models = [];
    let modes = [];
    let workspaces = [];
    let model = localStorage.getItem('pibulus.deck.model') || 'claude';
    if (model === 'deepseek') model = 'deepseek-flash';
    let mode = localStorage.getItem('pibulus.deck.mode') || 'default';
    let workspace = localStorage.getItem('pibulus.deck.workspace') || 'pibulus-os';
    let chatId = '';
    let running = false;
    let authReady = false;
    let fullArmed = false;
    let armToken = '';
    let armExpiresAt = 0;
    let armPending = false;
    let holdTimer = null;
    let rayaCollapseTimer = null;
    let currentBubble = null;
    let currentReplyText = '';
    let chatCost = 0;
    let speakEnabled = localStorage.getItem('pibulus.claude.speak') === '1';
    let speaking = false;
    let preferredVoice = null;
    let recognition = null;
    let dictating = false;
    let dictateBaseText = '';
    let dictateFinalText = '';
    let dictationHadResult = false;
    let setupOpen = false;
    let heardTimer = null;
    const canSpeak = 'speechSynthesis' in window && 'SpeechSynthesisUtterance' in window;
    const Recognition = window.SpeechRecognition || window.webkitSpeechRecognition || null;
    const canDictate = Boolean(Recognition);
    const svgNS = 'http://www.w3.org/2000/svg';
    const deckModeKeys = ['default', 'full'];
    const deckFaces = ['=^..^=', '(^._.^)ﾉ', '(=^･ｪ･^=)', '(=｀ω´=)', 'ฅ^•ﻌ•^ฅ', '/ᐠ｡ꞈ｡ᐟ\\'];
    const deckPalettes = [
      { name: 'melon soda', bg: '#10131d', bg2: '#151a29', panel: '#1f2632', panel2: '#263243', text: '#fff5e9', gold: '#ffd36b', green: '#8ff0bd', blue: '#75dcff', rose: '#ff84c8', coral: '#ff9f70', danger: '#ff5f9b', indigo: '#a392ff' },
      { name: 'bubblegum packet', bg: '#120f1d', bg2: '#1b1428', panel: '#231f31', panel2: '#312744', text: '#fff0fb', gold: '#ffc96f', green: '#9ff5d1', blue: '#8bd3ff', rose: '#ff73d7', coral: '#ff8d86', danger: '#ff4fa6', indigo: '#b89cff' },
      { name: 'pool laser', bg: '#0f1520', bg2: '#111f2b', panel: '#1b2834', panel2: '#23364a', text: '#f7fff3', gold: '#f8e879', green: '#77f2d0', blue: '#9be8ff', rose: '#f7a0e3', coral: '#ffb283', danger: '#ff6c9d', indigo: '#8f9cff' },
      { name: 'peach plasma', bg: '#13121b', bg2: '#21182a', panel: '#24222f', panel2: '#342a3b', text: '#fff3e5', gold: '#ffd58a', green: '#a9e9b7', blue: '#a8ccff', rose: '#ff9dcc', coral: '#ff9a7d', danger: '#ff5f8f', indigo: '#c09cff' }
    ];

    let audioContext = null;
    let sonicRoot = 246;
    let sonicMood = 0;
    function haptic(pattern) {
      if (navigator.vibrate) navigator.vibrate(pattern);
    }

    function ensureAudioContext() {
      const AudioContextCtor = window.AudioContext || window.webkitAudioContext;
      if (!AudioContextCtor) return null;
      if (!audioContext) audioContext = new AudioContextCtor();
      if (audioContext.state === 'suspended') audioContext.resume().catch(() => {});
      return audioContext;
    }

    function playSound(f, d, type = 'sine', volume = 0.055) {
      try {
        const ctx = ensureAudioContext();
        if (!ctx) return;
        const osc = audioContext.createOscillator();
        const gain = audioContext.createGain();
        osc.connect(gain); gain.connect(audioContext.destination);
        osc.type = type;
        osc.frequency.setValueAtTime(f, audioContext.currentTime);
        gain.gain.setValueAtTime(volume, audioContext.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + d);
        osc.start(audioContext.currentTime);
        osc.stop(audioContext.currentTime + d);
      } catch (_) {}
    }
    function blip(sequence) {
      sequence.forEach(([freq, delay = 0, dur = 0.07, type = 'sine', volume = 0.05]) => {
        setTimeout(() => playSound(freq, dur, type, volume), delay);
      });
    }
    function pulseTone(step = 0, octave = 1) {
      const scale = [0, 3, 5, 7, 10, 12, 15];
      const semitone = scale[(sonicMood + step + scale.length) % scale.length];
      return Math.round(sonicRoot * octave * Math.pow(2, semitone / 12));
    }
    function beepSend() { blip([[pulseTone(2, 2), 0, .055, 'triangle'], [pulseTone(4, 2), 58, .05, 'sine', .035]]); }
    function beepThinking() { blip([[pulseTone(-1), 0, .055, 'sine', .028], [pulseTone(1), 70, .055, 'triangle', .028], [pulseTone(0), 140, .05, 'sine', .024]]); }
    function beepDone() { blip([[pulseTone(3, 1.5), 0, .065, 'triangle', .035], [pulseTone(1, 1.25), 82, .07, 'sine', .03]]); }
    function beepArm() { blip([[pulseTone(-3, .72), 0, .08, 'sawtooth', .02], [pulseTone(0), 95, .06, 'triangle', .034], [pulseTone(4, 1.6), 170, .045, 'sine', .034]]); }
    function beepError() { blip([[pulseTone(-4, .68), 0, .08, 'square', .018], [pulseTone(-5, .58), 100, .09, 'square', .015]]); }

    const keyClicker = {
          enabled: localStorage.getItem('pibulus.deck.keyclicks') === '1',
      loaded: false,
      loading: null,
      buffer: null,
      config: null,
      lastAt: 0,
      async load() {
        if (this.loaded || this.loading) return this.loading;
        const ctx = ensureAudioContext();
        if (!ctx) return null;
        this.loading = Promise.all([
          fetch('/deck/claude/sounds/keyboard-packs/cherry-mx-black/config.json', { cache: 'force-cache' }).then(r => r.ok ? r.json() : null),
          fetch('/deck/claude/sounds/keyboard-packs/cherry-mx-black/sound.ogg', { cache: 'force-cache' }).then(r => r.ok ? r.arrayBuffer() : null)
        ]).then(async ([config, bytes]) => {
          if (!config || !bytes) return null;
          this.config = config;
          this.buffer = await ctx.decodeAudioData(bytes);
          this.loaded = true;
          return true;
        }).catch(() => null);
        return this.loading;
      },
      keyId(event) {
        const special = {
          ' ': '57',
          Enter: '28',
          Backspace: '14',
          Tab: '15',
          Escape: '41',
          Shift: '42',
          Control: '17',
          Alt: '18',
          Meta: '3675',
          '.': '52',
          ',': '51',
          '/': '53',
          ';': '39',
          "'": '40',
          '[': '26',
          ']': '27'
        };
        if (special[event.key]) return special[event.key];
        if (/^[a-z]$/i.test(event.key)) return String(event.key.toUpperCase().charCodeAt(0));
        if (/^[0-9]$/.test(event.key)) return event.key === '0' ? '11' : String(Number(event.key) + 1);
        return '65';
      },
      play(event) {
        if (!this.enabled || event.repeat || event.metaKey || event.ctrlKey) return;
        const now = performance.now();
        if (now - this.lastAt < 22) return;
        this.lastAt = now;
        if (!this.loaded) {
          this.load();
          playSound(pulseTone(event.key === 'Backspace' ? -2 : 1, 1.55), .018, 'triangle', .009);
          return;
        }
        const segment = this.config?.defines?.[this.keyId(event)] || this.config?.defines?.['65'];
        if (!segment || !this.buffer) return;
        const ctx = ensureAudioContext();
        if (!ctx) return;
        const source = ctx.createBufferSource();
        const gain = ctx.createGain();
        source.buffer = this.buffer;
        gain.gain.value = event.key === 'Backspace' ? .11 : .085;
        source.connect(gain);
        gain.connect(ctx.destination);
        source.start(0, segment[0] / 1000, segment[1] / 1000);
      }
    };

    function pulseAt(target, tone = 'soft') {
      if (!target || window.matchMedia('(prefers-reduced-motion: reduce)').matches) return;
      const rect = target.getBoundingClientRect();
      const spark = document.createElement('span');
      spark.className = `touch-spark ${tone}`;
      spark.style.left = `${rect.left + rect.width / 2}px`;
      spark.style.top = `${rect.top + rect.height / 2}px`;
      document.body.appendChild(spark);
      setTimeout(() => spark.remove(), 760);
    }

    function clearRayaCollapse() {
      if (rayaCollapseTimer) clearTimeout(rayaCollapseTimer);
      rayaCollapseTimer = null;
    }

    function scheduleRayaCollapse(delay = 5200) {
      clearRayaCollapse();
      if (!rayaDock?.classList.contains('show')) return;
      rayaCollapseTimer = setTimeout(() => setRayaOpen(false), delay);
    }

    function setRayaOpen(value) {
      clearRayaCollapse();
      rayaDock?.classList.toggle('show', value);
      radioBtn?.classList.toggle('open', value);
      radioBtn?.setAttribute('aria-expanded', String(value));
      if (value) scheduleRayaCollapse(6200);
    }

    function syncRayaOrb(state = {}) {
      if (!radioBtn) return;
      const loading = state.loading ?? Boolean(rayaRadio?.isLoading);
      const playing = state.playing ?? Boolean(rayaRadio?.isPlaying);
      radioBtn.classList.toggle('loading', loading);
      radioBtn.classList.toggle('on', playing);
      radioBtn.setAttribute('aria-pressed', String(playing));
      document.body.classList.toggle('radio-on', playing);
      radioBtn.setAttribute('aria-label', playing ? 'Open Raya radio' : 'Open Raya radio');
    }

    radioBtn?.addEventListener('click', () => {
      setRayaOpen(!rayaDock?.classList.contains('show'));
      pulseAt(radioBtn, 'blue');
      haptic(12);
      blip([[pulseTone(1, 1.35), 0, .045, 'triangle', .018]]);
    });

    rayaDock?.addEventListener('pointerenter', clearRayaCollapse);
    rayaDock?.addEventListener('pointerleave', () => scheduleRayaCollapse(2400));
    rayaDock?.addEventListener('focusin', clearRayaCollapse);
    rayaDock?.addEventListener('focusout', () => {
      setTimeout(() => {
        if (!rayaDock.contains(document.activeElement)) scheduleRayaCollapse(1800);
      }, 0);
    });

    document.addEventListener('pointerdown', event => {
      if (!rayaDock?.classList.contains('show')) return;
      if (rayaDock.contains(event.target) || radioBtn?.contains(event.target)) return;
      setRayaOpen(false);
    });

    ['loading', 'play', 'pause', 'channelchange', 'error', 'nowplaying'].forEach(name => {
      rayaRadio?.addEventListener(name, () => {
        if (name === 'play') {
          syncRayaOrb({ playing: true, loading: false });
          pulseAt(radioBtn, 'soft');
          haptic([10, 18, 10]);
          scheduleRayaCollapse(900);
        } else if (name === 'loading') {
          clearRayaCollapse();
          syncRayaOrb({ loading: true });
        } else if (name === 'error') {
          syncRayaOrb({ playing: false, loading: false });
          beepError();
          pulseAt(radioBtn, 'danger');
          scheduleRayaCollapse(3200);
        } else if (name === 'pause' || name === 'channelchange') {
          syncRayaOrb();
          scheduleRayaCollapse(900);
        } else {
          syncRayaOrb();
        }
      });
    });

        document.addEventListener('keydown', event => {
          if (event.key !== 'Escape') return;
          if (setupOpen && authReady && !running) {
            setSetupOpen(false);
            return;
          }
          setRayaOpen(false);
        });

    function selectedModelConfig() {
      return models.find(item => item.key === model) || models.find(item => item.enabled) || models[0] || {
        key: 'claude',
        label: 'Claude Code',
        enabled: false,
        modes: ['default'],
        default_mode: 'default'
      };
    }

    function selectedModeConfig() {
      return modes.find(item => item.key === mode) || { key: mode, label: mode };
    }

    function visibleModesFor(activeModel = selectedModelConfig()) {
      const allowedModes = new Set(activeModel.modes || []);
      return modes.filter(item => deckModeKeys.includes(item.key) && allowedModes.has(item.key));
    }

    function shortModelLabel(item = selectedModelConfig()) {
      return String(item?.label || 'Deck').split(' · ')[0];
    }

    function chatStorageKey() {
      return `pibulus.deck.chatId.${model}.${workspace}`;
    }

    function loadChatId() {
      const legacy = model === 'claude' && workspace === 'pibulus-os'
        ? localStorage.getItem('pibulus.claude.chatId') || ''
        : '';
      chatId = localStorage.getItem(chatStorageKey()) || legacy;
    }

    function persistSelections() {
      localStorage.setItem('pibulus.deck.model', model);
      localStorage.setItem('pibulus.deck.mode', mode);
      localStorage.setItem('pibulus.deck.workspace', workspace);
    }

    function fillSelect(select, items, currentValue) {
      select.replaceChildren();
      items.forEach(item => {
        const option = document.createElement('option');
        option.value = item.key;
        option.textContent = item.enabled === false && item.detail
          ? `${item.label} · ${item.detail}`
          : item.label;
        option.disabled = item.enabled === false;
        select.appendChild(option);
      });
      select.value = currentValue;
    }

    function normalizeSelections() {
      const enabledModel = models.find(item => item.key === model && item.enabled) || models.find(item => item.enabled);
      if (enabledModel) model = enabledModel.key;

      const activeModel = selectedModelConfig();
      const visibleModes = visibleModesFor(activeModel);
      if (!visibleModes.some(item => item.key === mode)) {
        mode = visibleModes.some(item => item.key === 'default') ? 'default' : (visibleModes[0]?.key || 'default');
      }

      if (!workspaces.some(item => item.key === workspace)) {
        workspace = workspaces[0]?.key || 'pibulus-os';
      }

      persistSelections();
      loadChatId();
    }

        function syncDeckMeta() {
          const activeModel = selectedModelConfig();
          const ready = Boolean(activeModel.enabled);
          authReady = ready;
          statusPill.classList.toggle('bad', !ready);
          const detail = activeModel.detail ? ` · ${activeModel.detail}` : '';
          emptyKicker.textContent = ready ? 'ready' : 'offline';

    function hashToIndex(seed, length, salt = 0) {
      const text = String(seed || Date.now()) + ':' + salt;
      let hash = 0;
      for (let index = 0; index < text.length; index += 1) {
        hash = ((hash << 5) - hash + text.charCodeAt(index)) | 0;

      return Math.abs(hash) % Math.max(1, length);

    function hexToRgb(hex) {

      const int = parseInt(value, 16);
      return [(int >> 16) & 255, (int >> 8) & 255, int & 255].join(',');
    }

    function renderSigil(seed, pulse = {}) {
      if (!sigilRose || !sigilOrbit || !sigilRing || !sigilStars) return;
      const load = clamp(pulse.load);
      const mem = clamp(pulse.mem);
      const root = clamp(pulse.root);
      const temp = clamp(pulse.temp);
      const moon = clamp(pulse.moon ?? getComputedStyle(document.documentElement).getPropertyValue('--moon-phase'));
          const petalCount = 3 + Math.floor(seedNumber(seed, 1) * 4);
          const roseSteps = 88;
          const roseAmp = 22 + root * 7 + temp * 4;
      const twist = (seedNumber(seed, 2) - .5) * Math.PI * .72 + moon * Math.PI * .16;
      const rose = [];
      for (let i = 0; i <= roseSteps; i += 1) {
        const theta = (i / roseSteps) * Math.PI * 2;
        const breathe = 1 + Math.sin(theta * 3 + moon * Math.PI * 2) * (.025 + load * .045);
        const r = roseAmp * Math.cos(petalCount * theta) * breathe;
        rose.push({
          x: r * Math.cos(theta + twist),
          y: r * Math.sin(theta + twist)
        });
      }
      sigilRose.setAttribute('d', pathFromPoints(rose));

          const orbitSteps = 64;
      const orbit = [];
      const turns = 1.16 + seedNumber(seed, 4) * .95;
      for (let i = 0; i <= orbitSteps; i += 1) {
        const t = i / orbitSteps;
        const theta = t * Math.PI * 2 * turns + twist * .5;
        const r = 8 + t * (36 + mem * 9) + Math.sin(t * Math.PI * 6 + moon * Math.PI * 2) * (1.3 + load * 2.7);
        orbit.push({
          x: r * Math.cos(theta),
          y: r * Math.sin(theta)

      }
      sigilOrbit.setAttribute('d', pathFromPoints(orbit));

      const ring = 40 + temp * 6 + seedNumber(seed, 7) * 4;
      sigilRing.setAttribute('d', `M 0 -${ring.toFixed(2)} A ${ring.toFixed(2)} ${ring.toFixed(2)} 0 1 1 -.01 -${ring.toFixed(2)}`);
      sigilCore?.setAttribute('r', (3.1 + load * 2.2 + temp * 1.2).toFixed(2));

          const starCount = 5 + Math.floor(seedNumber(seed, 8) * 3);
      const constellation = [];
      sigilStars.replaceChildren();
      for (let i = 0; i < starCount; i += 1) {
        const angle = (i / starCount) * Math.PI * 2 + seedNumber(seed, i % 10) * .72 + moon * .42;
        const radius = 19 + seedNumber(seed, (i * 2 + 3) % 12) * 34;
        const x = radius * Math.cos(angle);

      const line = document.createElementNS(svgNS, 'path');
      line.setAttribute('class', 'sigil-constellation');
      line.setAttribute('d', pathFromPoints(constellation));
      sigilStars.appendChild(line);
      constellation.forEach((point, index) => {

        star.setAttribute('cy', point.y.toFixed(2));
        star.setAttribute('r', (1 + seedNumber(seed, index + 2) * 1.4).toFixed(2));
        sigilStars.appendChild(star);
      });
    }

    function applyPulse(data = {}) {

      const hue = Math.round((seedNumber(seed, 0) - .5) * 70 + moon * 34);

      setVar('--rail-opacity', (.38 + load * .22).toFixed(4));

      setVar('--chaos-hue', `${hue}deg`);
      setVar('--chaos-tilt', `${tilt}deg`);
      setVar('--scan-speed', `${speed}s`);
          setVar('--sigil-spin', `${(58 + seedNumber(seed, 6) * 42 + uptime * 12).toFixed(2)}s`);
          setVar('--sigil-counterspin', `${(80 + seedNumber(seed, 5) * 36 + passport * 8).toFixed(2)}s`);
          setVar('--sigil-scale', (0.94 + load * .04 + temp * .02).toFixed(3));
          setVar('--sigil-alpha', (.38 + load * .06 + (1 - root) * .06).toFixed(4));
          setVar('--sigil-halo', (.16 + load * .08 + temp * .05).toFixed(4));
          setVar('--sigil-orbit-alpha', (.34 + load * .08 + (1 - mem) * .06).toFixed(4));

    function updateMoonPhase() {
      const now = new Date();
      const year = now.getFullYear();
      const month = now.getMonth() + 1;
      const day = now.getDate();
      const c = Math.floor(year / 100);
      const s = Math.floor((year - 1900) / 100);
      const a = (14 - month) / 12;
      const y = year - a;
      const m = month + 12 * a - 2;
      const jd = day + Math.floor((153 * m + 2) / 5) + 365 * y + Math.floor(y / 4) - Math.floor(y / 100) + Math.floor(y / 400) - 32045;
      const d = jd - 2451550.1;
      const phase = ((d % 29.530588861) / 29.530588861 + 1) % 1;
      return setMoonPhase(phase);

    function composeDictation(interim = '') {

    function endDictation() {
      dictating = false;
      dictateBaseText = '';
      dictateFinalText = '';

    function stopDictation({ abort = false } = {}) {
      if (!recognition || !dictating) return;

        abort ? recognition.abort() : recognition.stop();

    function ensureRecognition() {
      if (!canDictate) return null;
      if (recognition) return recognition;
      recognition = new Recognition();
      recognition.continuous = true;
      recognition.interimResults = true;
      recognition.maxAlternatives = 1;

      recognition.onstart = () => {

      recognition.onresult = event => {

        if (heardTimer) clearTimeout(heardTimer);
        heardTimer = setTimeout(() => document.body.classList.remove('heard-voice'), 420);
        for (let index = event.resultIndex; index < event.results.length; index += 1) {
          const result = event.results[index];
          const text = result[0]?.transcript || '';
          if (result.isFinal) {
            dictateFinalText = `${dictateFinalText} ${text}`.trim();
          } else {
            interim = `${interim} ${text}`.trim();
          }

        composeDictation(interim);

      recognition.onerror = event => {
        const error = event.error || 'speech error';
        if (!['aborted', 'no-speech'].includes(error)) {

          addSystem(message);
        } else if (error === 'no-speech' && !dictationHadResult) {

        }
        endDictation();

      recognition.onend = endDictation;
      return recognition;

    function pickVoice() {
      if (!canSpeak) return null;
      const voices = window.speechSynthesis.getVoices();
      preferredVoice =
        voices.find(voice => /Samantha|Karen|Daniel|Serena/i.test(voice.name)) ||
        voices.find(voice => /^en-AU\b/i.test(voice.lang)) ||
        voices.find(voice => /^en-GB\b/i.test(voice.lang)) ||
        voices.find(voice => /^en\b/i.test(voice.lang)) ||
        null;
      return preferredVoice;
    }

    function speechChunks(text) {
      const cleaned = String(text || '')
        .replace(/```[\s\S]*?```/g, ' code block in chat. ')
        .replace(/`([^`]+)`/g, '$1')
        .replace(/https?:\/\/\S+/g, ' link ')
        .replace(/[#>*_~|[\]{}]/g, ' ')
        .replace(/\s+/g, ' ')
        .trim();
      if (!cleaned) return [];
      const sentences = cleaned.match(/[^.!?]+[.!?]+|\S.+$/g) || [cleaned];
      const chunks = [];
      let current = '';
      sentences.forEach(sentence => {
        const next = current ? `${current} ${sentence.trim()}` : sentence.trim();
        if (next.length <= 230) {
          current = next;
          return;
        }
        if (current) chunks.push(current);
        current = '';
        const words = sentence.trim().split(/\s+/);
        let part = '';
        words.forEach(word => {
          const candidate = part ? `${part} ${word}` : word;
          if (candidate.length > 230) {
            if (part) chunks.push(part);
            part = word;
          } else {
            part = candidate;
          }
        });
        if (part) current = part;
      });
      if (current) chunks.push(current);
      return chunks.slice(0, 48);
    }

    function cancelSpeech() {
      if (!canSpeak) return;

      window.speechSynthesis.cancel();

    function speakText(text, options = {}) {
      if (!canSpeak || (!speakEnabled && !options.force)) return;
      const chunks = speechChunks(text);
      if (!chunks.length) return;
      window.speechSynthesis.cancel();
      speaking = true;
      syncSpeakerButton();
      let index = 0;
      const voice = preferredVoice || pickVoice();
      const next = () => {
        if (!speaking || (!speakEnabled && !options.force) || index >= chunks.length) {
          speaking = false;
          syncSpeakerButton();
          return;
        }
        const utterance = new SpeechSynthesisUtterance(chunks[index]);
        index += 1;
        utterance.rate = 0.96;
        utterance.pitch = 1;
        utterance.volume = 1;
        if (voice) {
          utterance.voice = voice;
          utterance.lang = voice.lang || 'en-AU';
        } else {
          utterance.lang = 'en-AU';
        }
        utterance.onend = next;
        utterance.onerror = () => {
          speaking = false;
          syncSpeakerButton();
        };
        window.speechSynthesis.speak(utterance);
      };
      next();
    }

      holdBtn.textContent = 'HOLD';
    }

        function setSetupOpen(value) {
          setupOpen = Boolean(value);
          document.body.classList.toggle('setup-open', setupOpen);
          newBtn.classList.toggle('on', setupOpen);
          newBtn.textContent = setupOpen ? '×' : '＋';
          newBtn.setAttribute('aria-pressed', String(setupOpen));
          newBtn.setAttribute('aria-label', setupOpen ? 'Close chooser' : 'New chat');
          setupModal?.setAttribute('aria-hidden', String(!setupOpen));
          syncControls();
          setTimeout(() => {
            if (setupOpen) {
              modelSelect?.focus();
            } else if (!running && authReady) {
              input.focus();
            }
          }, 0);
        }

    function scrollDown() {
      transcript.scrollTop = transcript.scrollHeight;
    }

      function clearEmpty() {
        // The sigil is ambient now; keep it mounted behind active chats.
      }

    function restoreEmpty() {
      if (empty && !empty.isConnected) {
        transcript.prepend(empty);
      }
    }

    function resetThreadSurface() {
      transcript.querySelectorAll('.msg').forEach(node => node.remove());
      restoreEmpty();
      scrollDown();
    }

    function renderBubbleText(target, text) {
      target.dataset.rawText = text || '';
      target.replaceChildren();
      const source = String(text || '');
      const urlPattern = /https?:\/\/[^\s<>"']+/g;
      let index = 0;
      let match;
      while ((match = urlPattern.exec(source)) !== null) {
        if (match.index > index) target.append(document.createTextNode(source.slice(index, match.index)));
        let url = match[0];
        let trailing = '';
        const punctuation = url.match(/[),.!?]+$/);
        if (punctuation) {
          trailing = punctuation[0];
          url = url.slice(0, -trailing.length);
        }
        const link = document.createElement('a');
        link.href = url;
        link.textContent = url;
        link.target = '_blank';
        link.rel = 'noopener noreferrer';
        target.append(link);
        if (trailing) target.append(document.createTextNode(trailing));
        index = match.index + match[0].length;
      }
      if (index < source.length) target.append(document.createTextNode(source.slice(index)));
    }

    function addMessage(role, text, label) {
      clearEmpty();
      const wrap = document.createElement('div');
      wrap.className = `msg ${role}`;
      const small = document.createElement('div');
      small.className = 'label';
      small.textContent = label || (role === 'user' ? 'you' : role);
      const bubble = document.createElement('div');
      bubble.className = 'bubble';
      renderBubbleText(bubble, text || '');

      if (role === 'assistant') {
        const bubbleWrapper = document.createElement('div');
        bubbleWrapper.className = 'bubble-wrapper';
        const copyBtn = document.createElement('button');
        copyBtn.type = 'button';
        copyBtn.className = 'copy-btn';
        copyBtn.textContent = '⧉';
        copyBtn.setAttribute('aria-label', 'Copy');
        copyBtn.addEventListener('click', async () => {
          try {
            await navigator.clipboard.writeText(bubble.dataset.rawText || bubble.textContent);
            blip([[pulseTone(2, 1.35), 0, .04, 'triangle', .018], [pulseTone(4, 1.35), 48, .04, 'sine', .014]]);
            haptic(12);
            pulseAt(copyBtn, 'blue');
            copyBtn.classList.add('copied');
            copyBtn.textContent = '✓';
            setTimeout(() => {
              copyBtn.classList.remove('copied');
              copyBtn.textContent = '⧉';
            }, 1800);
          } catch (e) {
            console.log('Copy failed:', e);
          }
        });
        bubbleWrapper.append(bubble, copyBtn);
        wrap.append(small, bubbleWrapper);
      } else {
        wrap.append(small, bubble);
      }

      transcript.appendChild(wrap);
      scrollDown();
      return bubble;
    }

    function appendAssistant(text) {
      if (!currentBubble) currentBubble = addMessage('assistant', '', shortModelLabel().toLowerCase());
      if (currentBubble.dataset.placeholder === 'true') {
        renderBubbleText(currentBubble, '');
        delete currentBubble.dataset.placeholder;
        currentBubble.closest('.msg')?.classList.remove('thinking');
      }
      currentReplyText += text;
      renderBubbleText(currentBubble, currentReplyText);
      currentBubble.closest('.msg')?.classList.add('streaming');
      scrollDown();
    }

    function startAssistantPlaceholder() {
      beepThinking();
      haptic([12, 24, 10]);
      currentBubble = addMessage('assistant', '◌ ◌ ◌', shortModelLabel().toLowerCase());
      currentReplyText = '';
      currentBubble.dataset.placeholder = 'true';
      currentBubble.closest('.msg')?.classList.add('streaming', 'thinking');
    }

    function addSystem(text) {
      currentBubble = null;
      addMessage('system', text, 'system');
    }

    function saveChatId(id) {
      chatId = id || chatId;
      if (chatId) {
        localStorage.setItem(chatStorageKey(), chatId);
        if (model === 'claude' && workspace === 'pibulus-os') {
          localStorage.setItem('pibulus.claude.chatId', chatId);
        }
      }
    }

    async function bootstrap() {
      const res = await fetch(`${api}/bootstrap`, { credentials: 'same-origin', cache: 'no-store' });
      if (!res.ok) throw new Error(`bootstrap ${res.status}`);
      const data = await res.json();
      csrf = data.csrf;
      models = data.models || [{ key: 'claude', label: 'Claude Code', enabled: Boolean(data.claude_auth?.ok), modes: ['default', 'full'], default_mode: 'default' }];
      modes = data.modes || [
        { key: 'default', label: 'Ask', enabled: true },
        { key: 'full', label: 'Full', enabled: true }
      ];
      workspaces = data.workspaces || [{ key: 'pibulus-os', label: 'pibulus-os' }];
      input.maxLength = data.max_prompt_chars || 12000;
      applyDeckMood(data.pulse?.seed || Date.now().toString(16));
      normalizeSelections();
      renderControls();
      setRunning(Boolean(data.active));
      syncSpeakerButton();
      if (!authReady) addSystem(`${shortModelLabel()} is unavailable.`);
      updateMoonPhase();
          applyPulse(data.pulse || { load: 0.12, seed: Date.now().toString(16) });
          setInterval(updateMoonPhase, 3600000);
          setInterval(updatePiGlow, 45000);
          setSetupOpen(true);
        }

        promptChips.forEach(btn => {
          btn.addEventListener('click', () => {
            if (!authReady) return;
        stopDictation({ abort: true });
        setComposerText(btn.dataset.prompt || '', true);
          });
        });

        function chooseMode(nextMode) {
          const activeModel = selectedModelConfig();
          const allowed = visibleModesFor(activeModel).some(item => item.key === nextMode);
          if (!allowed || running) return;
          mode = nextMode;
          persistSelections();
          clearFullArm();
          renderControls();
        }

        modelSelect.addEventListener('change', () => {
          model = modelSelect.value;
      const activeModel = selectedModelConfig();
      if (!activeModel.enabled) {
        normalizeSelections();
      } else {
        const visibleModes = visibleModesFor(activeModel);
        if (!visibleModes.some(item => item.key === mode)) {
          mode = visibleModes.some(item => item.key === 'default') ? 'default' : (visibleModes[0]?.key || 'default');
        }
        persistSelections();
        loadChatId();
      }
          clearFullArm();
          renderControls();
        });

        modeSelect.addEventListener('change', () => {
          chooseMode(modeSelect.value);
        });

        modeOptionButtons.forEach(btn => {
          btn.addEventListener('click', () => {
            chooseMode(btn.dataset.modeOption);
            haptic(10);
            blip([[pulseTone(btn.dataset.modeOption === 'full' ? -1 : 1, 1.2), 0, .04, 'triangle', .014]]);
          });
        });

        workspaceSelect.addEventListener('change', () => {
          workspace = workspaceSelect.value;
      persistSelections();
      loadChatId();
      clearFullArm();
          renderControls();
        });

        setupStartBtn.addEventListener('click', () => {
          if (!authReady || running) return;
          persistSelections();
          setSetupOpen(false);
          pulseAt(setupStartBtn, mode === 'full' ? 'danger' : 'blue');
          haptic(mode === 'full' ? [18, 20, 18] : 14);
          blip([[pulseTone(mode === 'full' ? -2 : 2, 1.15), 0, .045, 'triangle', .016]]);
        });

    input.addEventListener('input', fitInput);
    input.addEventListener('keydown', event => keyClicker.play(event));

    async function armFullMode() {
      if (armPending || running) return;
      armPending = true;
      holdBtn.classList.remove('charging');
      holdBtn.classList.add('pending');
      holdBtn.textContent = '...';
      try {
        const res = await fetch(`${api}/arm`, {
          method: 'POST',
          credentials: 'same-origin',
          headers: { 'Content-Type': 'application/json', 'X-PIBULUS-CSRF': csrf },
          body: JSON.stringify({ workspace })
        });
        if (!res.ok) throw new Error(`arm ${res.status}`);
        const data = await res.json();
        armToken = data.arm_token || '';
        armExpiresAt = Date.now() + ((data.expires_in || 60) * 1000);
        fullArmed = Boolean(armToken);
        holdBtn.classList.toggle('armed', fullArmed);
        holdBtn.textContent = fullArmed ? 'NEXT' : 'HOLD';
        if (fullArmed) {
          beepArm();
          haptic([28, 28, 70]);
        }
      } catch (err) {
        clearFullArm();
        beepError();
        haptic([70, 40, 30]);
        addSystem('Full could not arm.');
      } finally {
        armPending = false;
        holdBtn.classList.remove('pending');
      }
    }

    holdBtn.addEventListener('pointerdown', () => {
      clearFullArm();
      holdBtn.textContent = 'HOLD';
      holdBtn.classList.add('charging');
      haptic(40);
      let hapticCount = 0;
      const hapticInterval = setInterval(() => {
        if (hapticCount++ > 8) clearInterval(hapticInterval);
        haptic(30 + hapticCount * 5);
      }, 110);
      holdTimer = setTimeout(() => {
        clearInterval(hapticInterval);
        haptic([50, 50, 100]);
        armFullMode();
      }, 900);
    });

    ['pointerup', 'pointercancel', 'pointerleave'].forEach(name => {
      holdBtn.addEventListener(name, () => {
        if (holdTimer) clearTimeout(holdTimer);
        holdTimer = null;
        holdBtn.classList.remove('charging');
        if (!fullArmed) holdBtn.textContent = 'HOLD';
        haptic(20);
      });
    });

    async function stopRun() {
      if (!running) return;
      beepError();
      haptic([25, 20, 25]);
      await fetch(`${api}/stop`, {
        method: 'POST',
        credentials: 'same-origin',
        headers: { 'Content-Type': 'application/json', 'X-PIBULUS-CSRF': csrf },
        body: JSON.stringify({ chat_id: chatId })
      }).catch(() => {});
      addSystem('stop requested');
    }

    stopBtn.addEventListener('click', stopRun);

    micBtn.addEventListener('click', () => {
      if (dictating) {
        haptic(12);
        stopDictation();
      } else {
        haptic(18);
        startDictation();
      }
    });

    speakerBtn.addEventListener('click', () => {
      if (!canSpeak) {
        addSystem('speech is not available in this browser');
        return;
      }
      speakEnabled = !speakEnabled;
      localStorage.setItem('pibulus.claude.speak', speakEnabled ? '1' : '0');
      if (!speakEnabled) {
        cancelSpeech();
        return;
      }
      syncSpeakerButton();
      pickVoice();
      speakText('voice on', { force: true });
    });

    newBtn.addEventListener('click', () => {
      if (setupOpen) {
        setSetupOpen(false);
        input.focus();
        haptic(8);
        blip([[pulseTone(1, .9), 0, .035, 'triangle', .012]]);
        return;
      }
          chatId = '';
          currentBubble = null;
          currentReplyText = '';
          chatCost = 0;
          spendingAmount.textContent = '$0.00';
          stopDictation({ abort: true });
      cancelSpeech();
      clearFullArm();
      localStorage.removeItem(chatStorageKey());
      if (model === 'claude' && workspace === 'pibulus-os') localStorage.removeItem('pibulus.claude.chatId');
      resetThreadSurface();
      setSetupOpen(true);
      input.focus();
      haptic(12);
      blip([[pulseTone(2, 1.1), 0, .04, 'triangle', .016]]);
    });

    async function sendMessage(text) {
      if (running) return;
      stopDictation({ abort: true });
      const wantsFull = mode === 'full';
      let fullToken = wantsFull && armToken && Date.now() < armExpiresAt ? armToken : '';
      if (wantsFull && !fullToken) {
        try {
          const res = await fetch(`${api}/arm`, {
            method: 'POST',
            credentials: 'same-origin',
            headers: { 'Content-Type': 'application/json', 'X-PIBULUS-CSRF': csrf },
            body: JSON.stringify({ workspace })
          });
          if (!res.ok) throw new Error(`arm ${res.status}`);
          const data = await res.json();
          fullToken = data.arm_token || '';
          armToken = fullToken;
          armExpiresAt = Date.now() + ((data.expires_in || 60) * 1000);
          fullArmed = Boolean(fullToken);
          if (!fullToken) throw new Error('full mode unavailable');
          beepArm();
        } catch (err) {
          clearFullArm();
          beepError();
          haptic([50, 30, 25]);
          addSystem('Full could not start.');
          return;
        }
      }
      beepSend();
      haptic(wantsFull ? [18, 28, 18] : 16);
      setSetupOpen(false);

      addMessage('user', text, 'you');
      currentBubble = null;
      currentReplyText = '';
      setRunning(true);
      const sendMode = wantsFull ? 'full' : mode;
      const payload = {
        message: text,
        chat_id: chatId,
        model,
        mode: sendMode,
        workspace,
        arm_token: wantsFull ? fullToken : ''
      };
      clearFullArm();

      const res = await fetch(`${api}/chat`, {
        method: 'POST',
        credentials: 'same-origin',
        headers: { 'Content-Type': 'application/json', 'X-PIBULUS-CSRF': csrf },
        body: JSON.stringify(payload)
      });

      if (!res.ok) {
        let msg = `request failed ${res.status}`;
        try {
          const err = await res.json();
          msg = err.error || msg;
        } catch (_) {}
        beepError();
        haptic([60, 30, 25]);
        addSystem(msg);
        setRunning(false);
        return;
      }

      const reader = res.body.getReader();
      const decoder = new TextDecoder();
      let buffer = '';

      while (true) {
        const { value, done } = await reader.read();
        if (done) break;
        buffer += decoder.decode(value, { stream: true });
        let idx;
        while ((idx = buffer.indexOf('\n')) >= 0) {
          const line = buffer.slice(0, idx).trim();
          buffer = buffer.slice(idx + 1);
          if (!line) continue;
          let event;
          try { event = JSON.parse(line); } catch (_) { continue; }
          if (event.type === 'started') {
            saveChatId(event.chat_id);
            startAssistantPlaceholder();
          } else if ((event.type === 'claude' || event.type === 'agent') && event.text) {
            appendAssistant(event.text);
          } else if (event.type === 'line' && event.text) {
            appendAssistant(event.text + '\n');
          } else if (event.type === 'stderr' && event.text) {
            addSystem(event.text);
          } else if (event.type === 'error' && event.text) {
            beepError();
            haptic([60, 30, 25]);
            addSystem(event.text);
          } else if (event.type === 'done') {
            beepDone();
            haptic([14, 34, 18]);
                if (event.result && event.result.cost_usd) pulseSpending(event.result.cost_usd, event.model);
            const msgEl = currentBubble?.closest('.msg');
            msgEl?.classList.remove('streaming', 'thinking');
            msgEl?.classList.add('complete');
            if (currentBubble?.dataset.placeholder === 'true') currentBubble.closest('.msg')?.remove();
            if (currentReplyText.trim()) speakText(currentReplyText);
            currentBubble = null;
            currentReplyText = '';
            setRunning(false);
            if (event.timed_out) addSystem('run timed out');
            if (event.code && event.code !== 0) addSystem(`exit ${event.code}`);
          }
        }
      }
      setRunning(false);
    }

    form.addEventListener('submit', async (event) => {
      event.preventDefault();
      stopDictation({ abort: true });
      const text = input.value.trim();
      if (!text) return;
      setComposerText('');
      try {
        await sendMessage(text);
      } catch (err) {
        addSystem(err.message || String(err));
        setRunning(false);
      }
    });

    if (canSpeak) {
      window.speechSynthesis.onvoiceschanged = pickVoice;
      pickVoice();
    }
    syncSpeakerButton();
    syncMicButton();

    bootstrap().catch(err => {
      addSystem(err.message || String(err));
      setRunning(false);
    });
  </script>
</body>
</html>
