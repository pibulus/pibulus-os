<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>the wall - quickcat.club</title>
  <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --bg: #050505; --cyan: #00ffea; --magenta: #ff00ff; --text: #e0e0e0; --dim: #666; }
    body { background: var(--bg); color: var(--text); font-family: 'VT323', monospace; min-height: 100vh; overflow-x: hidden; display: flex; flex-direction: column; align-items: center; padding: 1rem; }
    .back { align-self: flex-start; color: var(--dim); text-decoration: none; margin-bottom: 1rem; }
    h1 { color: var(--magenta); font-size: 3rem; letter-spacing: 4px; }
    .sub { color: var(--dim); margin-bottom: 1rem; }
    .wall-frame { border: 2px solid rgba(0,255,234,0.2); background: #000; touch-action: none; cursor: crosshair; }
    canvas { display: block; image-rendering: pixelated; }
    .palette { display: flex; flex-wrap: wrap; gap: 4px; justify-content: center; padding: 8px; max-width: 400px; }
    .swatch { width: 30px; height: 30px; border: 2px solid #222; cursor: pointer; }
    .swatch.active { border-color: #fff; box-shadow: 0 0 8px rgba(255,255,255,0.5); }
    .stats { color: var(--dim); font-size: 0.9rem; margin-top: 1rem; }
    .cooldown-bar { width: 100%; max-width: 300px; height: 4px; background: #111; margin-top: 10px; overflow: hidden; }
    .cooldown-fill { height: 100%; background: var(--cyan); width: 100%; transition: width 0.05s linear; }
  </style>
</head>
<body>
  <a href="/" class="back">&larr; quickcat.club</a>
  <h1>the wall</h1>
  <p class="sub">drag to draw. one pixel at a time.</p>
  <div class="wall-frame"><canvas id="wall"></canvas></div>
  <div class="palette" id="palette"></div>
  <div class="cooldown-bar"><div class="cooldown-fill" id="cooldownFill"></div></div>
  <div class="stats"><span id="pixelCount">0</span> pixels placed by <span id="visitorCount">0</span> visitors</div>
  <script>
    const GRID = 128;
    const canvas = document.getElementById('wall');
    const ctx = canvas.getContext('2d', { alpha: false });
    const PALETTE = ['#ff0000','#ff6600','#ffcc00','#33cc33','#00cccc','#0066ff','#9933ff','#ff00ff','#ffffff','#000000','#00ffea','#ffff00'];
    
    let PIXEL_SIZE = 4;
    function resize() {
      PIXEL_SIZE = Math.max(1, Math.floor((Math.min(window.innerWidth, 600) - 40) / GRID));
      canvas.width = GRID * PIXEL_SIZE; canvas.height = GRID * PIXEL_SIZE;
      load();
    }

    let selectedColor = PALETTE[0];
    let grid = new Array(GRID * GRID).fill(null);
    let isDrawing = false;
    let pending = [];

    PALETTE.forEach((c, i) => {
      const s = document.createElement('div');
      s.className = 'swatch' + (i === 0 ? ' active' : '');
      s.style.background = c;
      s.onclick = () => { document.querySelectorAll('.swatch').forEach(x => x.classList.remove('active')); s.classList.add('active'); selectedColor = c; };
      document.getElementById('palette').appendChild(s);
    });

    function load() {
      fetch('/wall/state.json', { cache: 'no-cache' }).then(r => r.json()).then(data => {
        if (data && data.grid) {
          grid = data.grid;
          document.getElementById('visitorCount').textContent = data.visitors ? data.visitors.length : 0;
          render();
        }
      });
    }

    function render() {
      ctx.fillStyle = '#000'; ctx.fillRect(0, 0, canvas.width, canvas.height);
      let count = 0;
      grid.forEach((c, i) => {
        if (c) {
          ctx.fillStyle = c;
          ctx.fillRect((i % GRID) * PIXEL_SIZE, Math.floor(i / GRID) * PIXEL_SIZE, PIXEL_SIZE, PIXEL_SIZE);
          count++;
        }
      });
      document.getElementById('pixelCount').textContent = count;
    }

    function place(e) {
      const rect = canvas.getBoundingClientRect();
      const clientX = e.touches ? e.touches[0].clientX : e.clientX;
      const clientY = e.touches ? e.touches[0].clientY : e.clientY;
      const x = Math.floor((clientX - rect.left) / (rect.width / GRID));
      const y = Math.floor((clientY - rect.top) / (rect.height / GRID));
      if (x < 0 || x >= GRID || y < 0 || y >= GRID) return;
      const i = y * GRID + x;
      if (grid[i] === selectedColor) return;
      grid[i] = selectedColor;
      ctx.fillStyle = selectedColor;
      ctx.fillRect(x * PIXEL_SIZE, y * PIXEL_SIZE, PIXEL_SIZE, PIXEL_SIZE);
      pending.push({x, y, c: selectedColor});
      if (pending.length > 10) flush();
    }

    function flush() {
      if (!pending.length) return;
      fetch('/wall/place', { method: 'POST', body: JSON.stringify({points: pending, v: localStorage.getItem('v_id') || Math.random().toString(36).slice(2,10)}) });
      pending = [];
    }

    canvas.addEventListener('mousedown', () => isDrawing = true);
    window.addEventListener('mouseup', () => { isDrawing = false; flush(); });
    canvas.addEventListener('mousemove', e => isDrawing && place(e));
    canvas.addEventListener('touchstart', e => { isDrawing = true; place(e); e.preventDefault(); }, {passive:false});
    canvas.addEventListener('touchmove', e => { isDrawing && place(e); e.preventDefault(); }, {passive:false});
    canvas.addEventListener('touchend', () => { isDrawing = false; flush(); });

    window.addEventListener('resize', resize);
    resize();
    setInterval(load, 5000);
  </script>
</body>
</html>
