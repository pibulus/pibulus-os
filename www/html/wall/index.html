<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>the wall - quickcat.club</title>
  <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #030504;
      --panel: #080d0b;
      --edge: rgba(108, 255, 218, 0.32);
      --edge-strong: #6cffda;
      --hot: #f15bb5;
      --text: #edf7f2;
      --dim: #7b8f86;
      --muted: #17201c;
    }

    body {
      min-height: 100vh;
      background:
        radial-gradient(circle at 50% 0%, rgba(241, 91, 181, 0.08), transparent 28rem),
        linear-gradient(180deg, #020302 0%, var(--bg) 100%);
      color: var(--text);
      font-family: 'VT323', monospace;
      overflow-x: hidden;
      padding: max(0.75rem, env(safe-area-inset-top)) 0.9rem 1.25rem;
    }

    main {
      width: min(100%, 960px);
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.75rem;
    }

    .back {
      align-self: flex-start;
      min-height: 44px;
      display: inline-flex;
      align-items: center;
      color: var(--dim);
      text-decoration: none;
      font-size: 1.2rem;
    }

    .back:focus-visible,
    button:focus-visible {
      outline: 2px solid var(--edge-strong);
      outline-offset: 3px;
    }

    h1 {
      color: var(--hot);
      font-size: clamp(2.8rem, 12vw, 4.6rem);
      line-height: 0.85;
      letter-spacing: 0;
      text-shadow: 0 0 18px rgba(241, 91, 181, 0.28);
    }

    .sub {
      color: var(--dim);
      font-size: clamp(1.05rem, 3vw, 1.25rem);
      text-align: center;
    }

    .wall-area {
      width: min(100%, 900px);
      display: grid;
      grid-template-columns: minmax(0, 680px) 160px;
      gap: 0.75rem;
      align-items: start;
      justify-content: center;
    }

    .wall-shell {
      width: 100%;
      max-width: 680px;
      border: 1px solid var(--edge);
      background: #000;
      box-shadow: 0 0 0 1px rgba(108, 255, 218, 0.08), 0 18px 60px rgba(0, 0, 0, 0.38);
      overflow: hidden;
    }

    .wall-frame {
      width: var(--wall-size);
      height: var(--wall-size);
      touch-action: none;
      cursor: crosshair;
      position: relative;
    }

    canvas {
      display: block;
      width: 100%;
      height: 100%;
      image-rendering: pixelated;
    }

    .archive {
      display: none;
      width: 100%;
      border: 1px solid rgba(108, 255, 218, 0.22);
      background: rgba(8, 13, 11, 0.72);
      padding: 0.65rem;
    }

    .archive.visible {
      display: block;
    }

    .archive h2 {
      color: var(--edge-strong);
      font-size: 1.2rem;
      font-weight: 400;
      line-height: 1;
      margin-bottom: 0.55rem;
    }

    .archive-list {
      display: grid;
      gap: 0.55rem;
    }

    .archive-item {
      display: grid;
      gap: 0.3rem;
      color: var(--dim);
      text-decoration: none;
      font-size: 1rem;
    }

    .archive-item:focus-visible {
      outline: 2px solid var(--edge-strong);
      outline-offset: 3px;
    }

    .archive-thumb {
      width: 100%;
      aspect-ratio: 1;
      display: block;
      border: 1px solid rgba(108, 255, 218, 0.26);
      background: #000;
      image-rendering: pixelated;
      object-fit: contain;
    }

    .archive-meta {
      display: flex;
      justify-content: space-between;
      gap: 0.35rem;
      line-height: 1;
    }

    .toolbar {
      width: min(100%, 680px);
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      align-items: center;
    }

    .palette {
      display: flex;
      flex-wrap: wrap;
      gap: 0.45rem;
      justify-content: center;
    }

    .swatch {
      width: 44px;
      height: 44px;
      border: 2px solid #101816;
      background: var(--color);
      cursor: pointer;
      border-radius: 6px;
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.16);
    }

    .swatch.active {
      border-color: var(--text);
      box-shadow: 0 0 0 2px #000, 0 0 0 4px var(--edge-strong), 0 0 16px rgba(108, 255, 218, 0.45);
    }

    button {
      min-width: 44px;
      min-height: 44px;
      border: 1px solid var(--muted);
      border-radius: 6px;
      background: var(--panel);
      color: var(--text);
      cursor: pointer;
      font: inherit;
      font-size: 1.15rem;
    }

    button.active {
      border-color: var(--edge-strong);
      color: var(--edge-strong);
      box-shadow: inset 0 -3px 0 rgba(108, 255, 218, 0.18);
    }

    .stats {
      width: min(100%, 680px);
      color: var(--dim);
      font-size: 1.05rem;
      display: flex;
      justify-content: space-between;
      gap: 1rem;
      border-top: 1px solid rgba(108, 255, 218, 0.22);
      padding-top: 0.75rem;
    }

    #saveState { color: var(--edge-strong); }

    @media (max-width: 900px) {
      .wall-area {
        grid-template-columns: 1fr;
        width: min(100%, 680px);
      }

      .archive-list {
        grid-template-columns: repeat(auto-fit, minmax(86px, 1fr));
      }
    }

    @media (max-width: 620px) {
      body { padding-inline: 0.65rem; }
      main { gap: 0.65rem; }
      .stats { flex-direction: column; align-items: center; gap: 0.25rem; text-align: center; }
    }

    @media (prefers-reduced-motion: reduce) {
      * { scroll-behavior: auto !important; }
    }
  </style>
  <script src="/emoji-favicon.js?v=1"></script>
</head>
<body>
  <main>
    <a href="/" class="back">&larr; quickcat.club</a>
    <h1>the wall</h1>
    <p class="sub">make it worse</p>
    <div class="wall-area">
      <div class="wall-shell" id="wallShell">
        <div class="wall-frame" id="wallFrame"><canvas id="wall"></canvas></div>
      </div>
      <aside class="archive" id="archivePanel" aria-label="monthly wall archive">
        <h2>archive</h2>
        <div class="archive-list" id="archiveList"></div>
      </aside>
    </div>
    <div class="toolbar">
      <div class="palette" id="palette" aria-label="wall colors"></div>
    </div>
    <div class="stats">
      <span><span id="pixelCount">0</span> pixels by <span id="visitorCount">0</span> visitors</span>
      <span id="saveState">synced</span>
    </div>
  </main>

  <script>
    const GRID = 128;
    const STORAGE_COLOR = 'wall_color';
    const STORAGE_VISITOR = 'v_id';
    const canvas = document.getElementById('wall');
    const ctx = canvas.getContext('2d', { alpha: false });
    const wallFrame = document.getElementById('wallFrame');
    const saveState = document.getElementById('saveState');
    const archivePanel = document.getElementById('archivePanel');
    const archiveList = document.getElementById('archiveList');
    const MONTHS = ['jan', 'feb', 'mar', 'apr', 'may', 'jun', 'jul', 'aug', 'sep', 'oct', 'nov', 'dec'];
    const PALETTE = [
      '#ff5c57', '#ff9f43', '#ffd166', '#b8e986',
      '#5ee6a8', '#4dd0e1', '#5dade2', '#8e7dff',
      '#c77dff', '#ff6ec7', '#f8f4e3', '#101014'
    ];

    let wallSize = 512;
    let selectedColor = localStorage.getItem(STORAGE_COLOR) || PALETTE[0];
    let grid = new Array(GRID * GRID).fill(null);
    let isDrawing = false;
    let pending = [];
    let flushTimer = null;

    if (!PALETTE.includes(selectedColor)) selectedColor = PALETTE[0];

    function visitorId() {
      let id = localStorage.getItem(STORAGE_VISITOR);
      if (!id) {
        id = Math.random().toString(36).slice(2, 10);
        localStorage.setItem(STORAGE_VISITOR, id);
      }
      return id;
    }

    function setStatus(text) {
      saveState.textContent = text;
    }

    function resize() {
      const available = Math.min(window.innerWidth - 28, 680);
      wallSize = Math.max(320, Math.floor(available));
      canvas.width = GRID * 4;
      canvas.height = GRID * 4;
      wallFrame.style.setProperty('--wall-size', `${wallSize}px`);
      render();
    }

    PALETTE.forEach((color) => {
      const swatch = document.createElement('button');
      swatch.type = 'button';
      swatch.className = 'swatch' + (color === selectedColor ? ' active' : '');
      swatch.style.setProperty('--color', color);
      swatch.setAttribute('aria-label', `select ${color}`);
      swatch.addEventListener('click', () => {
        document.querySelectorAll('.swatch').forEach((item) => item.classList.remove('active'));
        swatch.classList.add('active');
        selectedColor = color;
        localStorage.setItem(STORAGE_COLOR, color);
      });
      document.getElementById('palette').appendChild(swatch);
    });

    function load() {
      fetch('/wall/state.json', { cache: 'no-cache' })
        .then((response) => response.json())
        .then((data) => {
          if (data && data.grid) {
            grid = data.grid;
            document.getElementById('visitorCount').textContent = data.visitors ? data.visitors.length : 0;
            render();
            if (!pending.length) setStatus('synced');
          }
        })
        .catch(() => setStatus('offline'));
    }

    function archiveLabel(month) {
      const [year, monthNumber] = String(month || '').split('-');
      const index = Number(monthNumber) - 1;
      if (!year || index < 0 || index >= MONTHS.length) return String(month || '');
      return `${MONTHS[index]} ${year}`;
    }

    function renderArchive(items) {
      const archives = Array.isArray(items) ? items.slice(0, 12) : [];
      archiveList.textContent = '';
      archivePanel.classList.toggle('visible', archives.length > 0);
      if (!archives.length) return;

      archives.forEach((item) => {
        const label = item.label || archiveLabel(item.month);
        const link = document.createElement('a');
        link.className = 'archive-item';
        link.href = item.png;
        link.target = '_blank';
        link.rel = 'noopener';
        link.title = `${label} - ${item.pixels || 0} pixels`;

        const img = document.createElement('img');
        img.className = 'archive-thumb';
        img.src = item.png;
        img.alt = `${label} wall`;
        img.loading = 'lazy';

        const meta = document.createElement('span');
        meta.className = 'archive-meta';

        const month = document.createElement('span');
        month.textContent = label;

        const count = document.createElement('span');
        count.textContent = item.pixels ? item.pixels : '';

        meta.append(month, count);
        link.append(img, meta);
        archiveList.appendChild(link);
      });
    }

    function loadArchive() {
      fetch('/wall/archive.json', { cache: 'no-cache' })
        .then((response) => response.ok ? response.json() : { archives: [] })
        .then((data) => renderArchive(data.archives))
        .catch(() => renderArchive([]));
    }

    function render() {
      ctx.fillStyle = '#000';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      let count = 0;
      grid.forEach((color, index) => {
        if (color) {
          ctx.fillStyle = color;
          ctx.fillRect((index % GRID) * 4, Math.floor(index / GRID) * 4, 4, 4);
          count++;
        }
      });
      document.getElementById('pixelCount').textContent = count;
    }

    function drawCell(x, y, color) {
      ctx.fillStyle = color;
      ctx.fillRect(x * 4, y * 4, 4, 4);
    }

    function place(event) {
      const rect = canvas.getBoundingClientRect();
      const x = Math.floor((event.clientX - rect.left) / (rect.width / GRID));
      const y = Math.floor((event.clientY - rect.top) / (rect.height / GRID));
      if (x < 0 || x >= GRID || y < 0 || y >= GRID) return;

      const index = y * GRID + x;
      if (grid[index] === selectedColor) return;

      grid[index] = selectedColor;
      drawCell(x, y, selectedColor);
      pending.push({ x, y, c: selectedColor });
      setStatus('saving');

      clearTimeout(flushTimer);
      flushTimer = setTimeout(flush, 280);
      if (pending.length >= 16) flush();
    }

    function flush() {
      if (!pending.length) return;
      clearTimeout(flushTimer);
      const points = pending.slice();
      pending = [];

      fetch('/wall/place', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ points, v: visitorId() })
      })
        .then((response) => {
          if (!response.ok) throw new Error('save failed');
          setStatus('synced');
        })
        .catch(() => {
          pending = points.concat(pending);
          setStatus('not saved');
        });
    }

    canvas.addEventListener('pointerdown', (event) => {
      isDrawing = true;
      canvas.setPointerCapture(event.pointerId);
      place(event);
    });

    canvas.addEventListener('pointermove', (event) => {
      if (isDrawing) place(event);
    });

    canvas.addEventListener('pointerup', () => {
      isDrawing = false;
      flush();
    });

    canvas.addEventListener('pointercancel', () => {
      isDrawing = false;
      flush();
    });

    window.addEventListener('beforeunload', flush);
    window.addEventListener('resize', resize);
    resize();
    visitorId();
    load();
    loadArchive();
    setInterval(load, 5000);
    setInterval(loadArchive, 60000);
  </script>
</body>
</html>
