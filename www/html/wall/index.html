<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>graffiti wall - quickcat.club</title>
  <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #050505;
      --cyan: #00ffea;
      --magenta: #ff00ff;
      --yellow: #f0e68c;
      --purple: #9d50bb;
      --text: #d8d8dc;
      --dim: #555;
    }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'VT323', monospace;
      min-height: 100vh;
      overflow-x: hidden;
      touch-action: none;
    }
    /* VHS Overlay */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.15) 2px, rgba(0,0,0,0.15) 4px);
      pointer-events: none; z-index: 1000;
    }
    .container {
      max-width: 800px; margin: 0 auto; padding: 1rem;
      display: flex; flex-direction: column; align-items: center; gap: 12px;
    }
    header { width: 100%; display: flex; justify-content: space-between; align-items: center; }
    .back { color: var(--dim); text-decoration: none; font-size: 1.2rem; }
    .back:hover { color: var(--cyan); }
    
    h1 {
      font-size: clamp(2.5rem, 8vw, 4rem);
      color: var(--cyan);
      text-shadow: 3px 3px var(--magenta), -1px -1px 0 #000;
      letter-spacing: 4px; text-transform: uppercase;
    }

    .wall-container {
      position: relative;
      background: #000;
      border: 2px solid #1a1a1a;
      box-shadow: 0 0 20px rgba(0,0,0,0.5);
      cursor: crosshair;
      overflow: hidden;
    }
    
    canvas {
      display: block;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      max-width: 100%;
      height: auto;
    }

    .toolbar {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 15px;
      align-items: center;
      background: rgba(20,20,25,0.8);
      padding: 15px;
      border: 1px solid #222;
    }

    .palette { display: flex; gap: 10px; }
    .swatch {
      width: 45px; height: 45px;
      border: 2px solid #333;
      cursor: pointer;
      transition: all 0.1s;
      position: relative;
    }
    .swatch:hover { transform: scale(1.1); border-color: #666; }
    .swatch.active { border-color: #fff; transform: scale(1.15); box-shadow: 0 0 15px rgba(255,255,255,0.2); }
    .swatch.active::after {
      content: '✔'; position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      color: #fff; text-shadow: 0 0 4px #000;
    }

    .brush-controls { display: flex; align-items: center; gap: 15px; color: var(--dim); }
    input[type=range] { cursor: pointer; }

    .stats { font-size: 1rem; color: var(--dim); letter-spacing: 2px; }
    .stats span { color: var(--magenta); }

    footer { color: #222; font-size: 0.9rem; letter-spacing: 3px; margin-top: 10px; }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <a href="/" class="back">&larr; BACK</a>
      <div class="stats"><span id="visitorCount">0</span> ARTISTS</div>
    </header>
    
    <h1>GRAFFITI WALL</h1>

    <div class="wall-container" id="canvasWrap">
      <canvas id="wall"></canvas>
    </div>

    <div class="toolbar">
      <div class="palette" id="palette"></div>
      <div class="brush-controls">
        <span>BRUSH SIZE</span>
        <input type="range" id="brushSize" min="1" max="5" value="2">
      </div>
    </div>

    <footer>LEAVE YOUR MARK. FOREVER (MAYBE).</footer>
  </div>

  <script>
    const GRID = 128;
    const PALETTE = ['#ff00ff', '#00ffea', '#9d50bb', '#f0e68c', '#000000'];
    const canvas = document.getElementById('wall');
    const ctx = canvas.getContext('2d', { alpha: false });
    
    // Responsive canvas sizing
    const size = Math.min(window.innerWidth - 40, 760);
    const pixelSize = size / GRID;
    canvas.width = size;
    canvas.height = size;

    let selectedColor = PALETTE[0];
    let isDrawing = false;
    let grid = new Array(GRID * GRID).fill(null);
    let visitors = new Set();

    // Init palette
    const palEl = document.getElementById('palette');
    PALETTE.forEach((c, i) => {
      const s = document.createElement('div');
      s.className = 'swatch' + (i === 0 ? ' active' : '');
      s.style.background = c;
      s.onclick = () => {
        document.querySelectorAll('.swatch').forEach(x => x.classList.remove('active'));
        s.classList.add('active');
        selectedColor = c;
      };
      palEl.appendChild(s);
    });

    function drawPixel(gx, gy, color) {
      if (gx < 0 || gx >= GRID || gy < 0 || gy >= GRID) return;
      grid[gy * GRID + gx] = color;
      ctx.fillStyle = color;
      ctx.fillRect(gx * pixelSize, gy * pixelSize, pixelSize, pixelSize);
    }

    function drawBrush(gx, gy) {
      const radius = parseInt(document.getElementById('brushSize').value) - 1;
      const points = [];
      for (let i = -radius; i <= radius; i++) {
        for (let j = -radius; j <= radius; j++) {
          const nx = gx + i;
          const ny = gy + j;
          if (nx >= 0 && nx < GRID && ny >= 0 && ny < GRID) {
            drawPixel(nx, ny, selectedColor);
            points.push({ x: nx, y: ny, c: selectedColor });
          }
        }
      }
      return points;
    }

    function handleMove(e) {
      if (!isDrawing) return;
      const rect = canvas.getBoundingClientRect();
      const clientX = e.touches ? e.touches[0].clientX : e.clientX;
      const clientY = e.touches ? e.touches[0].clientY : e.clientY;
      const gx = Math.floor((clientX - rect.left) / pixelSize);
      const gy = Math.floor((clientY - rect.top) / pixelSize);
      
      const points = drawBrush(gx, gy);
      if (points.length > 0) {
        syncToServer(points);
      }
    }

    async function syncToServer(points) {
      try {
        await fetch('/wall/place', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ points, v: getVisitorId() })
        });
      } catch(e) {}
    }

    function getVisitorId() {
      let id = localStorage.getItem('qcc_visitor');
      if (!id) {
        id = Math.random().toString(36).slice(2, 8);
        localStorage.setItem('qcc_visitor', id);
      }
      return id;
    }

    canvas.addEventListener('mousedown', () => isDrawing = true);
    window.addEventListener('mouseup', () => isDrawing = false);
    canvas.addEventListener('mousemove', handleMove);
    
    canvas.addEventListener('touchstart', (e) => { isDrawing = true; handleMove(e); e.preventDefault(); }, { passive: false });
    canvas.addEventListener('touchend', () => isDrawing = false);
    canvas.addEventListener('touchmove', (e) => { handleMove(e); e.preventDefault(); }, { passive: false });

    // Load state
    async function load() {
      ctx.fillStyle = '#000';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      try {
        const res = await fetch('/wall/state.json');
        const data = await res.json();
        if (data.grid) {
          data.grid.forEach((c, i) => {
            if (c) {
              const x = i % GRID;
              const y = Math.floor(i / GRID);
              drawPixel(x, y, c);
            }
          });
        }
        document.getElementById('visitorCount').textContent = (data.visitors || []).length;
      } catch(e) {}
    }

    load();
    // Poll for updates every 5s
    setInterval(load, 5000);
  </script>
</body>
</html>
