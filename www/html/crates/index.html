<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Crates - quickcat.club</title>
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #050505;
      --accent: #f5c842;
      --accent-dim: rgba(245,200,66,0.3);
      --text: #e0e0e0;
      --dim: #888;
      --dim-soft: #555;
      --panel: rgba(12,10,0,0.82);
      --border: rgba(245,200,66,0.22);
      --gold: #cc9933;
      --gold-dim: rgba(204,153,51,0.3);
    }
    html { scrollbar-color: var(--accent) var(--bg); scrollbar-width: thin; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'VT323', monospace;
      font-size: 20px;
      line-height: 1.6;
      min-height: 100vh;
    }
    body::before {
      content: '';
      position: fixed; inset: 0;
      background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.15) 2px, rgba(0,0,0,0.15) 4px);
      pointer-events: none; z-index: 999;
    }
    .wrapper {
      position: relative; z-index: 1;
      max-width: 880px; margin: 0 auto; padding: 2rem 1.5rem 4rem;
    }
    .back { color: var(--dim); text-decoration: none; font-size: 1rem; min-height: 44px; display: inline-flex; align-items: center; }
    .back:hover { color: var(--accent); }
    header { text-align: center; padding: 2rem 0 1rem; }
    h1 {
      font-size: 3.6rem;
      color: var(--accent);
      text-shadow: 0 0 10px var(--accent), 0 0 30px rgba(245,200,66,0.35);
      letter-spacing: 0; line-height: 1; text-transform: uppercase;
    }
    .subtitle { color: var(--dim); font-size: 1.1rem; margin-top: 0.5rem; letter-spacing: 0; }
    .intro {
      text-align: center; color: var(--dim-soft); font-size: 0.95rem;
      max-width: 600px; margin: 0.75rem auto 0; line-height: 1.5;
    }
    .breadcrumbs {
      display: flex; flex-wrap: wrap; gap: 4px; align-items: center;
      margin: 1.5rem 0 0.5rem; font-size: 0.95rem; color: var(--dim);
    }
    .breadcrumbs a { color: var(--accent); text-decoration: none; cursor: pointer; }
    .breadcrumbs a:hover { text-decoration: underline; }
    .breadcrumbs .sep { color: var(--dim-soft); margin: 0 2px; }

    /* MODAL */
    .modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.92); backdrop-filter: blur(8px);
      z-index: 1000; display: none; align-items: center; justify-content: center;
      opacity: 0; transition: opacity 0.2s;
      padding: max(1rem, env(safe-area-inset-top)) max(1rem, env(safe-area-inset-right)) max(1rem, env(safe-area-inset-bottom)) max(1rem, env(safe-area-inset-left));
    }
    .modal-overlay.active { display: flex; opacity: 1; }
    .modal-card {
      background: #111; border: 1px solid var(--accent);
      padding: 2rem; max-width: 500px; width: min(90vw, 500px); max-height: calc(100dvh - 2rem); overflow: auto;
      text-align: center; position: relative;
      box-shadow: 0 0 30px rgba(245,200,66,0.15);
    }
    .modal-title { font-size: 1.5rem; color: var(--accent); margin-bottom: 1rem; }
    .modal-text { color: var(--text); margin-bottom: 2rem; line-height: 1.5; }
    .modal-actions { display: flex; gap: 1rem; justify-content: center; flex-wrap: wrap; }
    .btn {
      background: transparent; border: 1px solid var(--dim); color: var(--dim);
      padding: 0.55rem 1.5rem; min-height: 44px; cursor: pointer; font-family: inherit; font-size: 1rem;
      transition: all 0.2s; border-radius: 4px;
    }
    .btn:hover { border-color: var(--text); color: var(--text); }
    .btn-primary { border-color: var(--accent); color: var(--accent); }
    .btn-primary:hover { background: var(--accent); color: #000; }
    .close-preview {
      position: absolute; top: max(0.75rem, env(safe-area-inset-top)); right: max(0.75rem, env(safe-area-inset-right));
      color: #fff; font-size: 2.5rem; cursor: pointer; z-index: 1001; background: transparent; border: 0;
      text-shadow: 0 0 10px #000; line-height: 1; width: 44px; height: 44px; display: grid; place-items: center;
    }
    .close-preview:hover { color: var(--accent); }
    #preview-content {
      width: 95vw; height: calc(100dvh - 2rem);
      display: flex; justify-content: center; align-items: center;
      position: relative; flex-direction: column;
    }
    #preview-content iframe { width: 95vw; height: min(88vh, calc(100dvh - 7rem)); border: none; background: #111; }
    #preview-content video { max-width: 95vw; max-height: min(88vh, calc(100dvh - 7rem)); background: #000; }
    #preview-content audio { width: 80vw; max-width: 500px; }
    #preview-content img { max-width: 95vw; max-height: min(88vh, calc(100dvh - 7rem)); object-fit: contain; }
    .preview-title {
      color: var(--accent); font-size: 1.1rem; margin-bottom: 0.75rem;
      text-align: center; letter-spacing: 0; max-width: 90vw;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .preview-actions {
      margin-top: 1rem; display: flex; gap: 1rem; justify-content: center; flex-wrap: wrap;
    }

    .section-divider { display: flex; align-items: center; gap: 0.75rem; margin: 2.5rem 0 1rem; }
    .section-divider::before, .section-divider::after {
      content: ''; flex: 1; height: 1px;
      background: linear-gradient(90deg, transparent, var(--accent-dim), transparent);
    }
    .section-divider.gold::before, .section-divider.gold::after {
      background: linear-gradient(90deg, transparent, var(--gold-dim), transparent);
    }
    .section-label { font-size: 1.1rem; color: var(--accent); letter-spacing: 0; white-space: nowrap; }
    .section-label.gold { color: var(--gold); }
    .count { font-size: 0.85rem; color: var(--dim); letter-spacing: 0; margin-bottom: 0.5rem; text-align: right; }
    .file-list { display: flex; flex-direction: column; gap: 4px; }
    .file-item {
      display: flex; align-items: center; gap: 12px;
      padding: 14px 16px; min-height: 56px;
      background: var(--panel);
      border: 1px solid var(--border);
      border-left: 3px solid transparent;
      text-decoration: none;
      color: var(--text);
      transition: all 0.15s ease;
      cursor: pointer;
    }
    .file-item:hover {
      border-left-color: var(--accent);
      background: rgba(245,200,66,0.04);
      transform: translateX(4px);
    }
    .file-item.is-folder {
      border-left-color: var(--accent-dim);
    }
    .file-item.is-folder:hover {
      border-left-color: var(--accent);
      background: rgba(245,200,66,0.08);
    }
    .file-icon { font-size: 1.5rem; flex-shrink: 0; width: 2rem; text-align: center; }
    .file-info { flex: 1; min-width: 0; }
    .file-name { font-size: 1.15rem; line-height: 1.3; }
    .file-meta { font-size: 0.85rem; color: var(--dim); }
    .file-type-tag {
      display: inline-block; font-size: 0.7rem; color: var(--accent);
      border: 1px solid var(--accent-dim); padding: 1px 6px;
      letter-spacing: 0; margin-left: 6px; vertical-align: middle;
    }
    .file-action {
      font-size: 0.85rem; color: var(--accent); letter-spacing: 0;
      flex-shrink: 0; opacity: 0; transition: opacity 0.15s;
    }
    .file-item:hover .file-action { opacity: 1; }
    .loading { text-align: center; color: var(--dim); padding: 2rem 0; }
    footer { text-align: center; margin-top: 3rem; padding-top: 1rem; border-top: 1px solid rgba(245,200,66,0.1); }
    .footer-text { color: var(--dim-soft); font-size: 0.9rem; letter-spacing: 0; }
    .search-bar { margin: 0.5rem 0 1rem; display: none; }
    .empty-search { display: none; color: var(--dim); border: 1px dashed var(--border); padding: 1rem; text-align: center; margin-bottom: 1rem; }
    .empty-search.active { display: block; }
    .search-bar input {
      width: 100%; background: var(--panel); border: 1px solid var(--border);
      border-left: 3px solid var(--accent); color: var(--text); font-family: inherit;
      font-size: 1rem; padding: 10px 14px; min-height: 48px; outline: none; letter-spacing: 0;
    }
    .search-bar input::placeholder { color: var(--dim-soft); }
    .search-bar input:focus { border-color: var(--accent); background: rgba(245,200,66,0.03); }
    @media (max-width: 560px) {
      .wrapper { padding: 1rem 0.75rem 3rem; }
      header { padding: 1rem 0 0.5rem; }
      h1 { font-size: 2.65rem; }
      .section-divider { gap: 0.5rem; margin: 1.75rem 0 0.75rem; }
      .section-label { font-size: 1rem; white-space: normal; text-align: center; }
      .file-item { gap: 8px; padding: 12px; }
      .file-name { font-size: 1rem; }
      .file-action { opacity: 1; }
      .file-type-tag { display: none; }
      .preview-title { max-width: calc(100vw - 5rem); white-space: normal; line-height: 1.15; }
      .preview-actions { width: 100%; }
      .preview-actions .btn { flex: 1; min-width: 9rem; text-align: center; }
    }
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { transition-duration: 0.01ms !important; animation-duration: 0.01ms !important; }
      .file-item:hover { transform: none; }
    }
  </style>
  <script src="/emoji-favicon.js?v=1"></script>
</head>
<body>
  <div class="modal-overlay" id="confirm-modal">
    <div class="modal-card">
      <h3 class="modal-title">Access File</h3>
      <p class="modal-text" id="confirm-text"></p>
      <div class="modal-actions">
        <button class="btn" onclick="closeModal('confirm-modal')" data-sound-hover="hover" data-sound-click="click">Cancel</button>
        <button class="btn btn-primary" id="confirm-btn" data-sound-hover="hover" data-sound-click="click">Download</button>
      </div>
    </div>
  </div>

  <div class="modal-overlay" id="preview-modal">
    <button class="close-preview" type="button" onclick="closeModal('preview-modal')" aria-label="Close preview" data-sound-hover="hover" data-sound-click="click">&times;</button>
    <div id="preview-content"></div>
  </div>

  <div class="wrapper">
    <a href="/" class="back" data-sound-hover="hover" data-sound-click="click">&larr; quickcat.club</a>
    <header>
      <h1>Crates</h1>
      <p class="subtitle">tabs, lessons &amp; music theory</p>
      <p class="intro">dig through the practice shelf: tabs, songbooks, theory, piano and guitar lessons.</p>
    </header>

    <div class="breadcrumbs" id="breadcrumbs"></div>

    <div class="search-bar" id="search-bar">
      <input type="text" id="search-input" placeholder="[ filter files... ]" autocomplete="off" autocorrect="off" spellcheck="false">
    </div>
    <div class="empty-search" id="empty-search">no matching files here</div>

    <div id="root-view" style="display:none">
      <div class="section-divider"><span class="section-label">[ SHELVES ]</span></div>
      <div class="count" id="folder-count"></div>
      <div class="file-list" id="folders"></div>

      <div class="section-divider gold"><span class="section-label gold">[ LESSONS &amp; TEXTS ]</span></div>
      <div class="count" id="occult-count"></div>
      <div class="file-list" id="occult"></div>

      <div class="section-divider"><span class="section-label">[ AUDIO &amp; MEDIA ]</span></div>
      <div class="count" id="media-count"></div>
      <div class="file-list" id="media"></div>

      <div id="misc-section" style="display:none">
        <div class="section-divider"><span class="section-label">[ OTHER ]</span></div>
        <div class="count" id="misc-count"></div>
        <div class="file-list" id="misc"></div>
      </div>
    </div>

    <div id="browse-view" style="display:none">
      <div id="browse-folders-section" style="display:none">
        <div class="section-divider"><span class="section-label">[ FOLDERS ]</span></div>
        <div class="file-list" id="browse-folders"></div>
      </div>
      <div id="browse-files-section" style="display:none">
        <div class="section-divider"><span class="section-label">[ FILES ]</span></div>
        <div class="count" id="browse-count"></div>
        <div class="file-list" id="browse-files"></div>
      </div>
    </div>

    <footer>
      <p class="footer-text">stay loose &mdash; keep practicing</p>
    </footer>
  </div>
  <script>
    var VIDEO_EXT = ['.mp4','.mkv','.avi','.webm'];
    var AUDIO_EXT = ['.mp3','.flac','.ogg','.m4a','.wav','.opus'];
    var DOC_EXT = ['.pdf','.epub','.mobi','.djvu','.txt'];
    var IMG_EXT = ['.jpg','.jpeg','.png','.gif','.webp'];
    var ISO_EXT = ['.iso','.img','.bin'];
    var INLINE_VIDEO = ['.mp4','.webm','.mkv'];
    var currentPath = '';

    // Occult/esoteric keywords for smart categorisation
    var OCCULT_KEYWORDS = ['guitar','piano','music','theory','chord','tab','song','beginner','play','keyboard','lesson','method','sourcebook'];

    function ext(name) {
      var m = name.toLowerCase().match(/\.[a-z0-9]+$/);
      return m ? m[0] : '';
    }

    function isVideo(n) { return VIDEO_EXT.some(function(e) { return n.toLowerCase().endsWith(e); }); }
    function isAudio(n) { return AUDIO_EXT.some(function(e) { return n.toLowerCase().endsWith(e); }); }
    function isDoc(n) { return DOC_EXT.some(function(e) { return n.toLowerCase().endsWith(e); }); }
    function isImage(n) { return IMG_EXT.some(function(e) { return n.toLowerCase().endsWith(e); }); }
    function isIso(n) { return ISO_EXT.some(function(e) { return n.toLowerCase().endsWith(e); }); }
    function isOccult(n) { var l = n.toLowerCase(); return OCCULT_KEYWORDS.some(function(k) { return l.indexOf(k) !== -1; }); }

    function typeRank(name) {
      var n = name.toLowerCase();
      if (isVideo(n)) return 10;
      if (isAudio(n)) return 20;
      if (isDoc(n)) return 30;
      if (isImage(n)) return 40;
      if (isIso(n)) return 50;
      if (n.endsWith('.cbr') || n.endsWith('.cbz') || n.endsWith('.zip') || n.endsWith('.rar') || n.endsWith('.7z')) return 60;
      return 90;
    }

    function typeSort(a, b) {
      return (typeRank(a.name) - typeRank(b.name)) || cleanName(a.name).localeCompare(cleanName(b.name));
    }

    function canInlinePlay(n) {
      var e = ext(n);
      return INLINE_VIDEO.includes(e) || e === '.pdf' || AUDIO_EXT.some(function(x){return e===x;}) || IMG_EXT.some(function(x){return e===x;});
    }

    function iconFor(name, isDir) {
      if (isDir) return '\u{1F4C1}';
      var n = name.toLowerCase();
      if (isVideo(n)) return '\u{1F3AC}';
      if (isAudio(n)) return '\u{1F3B5}';
      if (isIso(n)) return '\u{1F4BF}';
      if (n.endsWith('.cbr') || n.endsWith('.cbz')) return '\u{1F4A5}';
      if (n.endsWith('.pdf')) return '\u{1F4C4}';
      if (n.endsWith('.epub') || n.endsWith('.mobi')) return '\u{1F4D6}';
      if (isImage(n)) return '\u{1F5BC}';
      return '\u{1F4CE}';
    }

    function typeTag(name) {
      var e = ext(name).replace('.','').toUpperCase();
      if (!e) return '';
      return '<span class="file-type-tag">' + e + '</span>';
    }

    function sizeStr(bytes) {
      if (bytes > 1073741824) return (bytes/1073741824).toFixed(1) + ' GB';
      if (bytes > 1048576) return (bytes/1048576).toFixed(0) + ' MB';
      if (bytes > 1024) return (bytes/1024).toFixed(0) + ' KB';
      return '';
    }

    function escapeHtml(value) {
      return String(value).replace(/[&<>"']/g, function(char) {
        return ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' })[char];
      });
    }

    function cleanName(name) {
      return name
        .replace(/\.(mp4|mkv|avi|webm|pdf|epub|mobi|djvu|txt|srt|nfo|jpg|png|gif|iso|img|cbr|cbz|mp3|flac|ogg|m4a|wav|opus)$/i, '')
        .replace(/_/g, ' ')
        .replace(/\[.*?\]/g, '')
        .replace(/\{.*?\}/g, '')
        .replace(/\d{3,4}p\b.*$/i, '')
        .replace(/\s{2,}/g, ' ')
        .trim();
    }

    function buildPath(subpath) {
      var base = '/crates/files/';
      if (!subpath) return base;
      return base + subpath.split('/').map(encodeURIComponent).join('/') + '/';
    }

    function fileUrl(name) {
      var base = '/crates/files/';
      var path = currentPath ? currentPath + '/' + name : name;
      return base + path.split('/').map(encodeURIComponent).join('/');
    }

    function renderBreadcrumbs() {
      var bc = document.getElementById('breadcrumbs');
      if (!currentPath) { bc.innerHTML = '<a onclick="navigate(\'\')" data-sound-hover="hover" data-sound-click="click">Root</a>'; return; }
      var parts = currentPath.split('/').filter(Boolean);
      var html = '<a onclick="navigate(\'\')" data-sound-hover="hover" data-sound-click="click">Root</a>';
      var accumulated = '';
      for (var i = 0; i < parts.length; i++) {
        accumulated += (accumulated ? '/' : '') + parts[i];
        html += '<span class="sep">/</span>';
        if (i === parts.length - 1) {
          html += '<span>' + escapeHtml(decodeURIComponent(parts[i])) + '</span>';
        } else {
          html += '<a onclick="navigate(\'' + accumulated.replace(/'/g, "\\'") + '\')" data-sound-hover="hover" data-sound-click="click">' + escapeHtml(decodeURIComponent(parts[i])) + '</a>';
        }
      }
      bc.innerHTML = html;
    }

    function closeModal(id) {
      document.getElementById(id).classList.remove('active');
      if (id === 'preview-modal') {
        var c = document.getElementById('preview-content');
        var v = c.querySelector('video'); if (v) v.pause();
        var a = c.querySelector('audio'); if (a) a.pause();
        c.innerHTML = '';
      }
    }

    document.addEventListener('keydown', function(e) {
      if (e.key === 'Escape') {
        closeModal('preview-modal');
        closeModal('confirm-modal');
      }
      if ((e.key === 'Backspace' || e.key === 'ArrowLeft') && currentPath &&
          !document.getElementById('preview-modal').classList.contains('active') &&
          !document.getElementById('confirm-modal').classList.contains('active') &&
          !['INPUT','TEXTAREA'].includes(document.activeElement.tagName)) {
        e.preventDefault();
        var parts = currentPath.split('/').filter(Boolean);
        parts.pop();
        navigate(parts.join('/'));
      }
    });

    function openPreview(url, name) {
      var e = ext(name);
      var content = document.getElementById('preview-content');
      var displayName = cleanName(name);
      var safeName = escapeHtml(displayName);
      var html = '<div class="preview-title">' + safeName + '</div>';

      if (e === '.pdf') {
        html += '<iframe src="' + url + '#toolbar=1" title="' + safeName + '"></iframe>';
      } else if (INLINE_VIDEO.includes(e)) {
        html += '<video src="' + url + '" controls></video>';
      } else if (AUDIO_EXT.some(function(x){return e===x;})) {
        html += '<div style="text-align:center;padding:2rem;">' +
          '<div style="font-size:4rem;margin-bottom:1rem;">\u{1F3B5}</div>' +
          '<audio id="preview-audio" src="' + url + '" controls style="width:100%;max-width:500px;"></audio>' +
          '</div>';
      } else if (IMG_EXT.some(function(x){return e===x;})) {
        html += '<img src="' + url + '" alt="' + safeName + '">';
      }

      html += '<div class="preview-actions">' +
        '<a class="btn btn-primary" href="' + url + '" download style="text-decoration:none;" data-sound-hover="hover" data-sound-click="click">Download</a>' +
        '<button class="btn" onclick="closeModal(\'preview-modal\')" data-sound-hover="hover" data-sound-click="click">Close</button>' +
        '</div>';

      content.innerHTML = html;
      document.getElementById('preview-modal').classList.add('active');

      if (AUDIO_EXT.some(function(x){return e===x;})) {
        var audio = document.getElementById('preview-audio');
        if (audio) { audio.load(); audio.play().catch(function(){}); }
      } else if (INLINE_VIDEO.includes(e)) {
        var video = content.querySelector('video');
        if (video) { video.play().catch(function(){}); }
      }
    }

    function handleClick(entry, isDir) {
      if (isDir) {
        var newPath = currentPath ? currentPath + '/' + entry.name : entry.name;
        navigate(newPath);
        return;
      }
      var url = fileUrl(entry.name);
      if (canInlinePlay(entry.name)) {
        openPreview(url, entry.name);
      } else {
        document.getElementById('confirm-text').innerHTML =
          'Download <b>' + escapeHtml(cleanName(entry.name)) + '</b>?<br><br>' + sizeStr(entry.size);
        var btn = document.getElementById('confirm-btn');
        btn.onclick = function() { window.location.href = url; closeModal('confirm-modal'); };
        document.getElementById('confirm-modal').classList.add('active');
      }
    }

    function actionLabel(entry, isDir) {
      if (isDir) return 'ENTER';
      if (canInlinePlay(entry.name)) {
        var e = ext(entry.name);
        if (INLINE_VIDEO.includes(e)) return 'WATCH';
        if (e === '.pdf') return 'READ';
        if (AUDIO_EXT.some(function(x){return e===x;})) return 'LISTEN';
        if (IMG_EXT.some(function(x){return e===x;})) return 'VIEW';
      }
      return 'ACCESS';
    }

    function makeItem(entry, isDir) {
      var displayName = escapeHtml(cleanName(entry.name));
      var meta = isDir ? 'collection' : (sizeStr(entry.size || 0) + typeTag(entry.name));

      var a = document.createElement('a');
      a.className = 'file-item' + (isDir ? ' is-folder' : '');
      a.setAttribute('data-sound-hover', 'hover');
      a.setAttribute('data-sound-click', 'click');
      a.onclick = function() { handleClick(entry, isDir); };

      a.innerHTML =
        '<span class="file-icon">' + iconFor(entry.name, isDir) + '</span>' +
        '<span class="file-info">' +
          '<span class="file-name">' + displayName + '</span>' +
          '<span class="file-meta">' + meta + '</span>' +
        '</span>' +
        '<span class="file-action">' + actionLabel(entry, isDir) + '</span>';
      return a;
    }

    function navigate(path) {
      currentPath = path;
      var si = document.getElementById('search-input');
      if (si) { si.value = ''; }
      document.querySelectorAll('.file-item').forEach(function(item) { item.style.display = ''; });
      updateSearchState();
      renderBreadcrumbs();
      load();
      window.scrollTo(0, 0);
    }

    function load() {
      var url = buildPath(currentPath);
      var isRoot = !currentPath;

      document.getElementById('root-view').style.display = isRoot ? 'block' : 'none';
      document.getElementById('browse-view').style.display = isRoot ? 'none' : 'block';

      var loadingMsg = 'checking the crates...';

      fetch(url, { cache: 'no-cache' })
        .then(function(res) { return res.text(); })
        .then(function(text) {
          var entries;
          try {
            entries = JSON.parse(text);
          } catch(e) {
            var parser = new DOMParser();
            var doc = parser.parseFromString(text, 'text/html');
            var links = doc.querySelectorAll('a');
            entries = [];
            links.forEach(function(a) {
              var name = decodeURIComponent(a.getAttribute('href') || '').replace(/\/$/, '');
              if (name && name !== '..' && !name.startsWith('/')) {
                entries.push({ name: name, type: a.getAttribute('href').endsWith('/') ? 'directory' : 'file', size: 0 });
              }
            });
          }

          if (isRoot) { renderRoot(entries); }
          else { renderBrowse(entries); }
          document.getElementById('search-bar').style.display = 'block';
          updateSearchState();
        })
        .catch(function() {
          if (isRoot) {
            document.getElementById('folders').innerHTML = '<div class="loading">shelf unavailable</div>';
          } else {
            document.getElementById('browse-files').innerHTML = '<div class="loading">shelf unavailable</div>';
          }
        });
    }

    function updateSearchState() {
      var empty = document.getElementById('empty-search');
      if (!empty) return;
      var q = document.getElementById('search-input').value.toLowerCase();
      var items = Array.prototype.slice.call(document.querySelectorAll('.file-item'));
      var visibleCount = 0;
      items.forEach(function(item) {
        var name = item.querySelector('.file-name').textContent.toLowerCase();
        var visible = !q || name.indexOf(q) !== -1;
        item.style.display = visible ? '' : 'none';
        if (visible) visibleCount++;
      });
      empty.classList.toggle('active', !!q && visibleCount === 0);
    }

    document.getElementById('search-input').addEventListener('input', function() {
      var q = this.value.toLowerCase();
      document.querySelectorAll('.file-item').forEach(function(item) {
        var name = item.querySelector('.file-name').textContent.toLowerCase();
        item.style.display = (!q || name.indexOf(q) !== -1) ? '' : 'none';
      });
      updateSearchState();
    });

    function renderRoot(entries) {
      var folders = [];
      var occultFiles = [];
      var mediaFiles = [];
      var miscFiles = [];

      entries.forEach(function(e) {
        if (e.type === 'directory') {
          folders.push(e);
        } else if (isVideo(e.name) || isAudio(e.name)) {
          mediaFiles.push(e);
        } else if (isOccult(e.name) || isDoc(e.name) || isIso(e.name)) {
          occultFiles.push(e);
        } else {
          miscFiles.push(e);
        }
      });

      var sort = function(a,b) { return cleanName(a.name).localeCompare(cleanName(b.name)); };
      folders.sort(sort);
      occultFiles.sort(sort);
      mediaFiles.sort(sort);
      miscFiles.sort(sort);

      // Folders
      var foldersEl = document.getElementById('folders');
      foldersEl.innerHTML = '';
      document.getElementById('folder-count').textContent = folders.length + ' collections';
      folders.forEach(function(e) { foldersEl.appendChild(makeItem(e, true)); });

      // Occult/Books
      var occultEl = document.getElementById('occult');
      occultEl.innerHTML = '';
      document.getElementById('occult-count').textContent = occultFiles.length + ' texts';
      occultFiles.forEach(function(e) { occultEl.appendChild(makeItem(e, false)); });
      occultEl.parentElement.style.display = occultFiles.length ? 'block' : 'none';

      // Media
      var mediaEl = document.getElementById('media');
      mediaEl.innerHTML = '';
      document.getElementById('media-count').textContent = mediaFiles.length + ' files';
      mediaFiles.forEach(function(e) { mediaEl.appendChild(makeItem(e, false)); });
      mediaEl.parentElement.style.display = mediaFiles.length ? 'block' : 'none';

      // Misc
      var miscEl = document.getElementById('misc');
      miscEl.innerHTML = '';
      document.getElementById('misc-count').textContent = miscFiles.length + ' items';
      miscFiles.forEach(function(e) { miscEl.appendChild(makeItem(e, false)); });
      document.getElementById('misc-section').style.display = miscFiles.length ? 'block' : 'none';
    }

    function renderBrowse(entries) {
      var folders = [];
      var files = [];

      entries.forEach(function(e) {
        if (e.type === 'directory') folders.push(e);
        else files.push(e);
      });

      folders.sort(function(a,b) { return a.name.toLowerCase().localeCompare(b.name.toLowerCase()); });
      files.sort(typeSort);

      var foldersEl = document.getElementById('browse-folders');
      var filesEl = document.getElementById('browse-files');
      var foldersSection = document.getElementById('browse-folders-section');
      var filesSection = document.getElementById('browse-files-section');

      foldersEl.innerHTML = '';
      filesEl.innerHTML = '';

      if (folders.length > 0) {
        foldersSection.style.display = 'block';
        folders.forEach(function(e) { foldersEl.appendChild(makeItem(e, true)); });
      } else {
        foldersSection.style.display = 'none';
      }

      if (files.length > 0) {
        filesSection.style.display = 'block';
        document.getElementById('browse-count').textContent = files.length + ' files';
        files.forEach(function(e) { filesEl.appendChild(makeItem(e, false)); });
      } else {
        filesSection.style.display = 'none';
      }
    }

    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.getRegistration('/').then(function(registration) {
        if (registration) registration.unregister();
      }).catch(function() {});
    }

    navigate('');
  </script>
  <script src="/archive-browser.js?v=peek-v1"></script>
  <script src="/ui-sounds.js?v=organic-ui"></script>
  <script>UISounds.init();</script>
</body>
</html>
