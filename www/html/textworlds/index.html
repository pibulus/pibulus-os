<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>textworlds — quickcat.club</title>
  <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0a0c0a;
      --green: #33ff33;
      --green-dim: #1a8c1a;
      --green-glow: rgba(51,255,51,0.15);
      --amber: #ffb000;
      --dim: #4a7a4a;
      --text: #b8d8b8;
    }
    html, body { height: 100%; }
    body {
      background: var(--bg);
      color: var(--green);
      font-family: 'VT323', monospace;
      font-size: 18px;
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }

    /* scanlines */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.18) 2px, rgba(0,0,0,0.18) 4px);
      pointer-events: none;
      z-index: 10;
    }
    /* CRT vignette */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse at center, transparent 60%, rgba(0,0,0,0.7) 100%);
      pointer-events: none;
      z-index: 9;
    }

    .header {
      padding: 0.4rem 1rem;
      border-bottom: 1px solid var(--green-dim);
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-shrink: 0;
      z-index: 11;
    }
    .header-title {
      color: var(--green);
      font-size: 1.2rem;
      letter-spacing: 4px;
      text-shadow: 0 0 8px var(--green);
    }
    .header a {
      color: var(--dim);
      text-decoration: none;
      font-size: 1rem;
      letter-spacing: 1px;
      transition: color 0.2s;
    }
    .header a:hover { color: var(--green); }

    /* Landing */
    #landing {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 1.5rem 2rem;
      z-index: 11;
      max-width: 780px;
      width: 100%;
      margin: 0 auto;
      min-height: 0;
      overflow-y: auto;
    }

    #boot-output {
      line-height: 1.7;
      min-height: 16rem;
    }
    #boot-output .line { display: block; }
    #boot-output .dim  { color: var(--dim); }
    #boot-output .hi   { color: var(--green); text-shadow: 0 0 6px var(--green); }
    #boot-output .sep  { color: var(--green-dim); }
    #boot-output .num  { color: var(--amber); }

    #prompt-line {
      margin-top: 1.2rem;
      display: none;
      align-items: center;
      gap: 0.5rem;
    }
    #prompt-line .prompt-text { color: var(--dim); }
    #prompt-line .prompt-text span { color: var(--green); }

    .connect-btn {
      background: transparent;
      border: none;
      color: var(--green);
      font-family: 'VT323', monospace;
      font-size: 1.1rem;
      letter-spacing: 2px;
      cursor: pointer;
      min-height: 44px;
      padding: 0 0.5rem;
      text-shadow: 0 0 6px var(--green);
    }
    .connect-btn:hover { color: #fff; text-shadow: 0 0 12px var(--green); }

    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
    .cursor { display: inline-block; animation: blink 1s step-end infinite; color: var(--green); }

    .note {
      margin-top: 0.6rem;
      color: var(--dim);
      font-size: 0.9rem;
      display: none;
    }

    /* Terminal */
    #terminal-container {
      flex: 1;
      display: none;
      flex-direction: column;
      z-index: 11;
      min-height: 0;
      position: relative;
      background: #020402;
    }
    #terminal-container.active { display: flex; }
    #terminal-container::before {
      content: '';
      position: absolute;
      inset: 0;
      z-index: 2;
      pointer-events: none;
      background:
        repeating-linear-gradient(0deg, rgba(0, 0, 0, 0.2), rgba(0, 0, 0, 0.2) 1px, transparent 1px, transparent 4px),
        radial-gradient(ellipse at center, transparent 55%, rgba(0, 0, 0, 0.48) 100%);
      mix-blend-mode: screen;
      opacity: 0.24;
      animation: terminal-flicker 8s steps(2, end) infinite;
    }
    #terminal-container::after {
      content: '';
      position: absolute;
      inset: 0;
      z-index: 3;
      pointer-events: none;
      box-shadow:
        inset 0 0 28px rgba(51, 255, 51, 0.13),
        inset 0 0 80px rgba(51, 255, 51, 0.06);
    }
    iframe {
      flex: 1;
      width: 100%;
      border: none;
      display: block;
      min-height: 0;
      position: relative;
      z-index: 1;
      filter: contrast(1.06) saturate(1.08);
    }

    @keyframes terminal-flicker {
      0%, 100% { opacity: 0.22; }
      12% { opacity: 0.28; }
      13% { opacity: 0.2; }
      52% { opacity: 0.25; }
      53% { opacity: 0.21; }
      81% { opacity: 0.3; }
    }

    @media (max-width: 560px) {
      body { font-size: 16px; }
      .header { padding: 0.5rem 0.75rem; }
      .header-title { letter-spacing: 2px; }
      #landing {
        justify-content: flex-start;
        padding: 1rem;
      }
      #boot-output {
        line-height: 1.35;
        min-height: auto;
      }
      #prompt-line {
        align-items: center;
        flex-wrap: wrap;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .cursor,
      #terminal-container::before {
        animation: none;
      }
    }
  </style>
  <script src="/emoji-favicon.js?v=1"></script>
</head>
<body>

  <div class="header">
    <span class="header-title">TEXTWORLDS</span>
    <a href="/">&larr; back</a>
  </div>

  <div id="landing">
    <div id="boot-output"></div>
    <div id="prompt-line">
      <span class="prompt-text">guest@<span>quickcat</span>:~$&nbsp;</span>
      <button class="connect-btn" onclick="connect()">dial_in</button><span class="cursor">▌</span>
    </div>
    <p class="note" id="note">sandboxed terminal &mdash; max 5 simultaneous connections</p>
  </div>

  <div id="terminal-container">
    <iframe id="deck-frame" src="" allow="clipboard-read; clipboard-write"></iframe>
  </div>

  <script>
    const lines = [
      { text: 'TEXTWORLDS v1.0 // quickcat.club', cls: 'hi', delay: 0 },
      { text: '─────────────────────────────────────────', cls: 'sep', delay: 80 },
      { text: 'establishing uplink...            [ OK ]', cls: 'dim', delay: 200 },
      { text: 'loading destination index...      [ OK ]', cls: 'dim', delay: 400 },
      { text: '', cls: '', delay: 550 },
      { text: '  available destinations:', cls: 'dim', delay: 650 },
      { text: '', cls: '', delay: 700 },
      { text: '  [0]  START HERE          keys, exits, unsticking yourself', cls: 'line', delay: 780 },
      { text: '  [1]  ROGUELIKE VAULT     NetHack, Crawl, Angband, Moria', cls: 'line', delay: 880 },
      { text: '  [2]  TEXT ADVENTURES     interactive fiction (5 titles)', cls: 'line', delay: 980 },
      { text: '  [3]  BBS GATEWAY         LORD, door games, classic boards', cls: 'line', delay: 1080 },
      { text: '  [4]  MUD PORTAL          Aardwolf, Discworld, MUME, Achaea', cls: 'line', delay: 1180 },
      { text: '  [5]  TERMINAL WONDERS    Telehack, MapSCII, SSHTron', cls: 'line', delay: 1280 },
      { text: '', cls: '', delay: 1380 },
      { text: '  destination selected via interactive menu after connect.', cls: 'dim', delay: 1460 },
      { text: '', cls: '', delay: 1560 },
    ];

    const out = document.getElementById('boot-output');
    const promptLine = document.getElementById('prompt-line');
    const note = document.getElementById('note');

    lines.forEach(({ text, cls, delay }) => {
      setTimeout(() => {
        const s = document.createElement('span');
        s.className = 'line' + (cls ? ' ' + cls : '');
        s.textContent = text;
        out.appendChild(s);
      }, delay);
    });

    setTimeout(() => {
      promptLine.style.display = 'flex';
      note.style.display = 'block';
    }, 2100);

    function focusTerminal(frame) {
      frame.focus();
      try {
        const doc = frame.contentDocument || frame.contentWindow.document;
        const terminal = doc.querySelector('.xterm-helper-textarea') || doc.querySelector('.xterm') || doc.querySelector('canvas');
        if (terminal) terminal.focus();
        else frame.contentWindow.focus();
      } catch(e) {
        frame.focus();
      }
    }

    function connect() {
      const landing = document.getElementById('landing');
      const container = document.getElementById('terminal-container');
      const frame = document.getElementById('deck-frame');
      landing.style.display = 'none';
      container.classList.add('active');
      frame.src = '/deck/';
      frame.addEventListener('load', () => {
        setTimeout(() => focusTerminal(frame), 300);
      });
    }

    document.addEventListener('keydown', (e) => {
      const frame = document.getElementById('deck-frame');
      const landing = document.getElementById('landing');
      if (landing.style.display !== 'none' && (e.key === 'Enter' || e.key === ' ')) {
        connect();
      } else if (frame.src && frame.src !== window.location.href && document.activeElement !== frame) {
        focusTerminal(frame);
      }
    });

    document.getElementById('terminal-container').addEventListener('click', () => {
      const frame = document.getElementById('deck-frame');
      focusTerminal(frame);
    });
  </script>

</body>
</html>
