<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>interactive fiction - quickcat.club</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg: #050505;
      --cyan: #00ffea;
      --magenta: #ff00ff;
      --text: #e0e0e0;
      --dim: #555;
      --card-bg: rgba(10, 10, 15, 0.8);
      --card-border: rgba(0, 255, 234, 0.15);
    }
    body {
      font-family: 'VT323', monospace;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      font-size: 18px;
      line-height: 1.4;
    }
    body::after {
      content: '';
      position: fixed; inset: 0;
      background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0, 0, 0, 0.05) 2px, rgba(0, 0, 0, 0.05) 4px);
      pointer-events: none; z-index: 9999;
    }
    .container { max-width: 1100px; margin: 0 auto; padding: 0 24px; }
    .header { padding: 60px 0 40px; text-align: center; }
    .header .back { color: var(--dim); text-decoration: none; font-size: 1rem; margin-bottom: 12px; display: inline-block; }
    .header .back:hover { color: var(--cyan); }
    .header h1 { font-size: clamp(2.5rem, 8vw, 4.5rem); color: var(--magenta); text-shadow: 0 0 30px rgba(255, 0, 255, 0.3); letter-spacing: 0.1em; }
    
    .search-bar { position: sticky; top: 0; z-index: 100; padding: 20px 0; background: rgba(5, 5, 5, 0.95); backdrop-filter: blur(10px); }
    .search-bar input { width: 100%; background: #000; border: 1px solid var(--card-border); border-radius: 4px; padding: 14px 20px; color: var(--cyan); font-family: inherit; font-size: 1.4rem; outline: none; box-shadow: inset 0 0 10px rgba(0, 255, 234, 0.05); }
    .search-bar input:focus { border-color: var(--cyan); box-shadow: 0 0 15px rgba(0, 255, 234, 0.2); }

    .filters { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 30px; justify-content: center; }
    .filter-btn { background: transparent; border: 1px solid var(--card-border); border-radius: 4px; padding: 4px 14px; color: var(--dim); cursor: pointer; transition: 0.2s; font-family: inherit; font-size: 1.1rem; }
    .filter-btn:hover, .filter-btn.active { color: var(--cyan); border-color: var(--cyan); background: rgba(0, 255, 234, 0.05); }

    .games { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 24px; padding-bottom: 80px; }
    .game-card { 
      background: var(--card-bg); border: 1px solid var(--card-border); border-radius: 8px; overflow: hidden;
      display: flex; flex-direction: column; transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1); cursor: pointer;
      position: relative;
    }
    .game-card:hover { transform: translateY(-6px); border-color: var(--cyan); box-shadow: 0 10px 30px rgba(0, 255, 234, 0.15); }
    
    .cover-art { width: 100%; aspect-ratio: 16/9; background: #111; overflow: hidden; position: relative; border-bottom: 1px solid var(--card-border); }
    .cover-art img { width: 100%; height: 100%; object-fit: cover; opacity: 0.7; transition: 0.3s; }
    .game-card:hover .cover-art img { opacity: 1; transform: scale(1.05); }
    .no-cover { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-size: 4rem; color: #222; font-weight: bold; background: linear-gradient(45deg, #0a0a0a, #1a1a1a); }

    .game-info { padding: 20px; flex: 1; display: flex; flex-direction: column; }
    .game-title { font-size: 1.6rem; color: var(--cyan); margin-bottom: 4px; line-height: 1.2; }
    .game-meta { font-size: 0.95rem; color: var(--dim); margin-bottom: 12px; }
    .game-desc { font-size: 1.15rem; color: #bbb; line-height: 1.4; flex: 1; }
    .game-tags { margin-top: 16px; display: flex; gap: 8px; flex-wrap: wrap; }
    .tag { font-size: 0.85rem; color: var(--dim); border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 3px; padding: 1px 8px; }

    .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0, 0, 0, 0.95); z-index: 1000; padding: 20px; align-items: center; justify-content: center; }
    .modal-overlay.open { display: flex; }
    .modal { background: #000; border: 1px solid var(--card-border); width: 100%; max-width: 1000px; height: 90vh; border-radius: 8px; display: flex; flex-direction: column; overflow: hidden; }
    .modal-header { display: flex; justify-content: space-between; padding: 15px 25px; border-bottom: 1px solid var(--card-border); background: #080808; }
    .modal-title { color: var(--magenta); font-size: 1.4rem; }
    .close-btn { background: none; border: 1px solid var(--card-border); color: var(--dim); padding: 4px 15px; cursor: pointer; border-radius: 4px; font-family: inherit; }
    .close-btn:hover { border-color: var(--magenta); color: var(--magenta); }
    iframe { flex: 1; border: none; width: 100%; }

    @media (max-width: 600px) {
      .games { grid-template-columns: 1fr; }
      .modal { height: 100vh; border-radius: 0; }
      .modal-overlay { padding: 0; }
    }
  </style>
  <script src="/emoji-favicon.js?v=1"></script>
</head>
<body>
  <div class="container">
    <div class="header">
      <a href="/" class="back">&larr; quickcat.club</a>
      <h1>interactive fiction</h1>
      <p class="count" id="game-count"></p>
    </div>
    <div class="search-bar">
      <input type="text" id="search" placeholder="search stories..." autocomplete="off">
    </div>
    <div class="filters" id="filters"></div>
    <div class="games" id="games"></div>
  </div>

  <div class="modal-overlay" id="modal">
    <div class="modal">
      <div class="modal-header">
        <span class="modal-title" id="modal-title"></span>
        <button class="close-btn" onclick="closeGame()">[ESC] CLOSE</button>
      </div>
      <iframe id="game-frame"></iframe>
    </div>
  </div>

  <script>
    let games = [];
    let activeFilter = null;

    async function init() {
      const r = await fetch('/fiction/games.json');
      games = await r.json();
      document.getElementById('game-count').textContent = games.length + ' scrolls found';
      
      const tags = [...new Set(games.flatMap(g => g.tags))].sort();
      const filters = document.getElementById('filters');
      filters.innerHTML = '<button class="filter-btn active" onclick="setFilter(null, this)">all</button>';
      tags.forEach(t => {
        const btn = document.createElement('button');
        btn.className = 'filter-btn';
        btn.textContent = t;
        btn.onclick = (e) => setFilter(t, e.target);
        filters.appendChild(btn);
      });

      renderGames(games);
    }

    function setFilter(tag, btn) {
      activeFilter = tag;
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      filterGames();
    }

    function filterGames() {
      const q = document.getElementById('search').value.toLowerCase().trim();
      const filtered = games.filter(g => {
        const matchTag = !activeFilter || g.tags.includes(activeFilter);
        const matchSearch = !q || g.title.toLowerCase().includes(q) || g.author.toLowerCase().includes(q);
        return matchTag && matchSearch;
      });
      renderGames(filtered);
    }

    function renderGames(list) {
      const container = document.getElementById('games');
      container.innerHTML = list.map(g => {
        const firstChar = g.title.charAt(0);
        const coverId = 'cover-' + g.file.replace(/\./g, '-');
        
        return `
          <div class="game-card" onclick="playGame('${g.file}', '${g.title.replace(/'/g, "\\'")}')">
            <div class="cover-art" id="${coverId}">
              <div class="no-cover">${firstChar}</div>
            </div>
            <div class="game-info">
              <div class="game-title">${g.title}</div>
              <div class="game-meta">${g.author} &middot; ${g.year}</div>
              <div class="game-desc">${g.desc}</div>
              <div class="game-tags">${g.tags.map(t => '<span class="tag">' + t + '</span>').join('')}</div>
            </div>
          </div>
        `;
      }).join('');
    }

    function playGame(file, title) {
      const storyUrl = encodeURIComponent('https://quickcat.club/fiction/games/' + file);
      const parchmentUrl = 'https://iplayif.com/?story=' + storyUrl;
      document.getElementById('modal-title').textContent = title;
      document.getElementById('game-frame').src = parchmentUrl;
      document.getElementById('modal').classList.add('open');
      document.body.style.overflow = 'hidden';
    }

    function closeGame() {
      document.getElementById('modal').classList.remove('open');
      document.getElementById('game-frame').src = '';
      document.body.style.overflow = '';
    }

    document.addEventListener('keydown', e => { if (e.key === 'Escape') closeGame(); });
    document.getElementById('search').addEventListener('input', filterGames);
    init();
  </script>
</body>
</html>
