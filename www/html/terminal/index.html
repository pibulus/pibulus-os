<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>the deck - quickcat.club</title>
  <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #050505;
      --magenta: #ff00ff;
      --cyan: #00ffea;
      --text: #e0e0e0;
    }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'VT323', monospace;
      overflow: hidden; height: 100vh;
      display: flex; flex-direction: column;
    }
    
    .crt-overlay {
      position: fixed; inset: 0; pointer-events: none; z-index: 2;
      background: repeating-linear-gradient(0deg, rgba(255,0,255,0.03), rgba(255,0,255,0.03) 2px, transparent 2px, transparent 4px);
      will-change: transform; transform: translateZ(0);
    }
    
    .header {
      padding: 0.8rem 1.5rem; border-bottom: 2px solid var(--magenta);
      display: flex; justify-content: space-between; align-items: center;
      background: rgba(255,0,255,0.05);
      z-index: 3;
    }
    .header h1 { color: var(--magenta); font-size: 1.5rem; letter-spacing: 4px; text-shadow: 0 0 10px var(--magenta); }
    .header a { color: var(--cyan); text-decoration: none; font-size: 1rem; border: 1px solid var(--cyan); padding: 2px 8px; transition: all 0.2s; }
    .header a:hover { background: var(--cyan); color: #000; box-shadow: 0 0 10px var(--cyan); }
    
    #terminal-container { flex: 1; position: relative; background: #000; }
    iframe {
      width: 100%; height: 100%; border: none;
      filter: brightness(1.1) contrast(1.1);
    }
  </style>
</head>
<body>
  <div class="crt-overlay"></div>
  <div class="header">
    <a href="/">&larr; BACK</a>
    <h1>THE CYBERDECK</h1>
    <span style="color: var(--cyan)">v5.0</span>
  </div>
  <div id="terminal-container">
    <iframe src="/deck/" id="terminal"></iframe>
  </div>
  <script>
    window.onclick = () => { document.getElementById('terminal').focus(); };
  </script>
</body>
</html>
