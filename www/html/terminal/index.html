<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>the deck - quickcat.club</title>
  <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0D0F14;
      --magenta: #E040FB;
      --cyan: #4DFFD2;
      --text: #C8D8E8;
    }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'VT323', monospace;
      overflow: hidden; height: 100vh;
      display: flex; flex-direction: column;
    }

    .header {
      padding: 0.6rem 1.5rem; border-bottom: 2px solid var(--magenta);
      display: flex; justify-content: space-between; align-items: center;
      background: rgba(224,64,251,0.05);
      z-index: 3; flex-shrink: 0;
    }
    .header h1 { color: var(--magenta); font-size: 1.5rem; letter-spacing: 4px; text-shadow: 0 0 10px var(--magenta); }
    .header a { color: var(--cyan); text-decoration: none; font-size: 1rem; border: 1px solid var(--cyan); padding: 2px 8px; transition: all 0.2s; }
    .header a:hover { background: var(--cyan); color: #000; box-shadow: 0 0 10px var(--cyan); }

    #terminal-container { flex: 1; position: relative; }
    iframe {
      width: 100%; height: 100%; border: none;
      display: block;
    }
  </style>
</head>
<body>
  <div class="header">
    <a href="/">&larr; BACK</a>
    <h1>THE CYBERDECK</h1>
    <span style="color: var(--cyan)">v5.0</span>
  </div>
  <div id="terminal-container">
    <iframe src="/deck/" id="terminal" allow="clipboard-read; clipboard-write"></iframe>
  </div>
  <script>
    // Focus the iframe immediately and on any click outside it
    const term = document.getElementById('terminal');
    term.addEventListener('load', () => {
      term.focus();
      // Also try to focus the terminal element inside ttyd
      try { term.contentWindow.focus(); } catch(e) {}
    });
    document.addEventListener('click', (e) => {
      if (e.target.tagName !== 'A') {
        term.focus();
        try { term.contentWindow.focus(); } catch(e) {}
      }
    });
    // Focus on any keypress that isn't going to the iframe
    document.addEventListener('keydown', (e) => {
      if (document.activeElement !== term) {
        term.focus();
        try { term.contentWindow.focus(); } catch(e) {}
      }
    });
  </script>
</body>
</html>
