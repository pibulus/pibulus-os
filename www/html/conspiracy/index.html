<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forbidden Library - quickcat.club</title>
  <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #050505;
      --accent: #9933ff;
      --accent-dim: rgba(153,51,255,0.3);
      --text: #e0e0e0;
      --dim: #888;
      --dim-soft: #555;
      --panel: rgba(0,0,0,0.6);
      --border: rgba(153,51,255,0.2);
    }
    html { scrollbar-color: var(--accent) var(--bg); scrollbar-width: thin; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'VT323', monospace;
      font-size: 20px;
      line-height: 1.6;
      min-height: 100vh;
    }
    body::before {
      content: '';
      position: fixed; inset: 0;
      background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.12) 2px, rgba(0,0,0,0.12) 4px);
      pointer-events: none; z-index: 999;
    }
    .wrapper {
      position: relative; z-index: 1;
      max-width: 880px; margin: 0 auto; padding: 2rem 1.5rem 4rem;
    }
    .back { color: var(--dim); text-decoration: none; font-size: 1rem; }
    .back:hover { color: var(--accent); }
    header { text-align: center; padding: 2rem 0 1rem; }
    h1 {
      font-size: clamp(2.5rem, 8vw, 4rem);
      color: var(--accent);
      text-shadow: 0 0 10px var(--accent), 0 0 30px rgba(153,51,255,0.3);
      letter-spacing: 4px; line-height: 1;
    }
    .subtitle { color: var(--dim); font-size: 1.1rem; margin-top: 0.5rem; letter-spacing: 2px; }
    .intro {
      text-align: center; color: var(--dim-soft); font-size: 0.95rem;
      max-width: 600px; margin: 0.75rem auto 0; line-height: 1.5;
    }
    .count { font-size: 0.85rem; color: var(--dim); letter-spacing: 1px; margin: 1.5rem 0 0.5rem; text-align: right; }
    .file-list { display: flex; flex-direction: column; gap: 4px; }
    .file-item {
      display: flex; align-items: center; gap: 12px;
      padding: 14px 16px;
      background: var(--panel);
      border: 1px solid var(--border);
      border-left: 3px solid transparent;
      text-decoration: none;
      color: var(--text);
      transition: all 0.15s ease;
    }
    .file-item:hover {
      border-left-color: var(--accent);
      background: rgba(153,51,255,0.04);
    }
    .file-icon { font-size: 1.5rem; flex-shrink: 0; width: 2rem; text-align: center; }
    .file-info { flex: 1; min-width: 0; }
    .file-name { font-size: 1.15rem; line-height: 1.3; }
    .file-meta { font-size: 0.85rem; color: var(--dim); }
    .file-action {
      font-size: 0.85rem; color: var(--accent); letter-spacing: 2px;
      flex-shrink: 0; opacity: 0; transition: opacity 0.15s;
    }
    .file-item:hover .file-action { opacity: 1; }
    .loading { text-align: center; color: var(--dim); padding: 2rem 0; }
    footer { text-align: center; margin-top: 3rem; padding-top: 1rem; border-top: 1px solid rgba(153,51,255,0.1); }
    .footer-text { color: var(--dim-soft); font-size: 0.9rem; letter-spacing: 2px; }
    @media (max-width: 560px) {
      .file-name { font-size: 1rem; }
      .file-action { opacity: 1; }
    }
  </style>
</head>
<body>
  <div class="wrapper">
    <a href="/" class="back">&larr; quickcat.club</a>
    <header>
      <h1>Forbidden Library</h1>
      <p class="subtitle">occult, esoterica &amp; fringe</p>
      <p class="intro">grimoires, chaos magic, tarot, astrology, conspiracy archives, SubGenius recruitment materials. no judgement. no algorithms. just shelves.</p>
    </header>

    <div class="count" id="item-count"></div>
    <div class="file-list" id="items"><div class="loading">scanning the vault...</div></div>

    <footer>
      <p class="footer-text">question everything &mdash; download freely</p>
    </footer>
  </div>
  <script>
    function iconFor(name) {
      var n = name.toLowerCase();
      if (n.endsWith('.pdf') || n.endsWith('.epub') || n.endsWith('.mobi')) return '\u{1F4D6}';
      if (n.endsWith('.cbr') || n.endsWith('.cbz')) return '\u{1F4DA}';
      if (n.endsWith('.iso')) return '\u{1F4BF}';
      if (n.endsWith('.avi') || n.endsWith('.mp4') || n.endsWith('.mkv')) return '\u{1F3AC}';
      return '\u{1F4C1}';
    }

    function cleanName(name) {
      return name
        .replace(/\.(pdf|epub|mobi|iso|avi|mp4|mkv|cbr|cbz)$/i, '')
        .replace(/\[.*?\]/g, '')
        .replace(/\{.*?\}/g, '')
        .replace(/\s{2,}/g, ' ')
        .trim();
    }

    function sizeStr(bytes) {
      if (bytes > 1073741824) return (bytes/1073741824).toFixed(1) + ' GB';
      if (bytes > 1048576) return (bytes/1048576).toFixed(0) + ' MB';
      if (bytes > 1024) return (bytes/1024).toFixed(0) + ' KB';
      return '';
    }

    function makeItem(entry, isDir) {
      var a = document.createElement('a');
      a.className = 'file-item';
      a.href = '/conspiracy/files/' + encodeURIComponent(entry.name) + (isDir ? '/' : '');
      a.target = '_blank';
      a.rel = 'noopener';
      a.innerHTML =
        '<span class="file-icon">' + (isDir ? '\u{1F4C1}' : iconFor(entry.name)) + '</span>' +
        '<span class="file-info">' +
          '<span class="file-name">' + cleanName(entry.name) + '</span>' +
          '<span class="file-meta">' + (isDir ? 'collection' : sizeStr(entry.size || 0)) + '</span>' +
        '</span>' +
        '<span class="file-action">' + (isDir ? 'BROWSE' : 'DOWNLOAD') + '</span>';
      return a;
    }

    function load() {
      fetch('/conspiracy/files/', { cache: 'no-cache' })
        .then(function(r) { return r.text(); })
        .then(function(text) {
          var entries;
          try {
            entries = JSON.parse(text);
          } catch(e) {
            return;
          }

          entries.sort(function(a,b) {
            // Directories first, then alphabetical
            if (a.type === 'directory' && b.type !== 'directory') return -1;
            if (a.type !== 'directory' && b.type === 'directory') return 1;
            return cleanName(a.name).toLowerCase().localeCompare(cleanName(b.name).toLowerCase());
          });

          var list = document.getElementById('items');
          list.innerHTML = '';
          document.getElementById('item-count').textContent = entries.length + ' items';

          entries.forEach(function(e) {
            list.appendChild(makeItem(e, e.type === 'directory'));
          });
        })
        .catch(function() {
          document.getElementById('items').innerHTML = '<div class="loading">could not load vault</div>';
        });
    }

    load();
  </script>
</body>
</html>
