# Dormant example only. Do not copy into active nginx without reviewing hosts,
# auth, CORS, buffering, and upstream addresses.

server {
    listen 80;
    server_name tv.quickcat.club;

    location / {
        proxy_pass http://127.0.0.1:3099;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

server {
    listen 80;
    server_name stream.quickcat.club;

    location / {
        proxy_pass http://127.0.0.1:8100;
        proxy_set_header Host localhost:8000;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_read_timeout 300s;

        sub_filter_types application/vnd.apple.mpegurl application/x-mpegURL text/plain;
        sub_filter_once off;
        sub_filter "http://localhost:8000/" "/";
        sub_filter "http://127.0.0.1:8000/" "/";
    }
}
